<style>
/* ============================================================ RIVA · modal5 — Настройки ============================================================ */
.m5{ color:var(--text); max-width:760px; }
.m5-head{ display:flex; align-items:center; justify-content:space-between; gap:var(--sp-4); margin-bottom:var(--sp-5); flex-wrap:wrap; }
.m5-title{ font-size:1.35rem; font-weight:700; letter-spacing:-.02em; }
.m5-panel{ display:none; }
.m5-panel.on{ display:block; animation:m5in .3s var(--ease); }
@keyframes m5in{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:none; } }

.m5-card{ border:1px solid var(--border); border-radius:var(--r-lg); background:var(--card); box-shadow:var(--shadow-card); overflow:hidden; margin-bottom:var(--sp-5); }
.m5-card .ch{ padding:var(--sp-4) var(--sp-5); border-bottom:1px solid var(--border); font-weight:600; font-size:.95rem; display:flex; align-items:center; justify-content:space-between; }
.m5-card .cb{ padding:var(--sp-5); }
.m5-card .ch .sub{ font-weight:400; color:var(--text-3); font-size:.8rem; }

.m5-id{ display:flex; align-items:center; gap:var(--sp-4); }
.m5-avatar{ width:64px; height:64px; border-radius:var(--r-lg); display:grid; place-items:center; font-weight:700; font-size:1.3rem; color:var(--btn-fg); background:var(--btn-bg); overflow:hidden; flex:0 0 auto; }
.m5-avatar img{ width:100%; height:100%; object-fit:cover; }
.m5-id .who b{ font-size:1.05rem; font-weight:700; display:block; }
.m5-id .who span{ font-size:.85rem; color:var(--text-3); }
.m5-id .who .role{ display:inline-flex; margin-top:6px; font-size:.74rem; padding:2px 9px; border-radius:var(--r-sm); background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent-line); }

.m5-kv{ display:grid; grid-template-columns:160px 1fr; gap:var(--sp-2) var(--sp-4); font-size:.9rem; }
.m5-kv .k{ color:var(--text-3); padding:6px 0; }
.m5-kv .v{ color:var(--text); padding:6px 0; font-weight:500; }
@media (max-width:560px){ .m5-kv{ grid-template-columns:1fr; gap:0; } .m5-kv .k{ padding-bottom:0; } .m5-kv .v{ padding-top:2px; padding-bottom:12px; } }

.m5-field{ margin-bottom:var(--sp-4); } .m5-field:last-child{ margin-bottom:0; }
.m5-field label{ display:block; font-size:.78rem; font-weight:600; color:var(--text-2); margin-bottom:6px; }
.m5-input, .m5-textarea{ width:100%; height:40px; padding:0 var(--sp-3); background:var(--bg-2); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-size:.9rem; font-family:inherit; }
.m5-textarea{ height:auto; min-height:64px; padding:var(--sp-2) var(--sp-3); resize:vertical; }
.m5-input:focus, .m5-textarea:focus{ outline:none; border-color:var(--accent-line); }
.m5-input:disabled{ opacity:.65; }
.m5-row2{ display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-3); }
@media (max-width:560px){ .m5-row2{ grid-template-columns:1fr; } }
.m5-hint{ font-size:.78rem; color:var(--text-3); margin-top:8px; }

.m5-btn{ display:inline-flex; align-items:center; gap:var(--sp-2); height:38px; padding:0 var(--sp-4); border-radius:var(--r); background:var(--btn-bg); color:var(--btn-fg); font-size:.875rem; font-weight:600; box-shadow:var(--shadow-card); transition:transform var(--dur-fast) var(--ease),opacity var(--dur-fast) var(--ease); white-space:nowrap; }
.m5-btn:hover{ transform:translateY(-1px); opacity:.92; }
.m5-btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
.m5-btn svg{ width:16px; height:16px; }
.m5-btn.ghost{ background:var(--card); color:var(--text); border:1px solid var(--border-strong); box-shadow:none; }
.m5-btn.ghost:hover{ background:var(--card-hover); }
.m5-btn.danger{ background:var(--st-cancelled); color:#fff; box-shadow:none; }

/* выбор темы — крупные карточки-превью */
.m5-themes{ display:grid; grid-template-columns:repeat(4,1fr); gap:var(--sp-3); }
@media (max-width:640px){ .m5-themes{ grid-template-columns:repeat(2,1fr); } }
.m5-theme{ cursor:pointer; border:1px solid var(--border); border-radius:var(--r); overflow:hidden; transition:border-color var(--dur-fast) var(--ease),transform var(--dur-fast) var(--ease); background:var(--bg-2); }
.m5-theme:hover{ transform:translateY(-2px); border-color:var(--border-strong); }
.m5-theme.on{ border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft); }
.m5-theme .prev{ height:64px; position:relative; display:flex; }
.m5-theme .prev .bar{ flex:0 0 22px; border-right:1px solid rgba(128,128,128,.25); }
.m5-theme .prev .body{ flex:1; padding:8px; display:flex; flex-direction:column; gap:5px; }
.m5-theme .prev .body i{ display:block; height:7px; border-radius:4px; }
.m5-theme .lbl{ display:flex; align-items:center; justify-content:space-between; padding:8px 10px; font-size:.82rem; font-weight:600; border-top:1px solid var(--border); }
.m5-theme .lbl .ck{ width:16px; height:16px; color:var(--accent); opacity:0; }
.m5-theme.on .lbl .ck{ opacity:1; }
/* превью-палитры (фиксированные, не зависят от активной темы) */
.pv-light .bar{ background:#ffffff; } .pv-light .body{ background:#f7f7f8; } .pv-light i{ background:#15161a; } .pv-light i:nth-child(2){ background:#80858f; width:70%; } .pv-light i:nth-child(3){ background:#c8c9cc; width:50%; }
.pv-dark .bar{ background:#111216; } .pv-dark .body{ background:#08090b; } .pv-dark i{ background:#f3f4f7; } .pv-dark i:nth-child(2){ background:#6b6f79; width:70%; } .pv-dark i:nth-child(3){ background:#2a2c31; width:50%; }
.pv-indigo .bar{ background:#13131f; } .pv-indigo .body{ background:#0a0a12; } .pv-indigo i{ background:#7c74ff; } .pv-indigo i:nth-child(2){ background:#aaa6d0; width:70%; } .pv-indigo i:nth-child(3){ background:#2a2742; width:50%; }
.pv-emerald .bar{ background:#0e1a14; } .pv-emerald .body{ background:#07100c; } .pv-emerald i{ background:#22c08a; } .pv-emerald i:nth-child(2){ background:#9fccb6; width:70%; } .pv-emerald i:nth-child(3){ background:#173a2b; width:50%; }

.m5-group-switch{ display:flex; flex-direction:column; gap:8px; }
.m5-group{ display:flex; align-items:center; gap:var(--sp-3); padding:var(--sp-3) var(--sp-4); border:1px solid var(--border); border-radius:var(--r); background:var(--bg-2); transition:border-color var(--dur-fast) var(--ease); }
.m5-group:hover{ border-color:var(--border-strong); }
.m5-group.cur{ border-color:var(--accent-line); background:var(--accent-soft); }
.m5-group .gn{ flex:1; }
.m5-group .gn b{ display:block; font-size:.9rem; font-weight:600; color:var(--text); }
.m5-group .gn span{ font-size:.78rem; color:var(--text-3); }
.m5-group .badge{ font-size:.72rem; font-family:var(--font-mono); color:var(--text-3); }

.m5-empty{ display:grid; place-items:center; gap:var(--sp-2); padding:var(--sp-12) var(--sp-4); text-align:center; color:var(--text-3); }
.m5-empty svg{ width:38px; height:38px; opacity:.5; }
.m5-empty .t{ font-size:1.05rem; font-weight:600; color:var(--text-2); }
.m5-empty .d{ font-size:.9rem; max-width:44ch; }
.m5-loading{ display:grid; place-items:center; gap:var(--sp-3); padding:var(--sp-10); color:var(--text-3); }
.m5-loading .spin{ width:24px; height:24px; border-radius:50%; border:2px solid var(--border); border-top-color:var(--accent); animation:m5spin 1s linear infinite; }
@keyframes m5spin{ to{ transform:rotate(360deg);} }

.m5-overlay{ position:fixed; inset:0; z-index:400; display:grid; place-items:center; padding:var(--sp-4); background:rgba(0,0,0,.45); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); }
.m5-dialog{ width:100%; max-width:460px; background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--r-lg); box-shadow:var(--shadow-pop); overflow:hidden; }
.m5-dhead{ padding:var(--sp-4) var(--sp-5); border-bottom:1px solid var(--border); font-weight:700; }
.m5-dbody{ padding:var(--sp-5); }
.m5-dfoot{ display:flex; justify-content:flex-end; gap:var(--sp-3); padding:var(--sp-4) var(--sp-5); border-top:1px solid var(--border); }
</style>

<div class="m5" id="m5-root">
  <div class="m5-head"><div class="m5-title" id="m5-title">Профиль</div></div>
  <div class="m5-panel" data-tab="profile" id="m5p-profile"></div>
  <div class="m5-panel" data-tab="appearance" id="m5p-appearance"></div>
  <div class="m5-panel" data-tab="group" id="m5p-group"></div>
</div>

<script>
(function(){
  var RIVA=window.RIVA, U=window.RIVA_UTILS;
  if(!RIVA||!U){ var r=document.getElementById('m5-root'); if(r) r.innerHTML='<div class="m5-empty"><div class="t">Модуль не инициализирован</div></div>'; return; }
  var sb=RIVA.sb;
  var INSTANCE=Date.now()+'-'+Math.random(); RIVA._m5Instance=INSTANCE;
  function alive(){ return RIVA._m5Instance===INSTANCE && document.getElementById('m5-root'); }

  var curTab='profile';
  var ROLE_LABEL={admin:'Администратор',management:'Управление',supply:'Снабжение',production:'Производство',sales:'Продажи'};
  var THEMES=[['light-bw','Светлая Ч/Б','pv-light'],['dark-bw','Тёмная Ч/Б','pv-dark'],['indigo','Indigo','pv-indigo'],['emerald','Emerald','pv-emerald']];

  function role(){ return (RIVA.state.currentGroup && RIVA.state.currentGroup.role)||null; }
  function isAdmin(){ return role()==='admin'; }
  function isOwner(){ return !!(RIVA.state.currentGroup && RIVA.state.currentGroup.is_owner); }
  function groupId(){ return RIVA.state.currentGroup && RIVA.state.currentGroup.group_id; }
  function meName(){ var p=RIVA.state.profile; var m=(RIVA.state.user&&RIVA.state.user.user_metadata)||{}; return (p&&p.name)||m.full_name||m.name||(RIVA.state.user&&RIVA.state.user.email)||'—'; }
  function meEmail(){ return (RIVA.state.profile&&RIVA.state.profile.email)||(RIVA.state.user&&RIVA.state.user.email)||'—'; }
  function meAvatar(){ var m=(RIVA.state.user&&RIVA.state.user.user_metadata)||{}; return (RIVA.state.profile&&RIVA.state.profile.avatar_url)||m.avatar_url||m.picture||null; }
  function initials(name){ return (name||'U').trim().split(/\s+/).slice(0,2).map(function(w){return w[0]||'';}).join('').toUpperCase()||'U'; }

  function tabFromLabel(label){ var l=(label||'').toLowerCase(); if(l.indexOf('оформлен')>=0||l.indexOf('тема')>=0) return 'appearance'; if(l.indexOf('групп')>=0||l.indexOf('компан')>=0||l.indexOf('реквизит')>=0) return 'group'; return 'profile'; }

  // management не видит Настройки целиком
  if(role()==='management'){
    document.getElementById('m5-root').innerHTML='<div class="m5-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg><div class="t">Раздел недоступен</div><div class="d">Настройки профиля и группы доступны рядовым ролям и администратору. Управленческие функции — во вкладке «Управление».</div></div>';
    return;
  }

  function showTab(tab){
    curTab=tab;
    var titles={profile:'Профиль',appearance:'Оформление',group:'Группа'};
    document.getElementById('m5-title').textContent=titles[tab]||'';
    document.querySelectorAll('#m5-root .m5-panel').forEach(function(p){ p.classList.toggle('on', p.getAttribute('data-tab')===tab); });
    if(tab==='profile') renderProfile();
    else if(tab==='appearance') renderAppearance();
    else if(tab==='group') loadGroup();
  }

  /* ---------- ПРОФИЛЬ ---------- */
  function renderProfile(){
    var panel=document.getElementById('m5p-profile');
    var av=meAvatar(); var name=meName();
    panel.innerHTML=''
      +'<div class="m5-card"><div class="cb">'
      +'<div class="m5-id"><div class="m5-avatar">'+(av?('<img src="'+U.esc(av)+'" alt="">'):U.esc(initials(name)))+'</div>'
      +'<div class="who"><b>'+U.esc(name)+'</b><span>'+U.esc(meEmail())+'</span><div><span class="role">'+U.esc(ROLE_LABEL[role()]||role()||'')+'</span></div></div></div>'
      +'</div></div>'
      +'<div class="m5-card"><div class="ch">Учётная запись</div><div class="cb">'
      +'<div class="m5-kv">'
      +'<div class="k">Имя</div><div class="v">'+U.esc(name)+'</div>'
      +'<div class="k">Email</div><div class="v">'+U.esc(meEmail())+'</div>'
      +'<div class="k">Вход</div><div class="v">Google-аккаунт</div>'
      +'<div class="k">Текущая группа</div><div class="v">'+U.esc((RIVA.state.currentGroup&&RIVA.state.currentGroup.group_name)||'—')+'</div>'
      +'<div class="k">Роль в группе</div><div class="v">'+U.esc(ROLE_LABEL[role()]||role()||'—')+'</div>'
      +'</div>'
      +'<div class="m5-hint">Имя и фото берутся из вашего Google-аккаунта. Изменить их можно в настройках Google.</div>'
      +'</div></div>'
      +'<div class="m5-card"><div class="ch">Сеанс</div><div class="cb">'
      +'<p style="color:var(--text-2);font-size:.9rem;line-height:1.5;margin-bottom:var(--sp-4)">RIVA допускает один активный сеанс на аккаунт. Выход здесь завершит текущую сессию на этом устройстве.</p>'
      +'<button class="m5-btn danger" id="m5-signout"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5M21 12H9"/></svg>Выйти из аккаунта</button>'
      +'</div></div>';
    var so=panel.querySelector('#m5-signout'); if(so) so.onclick=function(){ if(RIVA.signOut) RIVA.signOut(); };
  }

  /* ---------- ОФОРМЛЕНИЕ ---------- */
  function currentTheme(){ try{ return localStorage.getItem('riva-theme')||document.documentElement.getAttribute('data-theme')||'light-bw'; }catch(e){ return document.documentElement.getAttribute('data-theme')||'light-bw'; } }
  function renderAppearance(){
    var panel=document.getElementById('m5p-appearance');
    var cur=currentTheme();
    var cards=THEMES.map(function(t){
      return '<div class="m5-theme'+(cur===t[0]?' on':'')+'" data-theme="'+t[0]+'">'
        +'<div class="prev '+t[2]+'"><div class="bar"></div><div class="body"><i></i><i></i><i></i></div></div>'
        +'<div class="lbl"><span>'+t[1]+'</span><svg class="ck" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 4.5 4.5L19 7"/></svg></div>'
        +'</div>';
    }).join('');
    panel.innerHTML='<div class="m5-card"><div class="ch">Тема оформления <span class="sub">сохраняется на этом устройстве</span></div><div class="cb"><div class="m5-themes">'+cards+'</div>'
      +'<div class="m5-hint">По умолчанию — светлая чёрно-белая. Доступны тёмная Ч/Б и две цветные темы. Выбор запоминается в браузере.</div></div></div>';
    panel.querySelectorAll('.m5-theme').forEach(function(c){ c.onclick=function(){
      var t=c.getAttribute('data-theme');
      if(window.RIVA_THEME && RIVA_THEME.set) RIVA_THEME.set(t); else document.documentElement.setAttribute('data-theme',t);
      panel.querySelectorAll('.m5-theme').forEach(function(x){ x.classList.toggle('on', x===c); });
    }; });
  }

  /* ---------- ГРУППА ---------- */
  async function loadGroup(){
    var panel=document.getElementById('m5p-group');
    panel.innerHTML='<div class="m5-loading"><div class="spin"></div>Загрузка…</div>';
    var g=null;
    try{ var r=await sb.from('groups').select('*').eq('id',groupId()).maybeSingle(); if(!r.error) g=r.data; }catch(e){}
    if(!alive()) return;
    renderGroup(panel, g||{});
  }
  function field(id,label,val,ph,disabled){ return '<div class="m5-field"><label>'+label+'</label><input class="m5-input" id="'+id+'" value="'+U.esc(val||'')+'" placeholder="'+(ph||'')+'"'+(disabled?' disabled':'')+'></div>'; }
  function renderGroup(panel, g){
    var canEdit=isAdmin();
    var d=g.details||{}; // company_details (jsonb) если есть
    function gv(k){ return g[k]!=null?g[k]:(d[k]!=null?d[k]:''); }
    var req=''
      +'<div class="m5-row2">'+field('g-name','Название группы', g.name, 'Моя мастерская', !canEdit)+field('g-legal','Юр. название', gv('legal_name'), 'ООО «…»', !canEdit)+'</div>'
      +'<div class="m5-row2">'+field('g-inn','ИНН', gv('inn'), '', !canEdit)+field('g-kpp','КПП', gv('kpp'), '', !canEdit)+'</div>'
      +'<div class="m5-row2">'+field('g-ogrn','ОГРН', gv('ogrn'), '', !canEdit)+field('g-phone','Телефон', gv('phone'), '', !canEdit)+'</div>'
      +field('g-email','Email', gv('email'), '', !canEdit)
      +field('g-address','Адрес', gv('address'), 'юридический / фактический', !canEdit)
      +'<div class="m5-field"><label>Банковские реквизиты</label><textarea class="m5-textarea" id="g-bank"'+(canEdit?'':' disabled')+' placeholder="Р/с, банк, БИК, к/с">'+U.esc(gv('bank'))+'</textarea></div>';

    var html='<div class="m5-card"><div class="ch">Реквизиты компании'+(canEdit?'':' <span class="sub">только просмотр</span>')+'</div><div class="cb">'+req
      +(canEdit?'<div style="margin-top:var(--sp-4)"><button class="m5-btn" id="g-save"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 6 9 17l-5-5"/></svg>Сохранить реквизиты</button></div>':'<div class="m5-hint">Редактирование реквизитов доступно администратору группы.</div>')
      +'</div></div>';

    // переключение групп
    var groups=RIVA.state.groups||[]; var cur=groupId();
    html+='<div class="m5-card"><div class="ch">Мои группы <span class="sub">'+groups.length+'</span></div><div class="cb"><div class="m5-group-switch">'
      + groups.map(function(x){ var isCur=x.group_id===cur; return '<div class="m5-group'+(isCur?' cur':'')+'"><div class="gn"><b>'+U.esc(x.group_name)+'</b><span>'+U.esc(ROLE_LABEL[x.role]||x.role)+(x.is_owner?' · владелец':'')+'</span></div>'+(isCur?'<span class="badge">текущая</span>':'<button class="m5-btn ghost" data-switch="'+x.group_id+'">Переключиться</button>')+'</div>'; }).join('')
      + '</div></div></div>';

    panel.innerHTML=html;

    var save=panel.querySelector('#g-save');
    if(save) save.onclick=async function(){
      save.disabled=true;
      var details={ legal_name:val(panel,'#g-legal'), inn:val(panel,'#g-inn'), kpp:val(panel,'#g-kpp'), ogrn:val(panel,'#g-ogrn'), phone:val(panel,'#g-phone'), email:val(panel,'#g-email'), address:val(panel,'#g-address'), bank:val(panel,'#g-bank') };
      var name=val(panel,'#g-name');
      // 1) пробуем RPC update_group_details, 2) фолбэк на прямой update
      var ok=false, err='';
      try{
        var rpc=await RIVA.rpc('update_group_details', { p_name:name, p_details:details });
        if(rpc && rpc.ok){ ok=true; } else if(rpc && rpc.error && rpc.error!=='function not found'){ err=rpc.error; }
      }catch(e){}
      if(!ok){
        // фолбэк: прямой апдейт (RLS разрешит только admin/owner)
        var payload={ name:name }; payload.details=details;
        var up=await sb.from('groups').update(payload).eq('id',groupId());
        if(up.error){
          // возможно нет колонки details — пробуем хотя бы имя
          var up2=await sb.from('groups').update({ name:name }).eq('id',groupId());
          if(up2.error){ err=up2.error.message; } else { ok=true; err='Сохранено только название (нет поля реквизитов в БД)'; }
        } else ok=true;
      }
      save.disabled=false;
      if(ok){ U.toast(err||'Реквизиты сохранены'); // обновить имя группы в шапке
        if(RIVA.state.currentGroup) RIVA.state.currentGroup.group_name=name;
        var un=document.getElementById('userGroup'); if(un) un.textContent=name;
      } else { U.toast('Ошибка: '+(err||'не удалось сохранить')); }
    };

    panel.querySelectorAll('[data-switch]').forEach(function(b){ b.onclick=function(){ var id=b.getAttribute('data-switch'); confirmSwitch(function(){ if(RIVA.switchGroup) RIVA.switchGroup(id); }); }; });
  }

  /* ---------- общие ---------- */
  function val(scope,sel){ var e=scope.querySelector(sel); return e?e.value.trim():''; }
  function confirmSwitch(fn){
    var ov=document.createElement('div'); ov.className='m5-overlay';
    ov.innerHTML='<div class="m5-dialog"><div class="m5-dhead">Переключить группу?</div><div class="m5-dbody"><p style="color:var(--text-2);font-size:.92rem;line-height:1.5">Активное пространство сменится, текущий фильтр подразделения сбросится.</p></div><div class="m5-dfoot"><button class="m5-btn ghost" data-x="c">Отмена</button><button class="m5-btn" data-x="ok">Переключиться</button></div></div>';
    document.body.appendChild(ov);
    function close(){ ov.remove(); }
    ov.querySelector('[data-x="c"]').onclick=close;
    ov.addEventListener('mousedown', function(e){ if(e.target===ov) close(); });
    ov.querySelector('[data-x="ok"]').onclick=function(){ close(); fn(); };
  }

  /* ---------- события + старт ---------- */
  function onView(e){ if(!alive()){ document.removeEventListener('riva:view',onView); return; } var t=tabFromLabel(e.detail&&e.detail.tab); if(t!==curTab) showTab(t); }
  document.addEventListener('riva:view',onView);
  showTab(tabFromLabel(RIVA.state.view && RIVA.state.view.tab));
})();
</script>
