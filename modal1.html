<style>
/* ============================================================ RIVA · modal1 — Снабжение ============================================================ */
.m1{ color:var(--text); }
.m1-head{ display:flex; align-items:center; justify-content:space-between; gap:var(--sp-4); margin-bottom:var(--sp-5); flex-wrap:wrap; }
.m1-title{ font-size:1.35rem; font-weight:700; letter-spacing:-.02em; display:flex; align-items:center; gap:var(--sp-3); }
.m1-tools{ display:flex; align-items:center; gap:var(--sp-3); flex-wrap:wrap; }
.m1-search{ display:flex; align-items:center; gap:var(--sp-2); height:38px; padding:0 var(--sp-3); background:var(--card); border:1px solid var(--border); border-radius:var(--r); color:var(--text-3); min-width:190px; }
.m1-search:focus-within{ border-color:var(--accent-line); }
.m1-search svg{ width:15px; height:15px; flex:0 0 auto; }
.m1-search input{ flex:1; background:none; border:none; outline:none; color:var(--text); font-size:.875rem; min-width:0; }
.m1-pill{ display:inline-flex; align-items:center; gap:6px; height:34px; padding:0 var(--sp-3); border-radius:var(--r); background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent-line); font-size:.8rem; font-weight:600; }
.m1-pill.muted{ background:var(--card); color:var(--text-3); border-color:var(--border); font-weight:500; }
.m1-pill svg{ width:14px; height:14px; }

.m1-btn{ display:inline-flex; align-items:center; gap:var(--sp-2); height:38px; padding:0 var(--sp-4); border-radius:var(--r); background:var(--btn-bg); color:var(--btn-fg); font-size:.875rem; font-weight:600; box-shadow:var(--shadow-card); transition:transform var(--dur-fast) var(--ease),opacity var(--dur-fast) var(--ease); white-space:nowrap; }
.m1-btn:hover{ transform:translateY(-1px); opacity:.92; }
.m1-btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
.m1-btn svg{ width:16px; height:16px; }
.m1-btn.ghost{ background:var(--card); color:var(--text); border:1px solid var(--border-strong); box-shadow:none; }
.m1-btn.ghost:hover{ background:var(--card-hover); }
.m1-btn.sm{ height:32px; padding:0 var(--sp-3); font-size:.82rem; }

.m1-card{ border:1px solid var(--border); border-radius:var(--r-lg); background:var(--card); box-shadow:var(--shadow-card); overflow:hidden; }
.m1-panel{ display:none; }
.m1-panel.on{ display:block; animation:m1in .3s var(--ease); }
@keyframes m1in{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:none; } }

.m1-tablewrap{ overflow-x:auto; }
table.m1-tbl{ width:100%; border-collapse:collapse; font-size:.875rem; }
.m1-tbl th{ text-align:left; font-size:.72rem; letter-spacing:.06em; text-transform:uppercase; color:var(--text-3); font-weight:600; padding:var(--sp-3) var(--sp-4); border-bottom:1px solid var(--border); white-space:nowrap; position:sticky; top:0; background:var(--surface); }
.m1-tbl td{ padding:var(--sp-3) var(--sp-4); border-bottom:1px solid var(--border); color:var(--text-2); vertical-align:middle; }
.m1-tbl tr:last-child td{ border-bottom:none; }
.m1-tbl tbody tr{ transition:background var(--dur-fast) var(--ease); }
.m1-tbl tbody tr:hover{ background:var(--card-hover); }
.m1-tbl td.num, .m1-tbl th.num{ text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
.m1-tbl .nm{ color:var(--text); font-weight:600; }
.m1-tbl .sub{ color:var(--text-3); font-size:.78rem; font-family:var(--font-mono); }

.m1-chip{ display:inline-flex; align-items:center; gap:5px; font-size:.74rem; font-weight:500; padding:3px 9px; border-radius:var(--r-sm); white-space:nowrap; border:1px solid var(--border); background:var(--card); color:var(--text-2); }
.m1-chip::before{ content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }
.c-prod{ color:var(--st-upcoming); background:var(--st-upcoming-bg); border-color:transparent; }
.s-draft{ color:var(--st-pending); background:var(--st-pending-bg); border-color:transparent; }
.s-placed,.s-transit{ color:var(--st-upcoming); background:var(--st-upcoming-bg); border-color:transparent; }
.s-received{ color:var(--st-completed); background:var(--st-completed-bg); border-color:transparent; }
.pay-paid{ color:var(--st-completed); } .pay-unpaid{ color:var(--text-3); }
.delta-pos{ color:var(--st-completed); font-weight:600; } .delta-neg{ color:var(--st-cancelled); font-weight:600; }
.low-stock{ color:var(--st-cancelled); font-weight:600; }

.m1-acts{ display:flex; gap:6px; justify-content:flex-end; }
.m1-ic{ width:30px; height:30px; display:grid; place-items:center; border-radius:var(--r-sm); border:1px solid var(--border); background:var(--card); color:var(--text-2); transition:all var(--dur-fast) var(--ease); }
.m1-ic:hover{ border-color:var(--border-strong); color:var(--text); background:var(--card-hover); }
.m1-ic.danger:hover{ color:var(--st-cancelled); border-color:var(--st-cancelled); }
.m1-ic svg{ width:15px; height:15px; }

.m1-empty{ display:grid; place-items:center; gap:var(--sp-2); padding:var(--sp-12) var(--sp-4); text-align:center; color:var(--text-3); }
.m1-empty svg{ width:36px; height:36px; opacity:.45; }
.m1-empty .t{ font-size:1rem; font-weight:600; color:var(--text-2); }
.m1-empty .d{ font-size:.875rem; max-width:42ch; }
.m1-loading{ display:grid; place-items:center; gap:var(--sp-3); padding:var(--sp-12); color:var(--text-3); }
.m1-loading .spin{ width:24px; height:24px; border-radius:50%; border:2px solid var(--border); border-top-color:var(--accent); animation:m1spin 1s linear infinite; }
@keyframes m1spin{ to{ transform:rotate(360deg);} }
.m1-foot{ display:flex; align-items:center; justify-content:space-between; padding:var(--sp-3) var(--sp-4); border-top:1px solid var(--border); font-size:.8rem; color:var(--text-3); }
.m1-foot b{ color:var(--text); font-weight:600; }

/* Диалоги */
.m1-overlay{ position:fixed; inset:0; z-index:400; display:grid; place-items:center; padding:var(--sp-4); background:rgba(0,0,0,.45); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); animation:m1fade .2s var(--ease); }
@keyframes m1fade{ from{ opacity:0;} to{ opacity:1; } }
.m1-dialog{ width:100%; max-width:560px; max-height:90vh; display:flex; flex-direction:column; background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--r-lg); box-shadow:var(--shadow-pop); animation:m1pop .25s var(--ease); }
@keyframes m1pop{ from{ opacity:0; transform:translateY(10px) scale(.98);} to{ opacity:1; transform:none; } }
.m1-dialog.wide{ max-width:720px; }
.m1-dhead{ display:flex; align-items:center; justify-content:space-between; padding:var(--sp-4) var(--sp-5); border-bottom:1px solid var(--border); }
.m1-dhead h3{ font-size:1.05rem; font-weight:700; letter-spacing:-.01em; }
.m1-dclose{ width:32px; height:32px; display:grid; place-items:center; border-radius:var(--r-sm); color:var(--text-3); }
.m1-dclose:hover{ background:var(--card-hover); color:var(--text); }
.m1-dbody{ padding:var(--sp-5); overflow-y:auto; }
.m1-dfoot{ display:flex; justify-content:flex-end; gap:var(--sp-3); padding:var(--sp-4) var(--sp-5); border-top:1px solid var(--border); }

.m1-field{ margin-bottom:var(--sp-4); }
.m1-field:last-child{ margin-bottom:0; }
.m1-field label{ display:block; font-size:.78rem; font-weight:600; color:var(--text-2); margin-bottom:6px; }
.m1-input, .m1-select, .m1-textarea{ width:100%; height:40px; padding:0 var(--sp-3); background:var(--card); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-size:.9rem; font-family:inherit; transition:border-color var(--dur-fast) var(--ease); }
.m1-textarea{ height:auto; min-height:72px; padding:var(--sp-2) var(--sp-3); resize:vertical; }
.m1-input:focus, .m1-select:focus, .m1-textarea:focus{ outline:none; border-color:var(--accent-line); }
.m1-row2{ display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-3); }
.m1-hint{ font-size:.78rem; color:var(--text-3); margin-top:6px; }
.m1-seg{ display:inline-flex; padding:3px; gap:2px; background:var(--card); border:1px solid var(--border); border-radius:var(--r); }
.m1-seg button{ font-size:.8rem; color:var(--text-3); padding:5px 12px; border-radius:var(--r-sm); }
.m1-seg button.on{ background:var(--accent-soft); color:var(--accent); }

/* строки позиций в заказе */
.m1-li{ display:grid; grid-template-columns:1fr 80px 90px 30px; gap:var(--sp-2); align-items:center; margin-bottom:var(--sp-2); }
.m1-li .m1-input{ height:36px; }
.m1-li-del{ width:30px; height:30px; display:grid; place-items:center; border-radius:var(--r-sm); border:1px solid var(--border); color:var(--text-3); }
.m1-li-del:hover{ color:var(--st-cancelled); border-color:var(--st-cancelled); }
.m1-li-head{ display:grid; grid-template-columns:1fr 80px 90px 30px; gap:var(--sp-2); font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; color:var(--text-3); margin-bottom:6px; padding:0 2px; }
</style>

<div class="m1" id="m1-root">
  <div class="m1-head">
    <div class="m1-title" id="m1-title">Склад</div>
    <div class="m1-tools" id="m1-tools"></div>
  </div>

  <div class="m1-card">
    <div class="m1-panel" data-tab="warehouse" id="m1p-warehouse"></div>
    <div class="m1-panel" data-tab="suppliers" id="m1p-suppliers"></div>
    <div class="m1-panel" data-tab="orders" id="m1p-orders"></div>
    <div class="m1-panel" data-tab="journal" id="m1p-journal"></div>
  </div>
</div>

<script>
(function(){
  var RIVA = window.RIVA, U = window.RIVA_UTILS;
  if(!RIVA || !U){ var r=document.getElementById('m1-root'); if(r) r.innerHTML='<div class="m1-empty"><div class="t">Модуль не инициализирован</div><div class="d">app.js не загружен.</div></div>'; return; }
  var sb = RIVA.sb;

  /* токен экземпляра — для самоочистки слушателей при смене страницы */
  var INSTANCE = Date.now()+'-'+Math.random(); RIVA._m1Instance = INSTANCE;
  function alive(){ return RIVA._m1Instance === INSTANCE && document.getElementById('m1-root'); }

  /* ----- состояние ----- */
  var data = { warehouse:[], suppliers:[], orders:[], journal:[] };
  var search = '';
  var curTab = 'warehouse';

  /* ----- доступ ----- */
  function role(){ return (RIVA.state.currentGroup && RIVA.state.currentGroup.role) || null; }
  function canWrite(){ return ['admin','supply','management'].indexOf(role())>=0; }
  function canCross(){ return ['admin','management'].indexOf(role())>=0; }
  function supplyUnits(){ return (RIVA.unitsBySection && RIVA.unitsBySection.supply) || []; }
  function activeUnit(){ return RIVA.state.activeUnitId || null; }
  function activeUnitName(){ var id=activeUnit(); if(!id) return null; var u=supplyUnits().find(function(x){return x.id===id;}); return u?u.name:null; }
  function defaultUnitId(){ var us=supplyUnits(); var d=us.find(function(u){return u.is_default;})||us[0]; return d?d.id:null; }
  function resolveCreateUnit(){ return activeUnit() || defaultUnitId(); }
  function groupId(){ return RIVA.state.currentGroup && RIVA.state.currentGroup.group_id; }

  /* ----- вкладка из ярлыка сайдбара ----- */
  function tabFromLabel(label){
    var l = (label||'').toLowerCase();
    if(l.indexOf('поставщик')>=0) return 'suppliers';
    if(l.indexOf('заказ')>=0) return 'orders';
    if(l.indexOf('журнал')>=0) return 'journal';
    return 'warehouse';
  }

  /* ----- переключение панели ----- */
  function showTab(tab){
    curTab = tab; search='';
    var titles={warehouse:'Склад',suppliers:'Поставщики',orders:'Заказы поставщикам',journal:'Журнал движений'};
    document.getElementById('m1-title').textContent = titles[tab]||'';
    document.querySelectorAll('#m1-root .m1-panel').forEach(function(p){ p.classList.toggle('on', p.getAttribute('data-tab')===tab); });
    renderTools();
    loadTab(tab);
  }

  /* ----- инструменты (поиск + кнопки) ----- */
  function renderTools(){
    var tools = document.getElementById('m1-tools'); tools.innerHTML='';
    // индикатор склада
    var pill = document.createElement('span');
    var an = activeUnitName();
    pill.className = 'm1-pill' + (an?'':' muted');
    pill.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h13l5 5v6a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/></svg>'+(an?U.esc(an):'Все склады');
    tools.appendChild(pill);
    // поиск
    var s = document.createElement('label'); s.className='m1-search';
    s.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>';
    var inp=document.createElement('input'); inp.type='text'; inp.placeholder='Поиск'; inp.value=search;
    inp.addEventListener('input', function(){ search=inp.value.toLowerCase(); renderCurrent(); });
    s.appendChild(inp); tools.appendChild(s);
    // действия
    if(curTab==='warehouse'){
      if(canCross() && supplyUnits().length>1) tools.appendChild(btn('Переместить', 'ghost', iconTransfer(), openTransfer));
      if(canWrite()) tools.appendChild(btn('Добавить позицию','', iconPlus(), function(){ openItemDialog(null); }));
    } else if(curTab==='suppliers'){
      if(canWrite()) tools.appendChild(btn('Добавить поставщика','', iconPlus(), function(){ openSupplierDialog(null); }));
    } else if(curTab==='orders'){
      if(canWrite()) tools.appendChild(btn('Создать заказ','', iconPlus(), function(){ openOrderDialog(); }));
    }
  }
  function btn(label, cls, icon, on){ var b=document.createElement('button'); b.className='m1-btn'+(cls?(' '+cls):''); b.innerHTML=icon+'<span>'+label+'</span>'; b.addEventListener('click',on); return b; }
  function iconPlus(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>'; }
  function iconTransfer(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 7h12l-3-3M17 17H5l3 3"/></svg>'; }

  /* ----- загрузка данных вкладки ----- */
  async function loadTab(tab){
    var panel = document.getElementById('m1p-'+tab);
    panel.innerHTML = '<div class="m1-loading"><div class="spin"></div>Загрузка…</div>';
    try{
      if(tab==='warehouse'){
        var w = await sb.from('warehouse_items').select('*').order('name');
        if(w.error) throw w.error; data.warehouse = w.data||[];
      } else if(tab==='suppliers'){
        var s = await sb.from('suppliers').select('*').order('name');
        if(s.error) throw s.error; data.suppliers = s.data||[];
      } else if(tab==='orders'){
        var o = await sb.from('supply_orders').select('*, suppliers(name), supply_order_items(*)').order('created_at',{ascending:false});
        if(o.error) throw o.error; data.orders = o.data||[];
      } else if(tab==='journal'){
        var j = await sb.from('stock_movements').select('*').order('created_at',{ascending:false}).limit(300);
        if(j.error) throw j.error; data.journal = j.data||[];
      }
      if(!alive()) return;
      renderCurrent();
    }catch(err){
      if(!alive()) return;
      panel.innerHTML = '<div class="m1-empty"><div class="t">Не удалось загрузить</div><div class="d">'+U.esc(err.message||String(err))+'</div></div>';
    }
  }

  function renderCurrent(){
    if(curTab==='warehouse') renderWarehouse();
    else if(curTab==='suppliers') renderSuppliers();
    else if(curTab==='orders') renderOrders();
    else if(curTab==='journal') renderJournal();
  }
  function match(s){ return !search || (s||'').toLowerCase().indexOf(search)>=0; }

  /* ----- СКЛАД ----- */
  function renderWarehouse(){
    var panel = document.getElementById('m1p-warehouse');
    var rows = data.warehouse.filter(function(i){ return match(i.name) || match(i.article); });
    if(!data.warehouse.length){ panel.innerHTML = empty('Склад пуст','Добавьте позиции вручную или оприходуйте заказ поставщика.'); return; }
    var totMat=0, totProd=0;
    data.warehouse.forEach(function(i){ var v=num(i.quantity)*num(i.price); if(i.type==='product') totProd+=v; else totMat+=v; });
    var html = '<div class="m1-tablewrap"><table class="m1-tbl"><thead><tr>'
      + '<th>Наименование</th><th>Тип</th><th class="num">Остаток</th><th class="num">Цена</th><th class="num">Стоимость</th>'
      + (canWrite()?'<th></th>':'') + '</tr></thead><tbody>';
    rows.forEach(function(i){
      var val = num(i.quantity)*num(i.price);
      html += '<tr>'
        + '<td><div class="nm">'+U.esc(i.name)+'</div>'+(i.article?'<div class="sub">'+U.esc(i.article)+'</div>':'')+'</td>'
        + '<td>'+(i.type==='product'?'<span class="m1-chip c-prod">продукт</span>':'<span class="m1-chip">материал</span>')+'</td>'
        + '<td class="num">'+U.formatQuantity(i.quantity)+' '+U.esc(i.unit||'')+'</td>'
        + '<td class="num">'+(i.price!=null?U.formatMoney(i.price):'—')+'</td>'
        + '<td class="num">'+U.formatMoney(val)+'</td>'
        + (canWrite()?('<td><div class="m1-acts">'+icBtn('edit','Изм.',i.id)+icBtn('del','Удал.',i.id,true)+'</div></td>'):'')
        + '</tr>';
    });
    html += '</tbody></table></div>';
    html += '<div class="m1-foot"><span>Позиций: <b>'+data.warehouse.length+'</b></span><span>Материалы: <b>'+U.formatMoney(totMat)+'</b> · Продукция: <b>'+U.formatMoney(totProd)+'</b></span></div>';
    panel.innerHTML = html;
    panel.querySelectorAll('[data-act]').forEach(function(b){ b.addEventListener('click', function(){
      var id=b.getAttribute('data-id'), item=data.warehouse.find(function(x){return x.id===id;});
      if(b.getAttribute('data-act')==='edit') openItemDialog(item); else confirmDelete('позицию «'+item.name+'»', function(){ return delItem(id); });
    });});
  }

  /* ----- ПОСТАВЩИКИ ----- */
  function renderSuppliers(){
    var panel = document.getElementById('m1p-suppliers');
    var rows = data.suppliers.filter(function(i){ return match(i.name)||match(i.contact)||match(i.phone); });
    if(!data.suppliers.length){ panel.innerHTML = empty('Нет поставщиков','Добавьте первого поставщика, чтобы оформлять заказы.'); return; }
    var html='<div class="m1-tablewrap"><table class="m1-tbl"><thead><tr><th>Поставщик</th><th>Контакт</th><th>Телефон</th><th>Email</th>'+(canWrite()?'<th></th>':'')+'</tr></thead><tbody>';
    rows.forEach(function(i){
      html+='<tr><td><div class="nm">'+U.esc(i.name)+'</div>'+(i.comment?'<div class="sub">'+U.esc(i.comment)+'</div>':'')+'</td>'
        +'<td>'+U.esc(i.contact||'—')+'</td><td>'+U.esc(i.phone||'—')+'</td><td>'+U.esc(i.email||'—')+'</td>'
        +(canWrite()?('<td><div class="m1-acts">'+icBtn('edit','Изм.',i.id)+icBtn('del','Удал.',i.id,true)+'</div></td>'):'')+'</tr>';
    });
    html+='</tbody></table></div><div class="m1-foot"><span>Поставщиков: <b>'+data.suppliers.length+'</b></span></div>';
    panel.innerHTML=html;
    panel.querySelectorAll('[data-act]').forEach(function(b){ b.addEventListener('click', function(){
      var id=b.getAttribute('data-id'), it=data.suppliers.find(function(x){return x.id===id;});
      if(b.getAttribute('data-act')==='edit') openSupplierDialog(it); else confirmDelete('поставщика «'+it.name+'»', function(){ return delSupplier(id); });
    });});
  }

  /* ----- ЗАКАЗЫ ----- */
  function orderStatus(st){ var m={draft:['s-draft','Черновик'],placed:['s-placed','Размещён'],in_transit:['s-transit','В пути'],received:['s-received','Получен']}; var x=m[st]||['','—']; return '<span class="m1-chip '+x[0]+'">'+x[1]+'</span>'; }
  function renderOrders(){
    var panel=document.getElementById('m1p-orders');
    var rows=data.orders.filter(function(o){ return match(o.order_number)||match(o.suppliers&&o.suppliers.name); });
    if(!data.orders.length){ panel.innerHTML=empty('Нет заказов','Создайте заказ поставщику — после получения он оприходуется на склад.'); return; }
    var html='<div class="m1-tablewrap"><table class="m1-tbl"><thead><tr><th>Заказ</th><th>Поставщик</th><th>Статус</th><th class="num">Позиций</th><th class="num">Сумма</th><th></th></tr></thead><tbody>';
    rows.forEach(function(o){
      var items=o.supply_order_items||[]; var sum=items.reduce(function(a,i){return a+num(i.quantity)*num(i.price);},0);
      html+='<tr><td><div class="nm">'+U.esc(o.order_number||'—')+'</div><div class="sub">'+U.formatDate(o.created_at)+'</div></td>'
        +'<td>'+U.esc((o.suppliers&&o.suppliers.name)||'—')+'</td>'
        +'<td>'+orderStatus(o.status)+'</td>'
        +'<td class="num">'+items.length+'</td>'
        +'<td class="num">'+U.formatMoney(sum)+'</td>'
        +'<td><div class="m1-acts">'+orderActions(o)+'</div></td></tr>';
    });
    html+='</tbody></table></div><div class="m1-foot"><span>Заказов: <b>'+data.orders.length+'</b></span></div>';
    panel.innerHTML=html;
    panel.querySelectorAll('[data-oact]').forEach(function(b){ b.addEventListener('click', function(){
      var id=b.getAttribute('data-id'), o=data.orders.find(function(x){return x.id===id;}), a=b.getAttribute('data-oact');
      if(a==='view') openOrderView(o);
      else if(a==='place') doPlace(id);
      else if(a==='receive') confirmDelete(null, function(){ return doReceive(id); }, {title:'Оприходовать заказ '+(o.order_number||'')+'?', text:'Позиции поступят на склад, движения запишутся в журнал.', ok:'Оприходовать', danger:false});
      else if(a==='del') confirmDelete('черновик заказа '+(o.order_number||''), function(){ return delOrder(id); });
    });});
  }
  function orderActions(o){
    var s='';
    s+=ic('view','Открыть',o.id,'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>','oact');

      if(o.status==='draft'){ s+=ic('place','Разместить',o.id,'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m22 2-7 20-4-9-9-4z"/></svg>','oact'); s+=ic('del','Удалить',o.id,'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>','oact',true); }

  /* ----- ЖУРНАЛ ----- */
  function moveLabel(t){ return {supply_in:'Поступление',production_in:'Выпуск',sale_out:'Отгрузка',return_in:'Возврат',transfer_in:'Перемещение +',transfer_out:'Перемещение −',cross_sale_out:'Кросс-продажа'}[t]||t; }
  function renderJournal(){
    var panel=document.getElementById('m1p-journal');
    var rows=data.journal.filter(function(m){ return match(m.item_name)||match(m.description); });
    if(!data.journal.length){ panel.innerHTML=empty('Журнал пуст','Здесь появятся движения склада: поступления, выпуск, отгрузки, перемещения.'); return; }
    var html='<div class="m1-tablewrap"><table class="m1-tbl"><thead><tr><th>Дата</th><th>Позиция</th><th>Операция</th><th class="num">Δ</th><th class="num">Остаток</th><th>Кто</th></tr></thead><tbody>';
    rows.forEach(function(m){
      var d=num(m.delta);
      html+='<tr><td class="sub">'+U.formatDateTime(m.created_at)+'</td>'
        +'<td><div class="nm">'+U.esc(m.item_name||'—')+'</div>'+(m.description?'<div class="sub">'+U.esc(m.description)+'</div>':'')+'</td>'
        +'<td>'+U.esc(moveLabel(m.movement_type))+'</td>'
        +'<td class="num '+(d>=0?'delta-pos':'delta-neg')+'">'+(d>=0?'+':'')+U.formatQuantity(d)+'</td>'
        +'<td class="num">'+(m.balance_after!=null?U.formatQuantity(m.balance_after):'—')+'</td>'
        +'<td class="sub">'+U.esc(m.user_name||'—')+'</td></tr>';
    });
    html+='</tbody></table></div><div class="m1-foot"><span>Записей: <b>'+data.journal.length+'</b> (последние 300)</span></div>';
    panel.innerHTML=html;

  function num(v){ var n=typeof v==='number'?v:parseFloat(v); return isFinite(n)?n:0; }
  function empty(t,d){ return '<div class="m1-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg><div class="t">'+t+'</div><div class="d">'+d+'</div></div>'; }
  function icBtn(act,title,id,danger){ return ic(act,title,id, act==='edit'?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>','act',danger); }
  function ic(act,title,id,svg,attr,danger){ return '<button class="m1-ic'+(danger?' danger':'')+'" title="'+title+'" data-'+(attr||'act')+'="'+act+'" data-id="'+id+'">'+svg+'</button>'; }

  /* ============================================================ ДИАЛОГИ ============================================================ */
  function dialog(opts){
    var ov=document.createElement('div'); ov.className='m1-overlay';
    ov.innerHTML='<div class="m1-dialog'+(opts.wide?' wide':'')+'"><div class="m1-dhead"><h3>'+U.esc(opts.title)+'</h3><button class="m1-dclose">✕</button></div><div class="m1-dbody">'+opts.body+'</div><div class="m1-dfoot">'
      +'<button class="m1-btn ghost" data-x="cancel">'+(opts.cancel||'Отмена')+'</button>'
      +(opts.ok===false?'':'<button class="m1-btn" data-x="ok">'+(opts.ok||'Сохранить')+'</button>')+'</div></div>';
    document.body.appendChild(ov);
    function close(){ ov.remove(); }
    ov.querySelector('.m1-dclose').onclick=close;
    ov.querySelector('[data-x="cancel"]').onclick=close;
    ov.addEventListener('mousedown', function(e){ if(e.target===ov) close(); });
    var okb=ov.querySelector('[data-x="ok"]');
    if(okb) okb.onclick=async function(){ okb.disabled=true; try{ var ok=await opts.onOk(ov); if(ok!==false) close(); } finally { if(okb) okb.disabled=false; } };
    if(opts.onMount) opts.onMount(ov);
    return ov;
  }
  function val(ov,sel){ var e=ov.querySelector(sel); return e?e.value.trim():''; }
  function numVal(ov,sel){ var e=ov.querySelector(sel); return e?parseFloat(e.value):NaN; }

  function unitSelectHTML(selId){
    var us=supplyUnits(); var fixed=activeUnit();
    if(fixed){ var u=us.find(function(x){return x.id===fixed;}); return '<input class="m1-input" value="'+U.esc(u?u.name:'склад')+'" disabled><input type="hidden" id="'+selId+'" value="'+fixed+'">'; }
    var pre=defaultUnitId();
    return '<select class="m1-select" id="'+selId+'">'+us.map(function(u){return '<option value="'+u.id+'"'+(u.id===pre?' selected':'')+'>'+U.esc(u.name)+(u.is_default?' (по умолч.)':'')+'</option>';}).join('')+'</select>';
  }

      +'<div class="m1-field"><label>Наименование *</label><input class="m1-input" id="f-name" value="'+U.esc(isEdit?item.name:'')+'"></div>'
      +'<div class="m1-row2"><div class="m1-field"><label>Артикул</label><input class="m1-input" id="f-art" value="'+U.esc(isEdit?(item.article||''):'')+'"></div>'
      +'<div class="m1-field"><label>Ед. изм.</label><input class="m1-input" id="f-unit" value="'+U.esc(isEdit?(item.unit||'шт'):'шт')+'"></div></div>'
      +'<div class="m1-row2"><div class="m1-field"><label>Остаток</label><input class="m1-input" id="f-qty" type="number" step="any" value="'+(isEdit?num(item.quantity):0)+'"></div>'
      +'<div class="m1-field"><label>Цена, ₽</label><input class="m1-input" id="f-price" type="number" step="any" value="'+(isEdit&&item.price!=null?num(item.price):'')+'"></div></div>'
      +'<div class="m1-field"><label>Тип</label><div class="m1-seg" id="f-type"><button type="button" data-v="material" class="'+(!isEdit||item.type!=='product'?'on':'')+'">Материал</button><button type="button" data-v="product" class="'+(isEdit&&item.type==='product'?'on':'')+'">Продукт</button></div></div>'
      +(isEdit?'':'<div class="m1-field"><label>Склад</label>'+unitSelectHTML('f-unitid')+'</div>')
      +'<div class="m1-field"><label>Комментарий</label><textarea class="m1-textarea" id="f-comment">'+U.esc(isEdit?(item.comment||''):'')+'</textarea></div>';
    dialog({ title:isEdit?'Позиция склада':'Новая позиция', body:body,
      onMount:function(ov){ ov.querySelectorAll('#f-type button').forEach(function(b){ b.onclick=function(){ ov.querySelectorAll('#f-type button').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); }; }); },
      onOk:async function(ov){
        var name=val(ov,'#f-name'); if(!name){ U.toast('Укажите наименование'); return false; }
        var rec={ name:name, article:val(ov,'#f-art')||null, unit:val(ov,'#f-unit')||'шт', quantity:isFinite(numVal(ov,'#f-qty'))?numVal(ov,'#f-qty'):0, price:isFinite(numVal(ov,'#f-price'))?numVal(ov,'#f-price'):null, type:ov.querySelector('#f-type .on').getAttribute('data-v'), comment:val(ov,'#f-comment')||null };
        var res;
        if(isEdit){ res=await sb.from('warehouse_items').update(rec).eq('id',item.id); }
        else { rec.group_id=groupId(); rec.unit_id=(ov.querySelector('#f-unitid')||{}).value||resolveCreateUnit(); res=await sb.from('warehouse_items').insert(rec); }
        if(res.error){ U.toast('Ошибка: '+res.error.message); return false; }
        U.toast(isEdit?'Сохранено':'Позиция добавлена'); await loadTab('warehouse');
      }});

  async function delItem(id){ var r=await sb.from('warehouse_items').delete().eq('id',id); if(r.error){ U.toast('Нельзя удалить: используется в рецептах/документах'); return false; } U.toast('Удалено'); await loadTab('warehouse'); }

  async function delSupplier(id){ var r=await sb.from('suppliers').delete().eq('id',id); if(r.error){ U.toast('Нельзя удалить: есть заказы'); return false; } U.toast('Удалено'); await loadTab('suppliers'); }

  /* создание заказа */
  function openOrderDialog(){
    if(!data.suppliers.length){ /* подгрузим поставщиков для выпадающего списка */ }
    var sup = data.suppliers;
    var supOptions = sup.length ? sup.map(function(s){return '<option value="'+s.id+'">'+U.esc(s.name)+'</option>';}).join('') : '';
    var whOptions = data.warehouse.map(function(w){return '<option value="'+w.id+'" data-unit="'+U.esc(w.unit||'')+'" data-price="'+(w.price||'')+'">'+U.esc(w.name)+'</option>';}).join('');
    var body=''
      +'<div class="m1-row2"><div class="m1-field"><label>Поставщик</label><select class="m1-select" id="f-sup">'+(supOptions||'<option value="">— нет поставщиков —</option>')+'</select></div>'
      +'<div class="m1-field"><label>Склад поступления</label>'+unitSelectHTML('f-unitid')+'</div></div>'
      +'<div class="m1-field"><label>Позиции</label><div class="m1-li-head"><span>Позиция</span><span>Кол-во</span><span>Цена</span><span></span></div><div id="f-lines"></div>'
      +'<button class="m1-btn ghost sm" id="f-addline" style="margin-top:8px;">+ строка</button></div>'
      +'<div class="m1-hint">Можно выбрать позицию склада или ввести новую вручную — она создастся на складе при оприходовании.</div>';
    dialog({ title:'Новый заказ поставщику', wide:true, ok:'Создать черновик', body:body,
      onMount:function(ov){
        var lines=ov.querySelector('#f-lines');
        function addLine(){
          var row=document.createElement('div'); row.className='m1-li';
          row.innerHTML='<input class="m1-input li-name" list="f-wh" placeholder="Наименование">'
            +'<input class="m1-input li-qty" type="number" step="any" placeholder="0">'
            +'<input class="m1-input li-price" type="number" step="any" placeholder="0">'
            +'<button class="m1-li-del" title="Удалить">✕</button>';
          row.querySelector('.m1-li-del').onclick=function(){ row.remove(); };
          // автоподстановка цены/ед. при выборе из списка
          row.querySelector('.li-name').addEventListener('change', function(e){
            var opt=Array.prototype.find.call(ov.querySelectorAll('#f-wh option'), function(o){return o.value===e.target.value;});
            if(opt && !row.querySelector('.li-price').value){ var p=opt.getAttribute('data-price'); if(p) row.querySelector('.li-price').value=p; }
          });
          lines.appendChild(row);
        }
        var dl=document.createElement('datalist'); dl.id='f-wh'; dl.innerHTML=whOptions; ov.querySelector('.m1-dbody').appendChild(dl);
        ov.querySelector('#f-addline').onclick=addLine; addLine();
      },
      onOk:async function(ov){
        var supId=val(ov,'#f-sup')||null;
        var unitId=(ov.querySelector('#f-unitid')||{}).value||resolveCreateUnit();
        var rows=Array.prototype.map.call(ov.querySelectorAll('#f-lines .m1-li'), function(r){
          var name=r.querySelector('.li-name').value.trim(); var qty=parseFloat(r.querySelector('.li-qty').value); var price=parseFloat(r.querySelector('.li-price').value);
          return { name:name, qty:isFinite(qty)?qty:0, price:isFinite(price)?price:null };
        }).filter(function(x){ return x.name && x.qty>0; });
        if(!rows.length){ U.toast('Добавьте хотя бы одну позицию'); return false; }
        // заказ
        var ins=await sb.from('supply_orders').insert({ group_id:groupId(), supplier_id:supId, unit_id:unitId, status:'draft' }).select().single();
        if(ins.error){ U.toast('Ошибка: '+ins.error.message); return false; }
        var orderId=ins.data.id;
        // позиции: если имя совпадает с существующей позицией склада того же склада — привяжем
        var byName={}; data.warehouse.forEach(function(w){ if(w.unit_id===unitId) byName[w.name.toLowerCase()]=w.id; });
        var items=rows.map(function(x){ var wid=byName[x.name.toLowerCase()]||null; return { order_id:orderId, warehouse_item_id:wid, name:wid?null:x.name, unit:wid?null:'шт', quantity:x.qty, price:x.price }; });
        var insItems=await sb.from('supply_order_items').insert(items);
        if(insItems.error){ U.toast('Заказ создан, но позиции с ошибкой: '+insItems.error.message); }
        else U.toast('Черновик заказа создан');
        await loadTab('orders');
      }});
  }
  function openOrderView(o){
    var items=o.supply_order_items||[];
    var rowsHtml=items.length?('<div class="m1-tablewrap"><table class="m1-tbl"><thead><tr><th>Позиция</th><th class="num">Кол-во</th><th class="num">Цена</th><th class="num">Сумма</th></tr></thead><tbody>'
      +items.map(function(i){ var nm=i.name||(data.warehouse.find(function(w){return w.id===i.warehouse_item_id;})||{}).name||'позиция'; return '<tr><td>'+U.esc(nm)+'</td><td class="num">'+U.formatQuantity(i.quantity)+'</td><td class="num">'+(i.price!=null?U.formatMoney(i.price):'—')+'</td><td class="num">'+U.formatMoney(num(i.quantity)*num(i.price))+'</td></tr>'; }).join('')
      +'</tbody></table></div>'):'<div class="m1-hint">Без позиций.</div>';
    dialog({ title:'Заказ '+(o.order_number||''), wide:true, ok:false, cancel:'Закрыть',
      body:'<div class="m1-field"><div class="m1-hint">Поставщик: <b style="color:var(--text)">'+U.esc((o.suppliers&&o.suppliers.name)||'—')+'</b> · Статус: '+orderStatus(o.status)+' · Создан: '+U.formatDate(o.created_at)+'</div></div>'+rowsHtml,

  async function doPlace(id){ var r=await sb.from('supply_orders').update({status:'placed', placed_at:new Date().toISOString()}).eq('id',id); if(r.error){ U.toast('Ошибка: '+r.error.message); return; } U.toast('Заказ размещён'); await loadTab('orders'); }
  async function doReceive(id){ var r=await RIVA.rpc('receive_supply_order',{p_order_id:id}); if(!(r&&r.ok)){ U.toast('Ошибка: '+((r&&r.error)||'')); return false; } U.toast('Заказ оприходован на склад'); await loadTab('orders'); }
  async function delOrder(id){ var r=await sb.from('supply_orders').delete().eq('id',id); if(r.error){ U.toast('Ошибка: '+r.error.message); return false; } U.toast('Заказ удалён'); await loadTab('orders'); }

  /* перемещение между складами */
  function openTransfer(){
    var us=supplyUnits(); if(us.length<2){ U.toast('Нужно минимум два склада'); return; }
    var fixed=activeUnit();
    var srcId=fixed||defaultUnitId();
    function itemsOf(unit){ return data.warehouse.filter(function(w){ return w.unit_id===unit && num(w.quantity)>0; }); }
    var srcSelHTML = fixed
      ? '<input class="m1-input" value="'+U.esc((us.find(function(u){return u.id===fixed;})||{}).name||'')+'" disabled><input type="hidden" id="t-src" value="'+fixed+'">'
      : '<select class="m1-select" id="t-src">'+us.map(function(u){return '<option value="'+u.id+'"'+(u.id===srcId?' selected':'')+'>'+U.esc(u.name)+'</option>';}).join('')+'</select>';
    var body=''
      +'<div class="m1-row2"><div class="m1-field"><label>Со склада</label>'+srcSelHTML+'</div>'
      +'<div class="m1-field"><label>На склад</label><select class="m1-select" id="t-dst"></select></div></div>'
      +'<div class="m1-field"><label>Позиция</label><select class="m1-select" id="t-item"></select></div>'
      +'<div class="m1-field"><label>Количество</label><input class="m1-input" id="t-qty" type="number" step="any" placeholder="0"></div>'
      +'<div class="m1-field"><label>Комментарий</label><input class="m1-input" id="t-comment" placeholder="необязательно"></div>'
      +'<div class="m1-hint">Операция запишет две проводки: списание со склада-источника и поступление на склад-получатель.</div>';
    dialog({ title:'Перемещение между складами', ok:'Переместить', body:body,
      onMount:function(ov){
        function fillDst(){ var src=ov.querySelector('#t-src').value; ov.querySelector('#t-dst').innerHTML=us.filter(function(u){return u.id!==src;}).map(function(u){return '<option value="'+u.id+'">'+U.esc(u.name)+'</option>';}).join(''); }
        function fillItems(){ var src=ov.querySelector('#t-src').value; var its=itemsOf(src); ov.querySelector('#t-item').innerHTML=its.length?its.map(function(w){return '<option value="'+w.id+'">'+U.esc(w.name)+' — '+U.formatQuantity(w.quantity)+' '+U.esc(w.unit||'')+'</option>';}).join(''):'<option value="">нет позиций с остатком</option>'; }
        var srcEl=ov.querySelector('#t-src'); if(srcEl.tagName==='SELECT') srcEl.addEventListener('change', function(){ fillDst(); fillItems(); });
        fillDst(); fillItems();
      },
      onOk:async function(ov){
        var src=ov.querySelector('#t-src').value, dst=ov.querySelector('#t-dst').value, itemId=ov.querySelector('#t-item').value, qty=parseFloat(ov.querySelector('#t-qty').value);
        if(!itemId){ U.toast('Нет позиции для перемещения'); return false; }
        if(!(qty>0)){ U.toast('Укажите количество'); return false; }
        var r=await RIVA.rpc('transfer_between_units',{ p_from_unit:src, p_to_unit:dst, p_item_id:itemId, p_quantity:qty, p_comment:val(ov,'#t-comment')||null });
        if(!(r&&r.ok)){ U.toast('Ошибка: '+((r&&r.error)||'')); return false; }
        U.toast('Перемещение выполнено'); await loadTab('warehouse');
      }});
  }

  /* подтверждение удаления / действия */
  function confirmDelete(what, fn, custom){
    var o = custom || { title:'Удалить '+what+'?', text:'Действие необратимо.', ok:'Удалить', danger:true };
    var ov=dialog({ title:o.title, ok:o.ok, body:'<p style="color:var(--text-2);font-size:.92rem;line-height:1.5;">'+U.esc(o.text)+'</p>', onOk:async function(){ return await fn(); } });
    if(o.danger!==false){ var b=ov.querySelector('[data-x="ok"]'); if(b){ b.style.background='var(--st-cancelled)'; b.style.color='#fff'; b.style.boxShadow='none'; } }
  }

  /* ============================================================ СОБЫТИЯ + СТАРТ ============================================================ */
  function onView(e){ if(!alive()){ document.removeEventListener('riva:view', onView); return; } var t=tabFromLabel(e.detail&&e.detail.tab); if(t!==curTab) showTab(t); }
  function onUnits(e){ if(!alive()){ document.removeEventListener('riva:units-changed', onUnits); return; } renderTools(); loadTab(curTab); }
  document.addEventListener('riva:view', onView);
  document.addEventListener('riva:units-changed', onUnits);

  // старт: вкладка из текущего view
  showTab(tabFromLabel(RIVA.state.view && RIVA.state.view.tab));
})();
</script>
