<!DOCTYPE html>
<html lang="ru" data-theme="bw-light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>AI Equipment Selection</title>
  <meta name="theme-color" content="#FFFFFF">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

  <style>
    :root {
      --bg: #FFFFFF; --bg-alt: #FAFAFA; --bg-card: #F5F5F5;
      --fg: #0A0A0A; --fg-secondary: #404040; --fg-muted: #737373;
      --line: #E5E5E5; --line-light: #F0F0F0;
      --accent: #000000; --accent-hover: #333333;
      --success: #10b981; --warning: #f59e0b; --error: #ef4444;
      --ctrl-h: 38px; --ctrl-radius: 12px;
      --transition-duration: 0.6s;
    }
    [data-theme="bw-dark"] {
      --bg: #15171C; --bg-alt: #1C1F25; --bg-card: #23262E;
      --fg: #F5F5F5; --fg-secondary: #A3A3A3; --fg-muted: #737373;
      --line: #2B2F38; --line-light: #24272F;
      --accent: #F5F5F5; --accent-hover: #DDDDDD;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { font-family: 'SN Pro', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--fg); -webkit-font-smoothing: antialiased; transition: background-color var(--transition-duration), color var(--transition-duration); }
    body { min-height: 100vh; width: 100vw; overflow-x: hidden; position: relative; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

    .theme-transition-overlay { position: fixed; inset: 0; z-index: 1000; background: var(--bg); opacity: 0; pointer-events: none; transition: opacity var(--transition-duration); }
    .theme-transition-overlay.active { opacity: 0.85; pointer-events: all; }

    /* ============ PRELOADER ============ */
    #preloader { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 10px; opacity: 0; visibility: hidden; transition: opacity 0.5s, visibility 0.5s; z-index: 9999; }
    #preloader.visible { opacity: 1; visibility: visible; }
    #preloader.fade-out { opacity: 0; visibility: hidden; }
    .line { width: 10px; height: 70px; background: var(--fg); animation: bounce 1.5s infinite ease-in-out; border-radius: 4px; }
    .line:nth-child(2) { animation-delay: 0.3s; } .line:nth-child(3) { animation-delay: 0.6s; } .line:nth-child(5) { animation-delay: 1.2s; }
    @keyframes bounce { 0%,20%,50%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-30px); } 60% { transform: translateY(-15px); } }

    /* ============ LOGIN ============ */
    #login-wrapper { opacity: 0; transition: opacity 0.5s; width: 100%; height: 100vh; position: fixed; top: 0; left: 0; z-index: 100; pointer-events: none; display: flex; align-items: center; justify-content: center; }
    #login-wrapper.show { opacity: 1; pointer-events: auto; }
    .login-card { width: 900px; max-width: 95vw; height: 600px; max-height: 90vh; border-radius: 16px; overflow: hidden; position: relative; border: 1px solid var(--line); background: var(--bg); display: flex; box-shadow: 0 25px 50px -12px rgba(0,0,0,.15); }
    .login-overlay { position: absolute; top: 0; left: 0; width: 385px; height: 100%; background: var(--accent); color: var(--bg); border-radius: 16px 0 0 16px; transition: left 1s; z-index: 9999; pointer-events: auto; }
    .login-overlay.open-sign-up { left: calc(100% - 385px); border-radius: 0 16px 16px 0; }
    .login-overlay .ov-pane { position: absolute; inset: 0; padding: 40px 30px; display: flex; flex-direction: column; justify-content: center; gap: 18px; transition: opacity 0.5s; }
    .login-overlay .ov-pane.signup { opacity: 0; pointer-events: none; }
    .login-overlay.open-sign-up .ov-pane.signin { opacity: 0; pointer-events: none; }
    .login-overlay.open-sign-up .ov-pane.signup { opacity: 1; pointer-events: auto; }
    .login-overlay h3 { font-size: 18px; font-weight: 700; }
    .login-overlay p { font-size: 13px; opacity: 0.7; line-height: 1.5; }
    .btn-overlay { padding: 12px; background: transparent; border: 1px solid rgba(255,255,255,0.3); color: inherit; font-size: 13px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.4s; }
    .btn-overlay:hover { background: rgba(255,255,255,0.1); border-color: currentColor; }

    .login-form-area { position: absolute; top: 0; left: 385px; width: calc(100% - 385px); height: 100%; display: flex; align-items: center; justify-content: center; }
    .form-pane { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; opacity: 0; transition: opacity 0.5s; }
    .form-pane.show { display: flex; opacity: 1; }
    .form-pane h2 { font-size: 24px; font-weight: 600; margin-bottom: 16px; }

    .modalFORM { display: flex; flex-direction: column; gap: 14px; background: var(--bg-card); border: 1px solid var(--line); padding: 26px; width: 380px; border-radius: 12px; }
    .modalFORM h3 { font-size: 16px; font-weight: 700; text-align: center; text-transform: uppercase; color: var(--fg); }
    .inputField { width: 100%; padding: 11px 14px; font-size: 14px; border-radius: 8px; border: 1px solid var(--line); background: var(--bg); outline: none; transition: all 0.3s; color: var(--fg); font-family: inherit; }
    .inputField:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(0,0,0,.06); }
    .inputField::placeholder { color: var(--fg-muted); }
    .btn-submit { width: 100%; padding: 12px; background: var(--accent); border: none; color: var(--bg); font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; transition: all 0.4s; font-family: inherit; }
    .btn-submit:hover { background: var(--accent-hover); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-google-login { width: 100%; padding: 11px; background: var(--bg); border: 1px solid var(--line); color: var(--fg); font-size: 14px; font-weight: 600; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; font-family: inherit; }
    .btn-google-login:hover { background: var(--bg-alt); border-color: var(--fg); }
    .login-error { padding: 8px 12px; background: rgba(239,68,68,.1); color: var(--error); border-radius: 6px; font-size: 12px; }
    .login-divider { display: flex; align-items: center; gap: 10px; color: var(--fg-muted); font-size: 11px; }
    .login-divider::before, .login-divider::after { content: ""; flex: 1; height: 1px; background: var(--line); }

    /* ============ DB DISCONNECT ============ */
    #db-disconnect-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.5); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.5s; z-index: 2000; }
    #db-disconnect-overlay.show { opacity: 1; pointer-events: auto; }

    /* ============ HEADER (RIVA) ============ */
    .header-blur { background: var(--bg); border-bottom: 1px solid var(--line); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 30; }
    @supports (background: color-mix(in srgb, white, black)) {
      .header-blur { background: color-mix(in srgb, var(--bg) 82%, transparent); }
    }
    .header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; height: 64px; padding: 0 16px; }
    @media(min-width: 1024px) { .header-inner { padding: 0 24px; } }

    .ctrl { height: var(--ctrl-h); border-radius: var(--ctrl-radius); border: 1px solid var(--line); background: var(--bg); display: inline-flex; align-items: center; gap: 8px; padding: 0 12px; font-size: 13px; color: var(--fg); transition: all 0.2s; cursor: pointer; font-family: inherit; }
    .ctrl:hover { border-color: var(--fg-muted); }
    .ctrl-square { width: var(--ctrl-h); padding: 0; justify-content: center; gap: 0; }
    .ctrl-logo { cursor: default; pointer-events: none; }

    .group-switcher-wrap { position: relative; margin-left: 4px; }
    .group-switcher-menu { display: none; position: absolute; left: 0; top: calc(100% + 8px); width: 280px; background: var(--bg); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,.05); padding: 6px; z-index: 50; max-height: 320px; overflow-y: auto; }
    .group-switcher-menu.open { display: block; }
    .group-switcher-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.15s; font-size: 13px; }
    .group-switcher-item:hover { background: var(--bg-alt); }
    .group-switcher-item.active { background: var(--bg-alt); font-weight: 600; }

    .profile-wrap { position: relative; }
    .profile-menu { display: none; position: absolute; right: 0; top: calc(100% + 8px); width: 260px; background: var(--bg); border: 1px solid var(--line); border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,.05); padding: 6px; z-index: 50; }
    .profile-menu.open { display: block; }
    .profile-menu-head { padding: 12px 14px; border-bottom: 1px solid var(--line-light); }
    .profile-menu-name { font-size: 13px; font-weight: 600; }
    .profile-menu-email { font-size: 12px; color: var(--fg-muted); margin-top: 2px; word-break: break-all; }
    .profile-menu-balance { font-size: 12px; color: var(--fg-muted); margin-top: 6px; }
    .profile-menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; transition: background 0.15s; font-size: 13px; color: var(--fg); border: none; background: none; width: 100%; text-align: left; font-family: inherit; }
    .profile-menu-item:hover { background: var(--bg-alt); }
    .profile-menu-item.danger { color: var(--error); }

    /* ============ THEME SWITCHER ============ */
    .theme-switcher { position: relative; }
    .theme-line { position: absolute; right: calc(100% + 8px); top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 6px; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
    .theme-line.active { pointer-events: auto; opacity: 1; }
    .theme-node { width: calc(var(--ctrl-h) - 6px); height: calc(var(--ctrl-h) - 6px); border-radius: 10px; border: 1px solid var(--line); background: var(--bg); display: inline-flex; align-items: center; justify-content: center; cursor: pointer; padding: 0; opacity: 0; transform: translateX(14px) scale(0.7); transition: opacity 0.25s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1), border-color 0.15s; }
    .theme-node:hover { border-color: var(--fg-muted); }
    .theme-node.active { border-color: var(--fg); box-shadow: 0 0 0 2px var(--bg); }
    .theme-node .theme-preview { width: 18px; height: 18px; border-radius: 6px; pointer-events: none; }
    .theme-line.active .theme-node { opacity: 1; transform: translateX(0) scale(1); }
    .theme-line .theme-node:nth-last-child(1) { transition-delay: 0ms; }
    .theme-line .theme-node:nth-last-child(2) { transition-delay: 50ms; }
    .btn-theme.active .icon-palette { display: none; }
    .btn-theme.active .icon-close { display: block; }
    .btn-theme .icon-close { display: none; }
    .btn-theme.active { background: var(--bg-alt); border-color: var(--fg-muted); }

    /* ============ MODAL9 ============ */
    .spec-modal { display: none; flex-direction: column; align-items: center; position: relative; min-height: calc(100vh - 64px); }
    .spec-modal.visible { display: flex; }

    .glass3d { background: var(--bg-card); border: 1px solid var(--line); border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,.05); }

    .modal9-top-window { width: 100%; max-width: 1400px; padding: 16px 24px; box-sizing: border-box; margin: 20px auto 12px; }
    .modal9-top-body { display: flex; flex-direction: row; align-items: center; gap: 12px; flex-wrap: wrap; }

    .upload-btn-main { background: var(--accent); color: var(--bg); border: none; padding: 0 20px; height: 40px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; white-space: nowrap; font-family: inherit; position: relative; }
    .upload-btn-main:hover { background: var(--accent-hover); }
    .upload-btn-main:disabled { opacity: 0.6; cursor: default; }
    .upload-btn-main .loader { display: none; position: absolute; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: var(--bg); border-radius: 50%; animation: spin 0.8s linear infinite; }
    .upload-btn-main.loading .loader { display: block; }
    .upload-btn-main.loading .button-text { visibility: hidden; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .upload-status-wrapper { display: flex; flex-direction: column; align-items: flex-start; color: var(--fg-secondary); font-size: 12px; min-width: 150px; flex: 1; }
    .upload-progress { width: 100%; height: 4px; }

    .input-container { position: relative; }
    .styled_input_bar { padding: 9px 12px; font-size: 13px; border: 1px solid var(--line); border-radius: 8px; background: var(--bg); color: var(--fg); outline: none; transition: all 0.3s; font-family: inherit; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .styled_input_bar:hover { border-color: var(--fg-muted); }
    .styled_input_bar:focus { border-color: var(--accent); background: var(--bg); }
    .styled_input_bar::placeholder { color: var(--fg-muted); opacity: 0; }
    .input-label { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--fg-muted); pointer-events: none; transition: all 0.3s; padding: 0 4px; background: transparent; }
    .styled_input_bar:focus + .input-label, .styled_input_bar:not(:placeholder-shown) + .input-label { top: 0; left: 10px; font-size: 10px; background: var(--bg-card); color: var(--fg-secondary); }

    .group-close { background: none; border: none; cursor: pointer; color: var(--fg-muted); font-size: 18px; transition: color 0.2s; }
    .group-close:hover { color: var(--fg); }

    .switch { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; inset: 0; background: var(--line); transition: 0.4s; border-radius: 22px; }
    .toggle-slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: var(--bg); transition: 0.4s; border-radius: 50%; }
    input:checked + .toggle-slider { background: var(--accent); }
    input:checked + .toggle-slider:before { transform: translateX(18px); }
    .toggle-text { color: var(--fg-secondary); font-size: 12px; white-space: nowrap; }

    .modal9-window { width: 100%; max-width: 1400px; padding: 20px 24px; box-sizing: border-box; margin: 0 auto 20px; min-height: 60vh; }
    .modal9-content { width: 100%; overflow-x: auto; }
    .modal9-content::-webkit-scrollbar { height: 6px; }

    .history-list { display: flex; flex-direction: column; gap: 6px; min-width: max-content; }
    .history-controls { width: 100%; display: flex; justify-content: center; margin-top: 12px; }
    .history-load-more { background: var(--accent); border: none; color: var(--bg); padding: 8px 24px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.2s; }
    .history-load-more:hover { background: var(--accent-hover); }
    .history-load-more:disabled { opacity: 0.6; cursor: default; }

    .history-item { display: flex; flex-direction: row; padding: 5px 8px; gap: 6px; transition: background 0.2s; border-radius: 6px; align-items: center; }
    .history-item:hover { background: var(--bg-alt); cursor: pointer; }
    .status-field-wrapper { display: inline-flex; align-items: center; gap: 4px; }
    .status-icon { font-size: 18px; color: var(--fg-muted); transition: color 0.3s, text-shadow 0.3s; }

    .spec-container { margin: 4px 0 12px; padding: 0 8px; }
    .spec-content { display: none; transition: opacity 0.4s; }
    .spec-content.visible { display: block; opacity: 1; }
    .fade-toggle { transition: opacity 0.4s; }
    .fade-toggle.hidden { opacity: 0; pointer-events: none; }

    /* Progress steps */
    .spec-progress { display: flex; gap: 12px; margin: 12px 0; width: 100%; }
    .spec-progress .step { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .spec-progress .bar { width: 100%; height: 3px; background: var(--line); border-radius: 2px; transition: background 0.3s; }
    .spec-progress .step.active .bar { background: var(--success); }
    .spec-progress .step-body { display: flex; gap: 8px; align-items: center; padding-top: 4px; }
    .spec-progress .label { font-size: 11px; color: var(--fg-muted); white-space: nowrap; font-weight: 500; }
    .spec-progress .step.active .label { color: var(--fg); font-weight: 600; }
    .spec-progress .icons .material-symbols-outlined { font-size: 14px; color: var(--fg-muted); }
    .spec-progress .step.active .icons .material-symbols-outlined { color: var(--success); }
    .darkmatter-btn { background: var(--accent); border: none; color: var(--bg); padding: 6px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; transition: background 0.2s; font-weight: 500; font-family: inherit; height: 26px; position: relative; }
    .darkmatter-btn:hover { background: var(--accent-hover); }
    .darkmatter-btn:disabled { opacity: 0.5; cursor: default; }
    .darkmatter-btn .loader { display: none; position: absolute; left: calc(50% - 8px); top: calc(50% - 8px); width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: var(--bg); border-radius: 50%; animation: spin 1s linear infinite; }
    .darkmatter-btn.loading .loader { display: block; }
    .darkmatter-btn.loading .button-text { visibility: hidden; }

    /* Action buttons */
    .spec-action-row { display: none; align-items: center; gap: 8px; flex-wrap: wrap; margin: 8px 0; }
    .spec-action-row.visible { display: flex; }
    .spec-action-btn { display: inline-flex; align-items: center; justify-content: center; min-width: 140px; height: 32px; padding: 0 14px; border: 1px solid var(--line); border-radius: 8px; background: var(--bg-card); color: var(--fg); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .spec-action-btn:hover { background: var(--bg-alt); border-color: var(--accent); }
    .spec-action-btn--excel { border-color: var(--success); color: var(--success); }
    .spec-action-btn--excel:hover { background: var(--success); color: #fff; border-color: var(--success); }
    .spec-action-btn .material-symbols-outlined { font-size: 16px; margin-right: 4px; }

    /* Spec rows + slideshow */
    .modalRow { display: flex; gap: 6px; margin-top: 6px; flex-wrap: nowrap; }
    .modalColumn { display: flex; flex-direction: column; gap: 6px; }
    .modalCONTEINERpost { display: flex; gap: 8px; padding: 8px; border: 1px solid var(--line-light); border-radius: 8px; margin-top: 6px; background: var(--bg); }

    .slideshow-container { position: relative; flex: 1; min-width: 700px; display: grid; border-radius: 8px; }
    .slide { grid-area: 1 / 1; width: 100%; height: auto; opacity: 0; visibility: hidden; transition: opacity 0.4s, visibility 0.4s; }
    .slide.active { opacity: 1; visibility: visible; z-index: 2; }
    .slide-content { padding: 24px 30px 8px 0; }
    .caption { padding: 6px 12px; font-size: 11px; letter-spacing: 0.5px; text-align: right; color: var(--fg-muted); font-weight: 500; }
    .prev, .next { cursor: pointer; position: absolute; top: 18px; color: var(--fg-muted); font-size: 16px; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--bg); border: 1px solid var(--line); transition: all 0.2s; opacity: 0.85; z-index: 3; user-select: none; font-weight: bold; }
    .prev:hover, .next:hover { opacity: 1; background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .prev { left: 4px; } .next { right: 4px; }
    .dots-container { position: absolute; bottom: 38px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; z-index: 3; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--line); cursor: pointer; transition: all 0.3s; }
    .dot.active { background: var(--accent); transform: scale(1.2); }

    .spec-close-btn-accent { background: var(--accent); color: var(--bg); border: none; border-radius: 6px; height: 30px; width: 30px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: background 0.2s; position: absolute; right: -38px; top: 50%; transform: translateY(-50%); z-index: 10; box-shadow: 0 2px 5px rgba(0,0,0,.1); }
    .spec-close-btn-accent:hover { background: var(--accent-hover); }

    .copy-tooltip { position: fixed; background: var(--accent); color: var(--bg); padding: 4px 8px; border-radius: 4px; font-size: 11px; pointer-events: none; z-index: 11000; }

    .spec-context-menu { position: absolute; display: none; min-width: 220px; background: var(--bg); color: var(--fg); border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,.1); padding: 6px 0; z-index: 4000; }
    .spec-context-menu.visible { display: block; }
    .spec-context-menu button { width: 100%; padding: 9px 16px; border: none; background: none; font-size: 13px; text-align: left; color: inherit; cursor: pointer; transition: background 0.2s; font-family: inherit; }
    .spec-context-menu button:hover { background: var(--bg-alt); }

    .toasts { position: fixed; bottom: 16px; right: 16px; z-index: 5000; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: var(--bg); border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; box-shadow: 0 10px 25px rgba(0,0,0,.1); font-size: 13px; min-width: 220px; max-width: 360px; animation: slideIn 0.2s ease-out; }
    .toast.success { border-left: 4px solid var(--success); }
    .toast.error { border-left: 4px solid var(--error); }
    .toast.info { border-left: 4px solid var(--accent); }
    @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }

    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade { transition: opacity 0.5s; opacity: 0.3; }

    @media (max-width: 768px) {
      .header-inner { padding: 0 12px; }
      .login-card { width: 95vw; height: auto; flex-direction: column; }
      .login-overlay { display: none; }
      .login-form-area { position: relative; left: 0; width: 100%; padding: 20px 0; }

<div class="theme-transition-overlay"></div>

<!-- Preloader -->
<div id="preloader"><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div><div class="line"></div></div>

<!-- DB disconnect overlay -->
<div id="db-disconnect-overlay"></div>

<!-- ============================================
     LOGIN SCREEN
     ============================================ -->
<div id="login-wrapper">
  <div class="login-card">
    <div class="login-overlay" id="overlay">
      <div class="ov-pane signin">
        <h3>ТОЛЬКО УЗНАЛИ О НАС?</h3>
        <p>Расскажите немного о себе,<br>и совершенствуйте своё дело вместе с нами!</p>
        <button class="btn-overlay" id="slide-right-button">Создать учётную запись</button>
      </div>
      <div class="ov-pane signup" style="text-align:left;">
        <h3>МЫ ЗНАКОМЫ?</h3>
        <p>Если вы уже зарегистрированы,<br>перейдите на форму входа</p>
        <button class="btn-overlay" id="slide-left-button">Форма входа</button>
      </div>
    </div>
    <div class="login-form-area">
      <div class="form-pane signin show" id="sign-up-info">
        <h2>AI Equipment Selection</h2>
        <form id="login-form" autocomplete="on">
          <div class="modalFORM">
            <h3>ФОРМА ВХОДА</h3>
            <button type="button" class="btn-google-login" id="google-signin-btn">
              <svg width="18" height="18" viewBox="0 0 24 24">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
              </svg>
              Войти через Google
            </button>
            <div class="login-divider"><span>или</span></div>
            <input class="inputField" type="email" placeholder="email: user@gmail.com" id="loginEmail" name="email" autocomplete="username" required>
            <input class="inputField" type="password" placeholder="ваш пароль" id="loginPassword" name="password" autocomplete="current-password" minlength="6" required>
            <div id="login-error" class="login-error" style="display:none"></div>
            <button class="btn-submit" id="loginBtn">Войти</button>
          </div>
        </form>
      </div>
      <div class="form-pane signup" id="sign-in-info">
        <h2>AI Equipment Selection</h2>
        <form id="registration-form" autocomplete="on">
          <div class="modalFORM">
            <h3>ФОРМА РЕГИСТРАЦИИ</h3>
            <input class="inputField" placeholder="Имя и фамилия" type="text" name="full_name" required>
            <input class="inputField" placeholder="mail@gmail.com" type="email" name="email" autocomplete="email" required>
            <input class="inputField" placeholder="пароль (мин. 6 символов)" type="password" name="password" autocomplete="new-password" minlength="6" required>
            <div id="signup-error" class="login-error" style="display:none"></div>
            <button class="btn-submit" id="regBtn">Создать аккаунт</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
