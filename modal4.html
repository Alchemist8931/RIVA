<style>
/* ============================================================ RIVA · modal4 — Управление ============================================================ */
.m4{ color:var(--text); }
.m4-head{ display:flex; align-items:center; justify-content:space-between; gap:var(--sp-4); margin-bottom:var(--sp-5); flex-wrap:wrap; }
.m4-title{ font-size:1.35rem; font-weight:700; letter-spacing:-.02em; }
.m4-tools{ display:flex; align-items:center; gap:var(--sp-3); flex-wrap:wrap; }
.m4-pill{ display:inline-flex; align-items:center; gap:6px; height:34px; padding:0 var(--sp-3); border-radius:var(--r); background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent-line); font-size:.8rem; font-weight:600; }
.m4-pill.muted{ background:var(--card); color:var(--text-3); border-color:var(--border); font-weight:500; }
.m4-pill svg{ width:14px; height:14px; }
.m4-seg{ display:inline-flex; padding:3px; gap:2px; background:var(--card); border:1px solid var(--border); border-radius:var(--r); }
.m4-seg button{ font-size:.8rem; color:var(--text-3); padding:6px 12px; border-radius:var(--r-sm); white-space:nowrap; }
.m4-seg button.on{ background:var(--accent-soft); color:var(--accent); }
.m4-search{ display:flex; align-items:center; gap:var(--sp-2); height:38px; padding:0 var(--sp-3); background:var(--card); border:1px solid var(--border); border-radius:var(--r); color:var(--text-3); min-width:180px; }
.m4-search:focus-within{ border-color:var(--accent-line); }
.m4-search svg{ width:15px; height:15px; }
.m4-search input{ flex:1; background:none; border:none; outline:none; color:var(--text); font-size:.875rem; min-width:0; }

.m4-btn{ display:inline-flex; align-items:center; gap:var(--sp-2); height:38px; padding:0 var(--sp-4); border-radius:var(--r); background:var(--btn-bg); color:var(--btn-fg); font-size:.875rem; font-weight:600; box-shadow:var(--shadow-card); transition:transform var(--dur-fast) var(--ease),opacity var(--dur-fast) var(--ease); white-space:nowrap; }
.m4-btn:hover{ transform:translateY(-1px); opacity:.92; }
.m4-btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
.m4-btn svg{ width:16px; height:16px; }
.m4-btn.ghost{ background:var(--card); color:var(--text); border:1px solid var(--border-strong); box-shadow:none; }
.m4-btn.ghost:hover{ background:var(--card-hover); }
.m4-btn.sm{ height:32px; padding:0 var(--sp-3); font-size:.82rem; }

.m4-panel{ display:none; }
.m4-panel.on{ display:block; animation:m4in .3s var(--ease); }
@keyframes m4in{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:none; } }

.m4-kpis{ display:grid; grid-template-columns:repeat(4,1fr); gap:var(--sp-4); margin-bottom:var(--sp-5); }
@media (max-width:1000px){ .m4-kpis{ grid-template-columns:repeat(2,1fr); } }
@media (max-width:560px){ .m4-kpis{ grid-template-columns:1fr; } }
.m4-kpi{ padding:var(--sp-5); border:1px solid var(--border); border-radius:var(--r-lg); background:var(--card); box-shadow:var(--shadow-card); }
.m4-kpi .k{ font-size:.78rem; color:var(--text-3); display:flex; align-items:center; gap:6px; }
.m4-kpi .k svg{ width:15px; height:15px; }
.m4-kpi .v{ font-size:1.7rem; font-weight:700; letter-spacing:-.02em; margin-top:var(--sp-3); }
.m4-kpi .s{ font-size:.8rem; margin-top:4px; color:var(--text-2); }
.m4-kpi .s.up{ color:var(--st-completed); } .m4-kpi .s.down{ color:var(--st-cancelled); }

.m4-grid2{ display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-4); }
@media (max-width:900px){ .m4-grid2{ grid-template-columns:1fr; } }
.m4-card{ border:1px solid var(--border); border-radius:var(--r-lg); background:var(--card); box-shadow:var(--shadow-card); overflow:hidden; }
.m4-card .ch{ padding:var(--sp-4) var(--sp-5); border-bottom:1px solid var(--border); font-weight:600; font-size:.95rem; display:flex; align-items:center; justify-content:space-between; }

.m4-tablewrap{ overflow-x:auto; }
table.m4-tbl{ width:100%; border-collapse:collapse; font-size:.875rem; }
.m4-tbl th{ text-align:left; font-size:.72rem; letter-spacing:.06em; text-transform:uppercase; color:var(--text-3); font-weight:600; padding:var(--sp-3) var(--sp-4); border-bottom:1px solid var(--border); white-space:nowrap; }
.m4-tbl td{ padding:var(--sp-3) var(--sp-4); border-bottom:1px solid var(--border); color:var(--text-2); vertical-align:middle; }
.m4-tbl tr:last-child td{ border-bottom:none; }
.m4-tbl tbody tr:hover{ background:var(--card-hover); }
.m4-tbl td.num, .m4-tbl th.num{ text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
.m4-tbl .nm{ color:var(--text); font-weight:600; }
.m4-tbl .sub{ color:var(--text-3); font-size:.78rem; font-family:var(--font-mono); }
.inc{ color:var(--st-completed); font-weight:600; } .exp{ color:var(--st-cancelled); font-weight:600; }

.m4-chip{ display:inline-flex; align-items:center; gap:5px; font-size:.74rem; font-weight:500; padding:3px 9px; border-radius:var(--r-sm); border:1px solid var(--border); background:var(--card); color:var(--text-2); white-space:nowrap; }
.m4-chip.ro{ color:var(--text-3); } .m4-chip.lock{ opacity:.7; }
.m4-chip.on-chip{ color:var(--st-completed); } .m4-chip.off-chip{ color:var(--text-3); }
.role-admin{ color:var(--accent); background:var(--accent-soft); border-color:var(--accent-line); }
.dot-on{ width:8px;height:8px;border-radius:50%;background:var(--st-completed);display:inline-block; }
.dot-off{ width:8px;height:8px;border-radius:50%;background:var(--text-3);display:inline-block; }

.m4-acts{ display:flex; gap:6px; justify-content:flex-end; }
.m4-ic{ width:30px; height:30px; display:grid; place-items:center; border-radius:var(--r-sm); border:1px solid var(--border); background:var(--card); color:var(--text-2); transition:all var(--dur-fast) var(--ease); }
.m4-ic:hover{ border-color:var(--border-strong); color:var(--text); background:var(--card-hover); }
.m4-ic.danger:hover{ color:var(--st-cancelled); border-color:var(--st-cancelled); }
.m4-ic svg{ width:15px; height:15px; }

.m4-empty{ display:grid; place-items:center; gap:var(--sp-2); padding:var(--sp-10) var(--sp-4); text-align:center; color:var(--text-3); }
.m4-empty .t{ font-size:1rem; font-weight:600; color:var(--text-2); }
.m4-empty .d{ font-size:.875rem; max-width:42ch; }
.m4-loading{ display:grid; place-items:center; gap:var(--sp-3); padding:var(--sp-10); color:var(--text-3); }
.m4-loading .spin{ width:24px; height:24px; border-radius:50%; border:2px solid var(--border); border-top-color:var(--accent); animation:m4spin 1s linear infinite; }
@keyframes m4spin{ to{ transform:rotate(360deg);} }
.m4-section-block{ margin-bottom:var(--sp-5); }
.m4-section-block h4{ font-size:.78rem; text-transform:uppercase; letter-spacing:.08em; color:var(--text-3); margin-bottom:var(--sp-3); }
.m4-unit-row{ display:flex; align-items:center; gap:var(--sp-3); padding:var(--sp-3) var(--sp-4); border:1px solid var(--border); border-radius:var(--r); background:var(--card); margin-bottom:8px; }
.m4-unit-row .un{ flex:1; font-weight:600; color:var(--text); }
.m4-cat-bar{ display:flex; flex-direction:column; gap:8px; }
.m4-cat{ display:grid; grid-template-columns:130px 1fr 90px; gap:var(--sp-3); align-items:center; font-size:.83rem; }
.m4-cat .track{ height:8px; border-radius:var(--r-dot); background:var(--card); overflow:hidden; }
.m4-cat .fill{ height:100%; border-radius:var(--r-dot); }

/* диалоги */
.m4-overlay{ position:fixed; inset:0; z-index:400; display:grid; place-items:center; padding:var(--sp-4); background:rgba(0,0,0,.45); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); animation:m4fade .2s var(--ease); }
@keyframes m4fade{ from{ opacity:0;} to{ opacity:1; } }
.m4-dialog{ width:100%; max-width:560px; max-height:90vh; display:flex; flex-direction:column; background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--r-lg); box-shadow:var(--shadow-pop); animation:m4pop .25s var(--ease); }
@keyframes m4pop{ from{ opacity:0; transform:translateY(10px) scale(.98);} to{ opacity:1; transform:none; } }
.m4-dhead{ display:flex; align-items:center; justify-content:space-between; padding:var(--sp-4) var(--sp-5); border-bottom:1px solid var(--border); }
.m4-dhead h3{ font-size:1.05rem; font-weight:700; }
.m4-dclose{ width:32px; height:32px; display:grid; place-items:center; border-radius:var(--r-sm); color:var(--text-3); }
.m4-dclose:hover{ background:var(--card-hover); color:var(--text); }
.m4-dbody{ padding:var(--sp-5); overflow-y:auto; }
.m4-dfoot{ display:flex; justify-content:flex-end; gap:var(--sp-3); padding:var(--sp-4) var(--sp-5); border-top:1px solid var(--border); }
.m4-field{ margin-bottom:var(--sp-4); } .m4-field:last-child{ margin-bottom:0; }
.m4-field label{ display:block; font-size:.78rem; font-weight:600; color:var(--text-2); margin-bottom:6px; }
.m4-input,.m4-select,.m4-textarea{ width:100%; height:40px; padding:0 var(--sp-3); background:var(--card); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-size:.9rem; font-family:inherit; }
.m4-textarea{ height:auto; min-height:60px; padding:var(--sp-2) var(--sp-3); resize:vertical; }
.m4-input:focus,.m4-select:focus,.m4-textarea:focus{ outline:none; border-color:var(--accent-line); }
.m4-row2{ display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-3); }
.m4-hint{ font-size:.78rem; color:var(--text-3); margin-top:6px; }
.m4-check{ display:flex; align-items:center; gap:var(--sp-2); padding:8px 10px; border:1px solid var(--border); border-radius:var(--r-sm); margin-bottom:6px; cursor:pointer; font-size:.875rem; }
.m4-check input{ width:16px; height:16px; }
.m4-check.sel{ border-color:var(--accent-line); background:var(--accent-soft); }
</style>

<div class="m4" id="m4-root">
  <div class="m4-head">
    <div class="m4-title" id="m4-title">Дашборд</div>
    <div class="m4-tools" id="m4-tools"></div>
  </div>
  <div class="m4-panel" data-tab="dashboard" id="m4p-dashboard"></div>
  <div class="m4-panel" data-tab="treasury" id="m4p-treasury"></div>
  <div class="m4-panel" data-tab="org" id="m4p-org"></div>
  <div class="m4-panel" data-tab="members" id="m4p-members"></div>
  <div class="m4-panel" data-tab="reports" id="m4p-reports"></div>
  <div class="m4-panel" data-tab="audit" id="m4p-audit"></div>
</div>

<script>
(function(){
  var RIVA=window.RIVA, U=window.RIVA_UTILS;
  if(!RIVA||!U){ var r=document.getElementById('m4-root'); if(r) r.innerHTML='<div class="m4-empty"><div class="t">Модуль не инициализирован</div></div>'; return; }
  var sb=RIVA.sb;
  var INSTANCE=Date.now()+'-'+Math.random(); RIVA._m4Instance=INSTANCE;
  function alive(){ return RIVA._m4Instance===INSTANCE && document.getElementById('m4-root'); }

  var curTab='dashboard', period='month', trView='ops', search='';
  var cache={ org:null };

  function role(){ return (RIVA.state.currentGroup && RIVA.state.currentGroup.role)||null; }
  function isAdmin(){ return role()==='admin'; }
  function canManage(){ return ['admin','management'].indexOf(role())>=0; }
  function groupId(){ return RIVA.state.currentGroup && RIVA.state.currentGroup.group_id; }
  function meName(){ var p=RIVA.state.profile; var m=(RIVA.state.user&&RIVA.state.user.user_metadata)||{}; return (p&&p.name)||m.full_name||m.name||(RIVA.state.user&&RIVA.state.user.email)||'—'; }
  function num(v){ var n=typeof v==='number'?v:parseFloat(v); return isFinite(n)?n:0; }

  var ROLE_LABEL={admin:'Администратор',management:'Управление',supply:'Снабжение',production:'Производство',sales:'Продажи'};
  var SECTION_LABEL={supply:'Склады',production:'Производства',sales:'Отделы продаж'};
  var CAT_LABEL={consumables:'Расходники',logistics:'Логистика',marketing:'Маркетинг',rent:'Аренда',salary:'Зарплата',equipment:'Оборудование',taxes:'Налоги',refund:'Возврат',defect:'Брак',test_batch:'Тестовая партия',withdrawal:'Вывод средств',other_expense:'Прочий расход',other_income:'Прочий доход',auto_sales:'Продажи (авто)',auto_supply:'Закупки (авто)'};
  var EXP_CATS=['consumables','logistics','marketing','rent','salary','equipment','taxes','refund','defect','test_batch','withdrawal','other_expense'];
  var INC_CATS=['other_income'];
  var INTERVAL_LABEL={weekly:'Еженедельно',monthly:'Ежемесячно',quarterly:'Ежеквартально',yearly:'Ежегодно'};

  function tabFromLabel(label){ var l=(label||'').toLowerCase();
    if(l.indexOf('казнач')>=0) return 'treasury';
    if(l.indexOf('подразделен')>=0||l.indexOf('цепоч')>=0) return 'org';
    if(l.indexOf('пользоват')>=0||l.indexOf('участник')>=0) return 'members';
    if(l.indexOf('отчёт')>=0||l.indexOf('отчет')>=0) return 'reports';
    if(l.indexOf('журнал')>=0||l.indexOf('аудит')>=0) return 'audit';
    return 'dashboard';
  }

  function showTab(tab){
    curTab=tab; search='';
    var titles={dashboard:'Дашборд',treasury:'Казначейство',org:'Подразделения и цепочки',members:'Пользователи',reports:'Отчёты',audit:'Журнал'};
    document.getElementById('m4-title').textContent=titles[tab]||'';
    document.querySelectorAll('#m4-root .m4-panel').forEach(function(p){ p.classList.toggle('on', p.getAttribute('data-tab')===tab); });
    renderTools(); loadTab(tab);
  }

  function periodSeg(){
    var kinds=[['today','Сегодня'],['week','Неделя'],['month','Месяц'],['quarter','Квартал'],['year','Год']];
    var seg=document.createElement('div'); seg.className='m4-seg';
    seg.innerHTML=kinds.map(function(k){ return '<button data-p="'+k[0]+'"'+(period===k[0]?' class="on"':'')+'>'+k[1]+'</button>'; }).join('');
    seg.addEventListener('click', function(e){ var b=e.target.closest('button'); if(!b) return; period=b.getAttribute('data-p'); renderTools(); loadTab(curTab); });
    return seg;
  }
  function searchBox(ph){
    var s=document.createElement('label'); s.className='m4-search';
    s.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>';
    var i=document.createElement('input'); i.type='text'; i.placeholder=ph||'Поиск'; i.value=search;
    i.addEventListener('input', function(){ search=i.value.toLowerCase(); renderCurrent(); }); s.appendChild(i); return s;
  }
  function renderTools(){
    var t=document.getElementById('m4-tools'); t.innerHTML='';
    if(curTab==='dashboard'||curTab==='treasury'||curTab==='reports') t.appendChild(periodSeg());
    if(curTab==='treasury'){
      var seg=document.createElement('div'); seg.className='m4-seg';
      seg.innerHTML='<button data-v="ops"'+(trView==='ops'?' class="on"':'')+'>Операции</button><button data-v="rec"'+(trView==='rec'?' class="on"':'')+'>Регулярные</button>';
      seg.addEventListener('click', function(e){ var b=e.target.closest('button'); if(!b) return; trView=b.getAttribute('data-v'); loadTab('treasury'); });
      t.appendChild(seg);
      if(canManage()){ t.appendChild(mkbtn('Операция', plus(), function(){ openOpDialog(); })); }
    }
    if(curTab==='org' && isAdmin()){ t.appendChild(mkbtn('Подразделение', plus(), function(){ openUnitDialog(); })); t.appendChild(mkbtn('Цепочка', plus(), function(){ openChainDialog(); },'ghost')); }
    if(curTab==='members'){ t.appendChild(searchBox('Поиск участника')); if(isAdmin()) t.appendChild(mkbtn('Пригласить', plus(), function(){ openInviteDialog(); })); }
    if(curTab==='audit'){ t.appendChild(searchBox('Поиск в журнале')); }
  }
  function mkbtn(label,icon,on,cls){ var b=document.createElement('button'); b.className='m4-btn'+(cls?(' '+cls):''); b.innerHTML=icon+'<span>'+label+'</span>'; b.addEventListener('click',on); return b; }
  function plus(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>'; }

  /* ---------- период ---------- */
  function computePeriod(kind){
    var now=new Date(); function D(y,m,d){ return new Date(y,m,d); } function addD(dt,n){ var x=new Date(dt); x.setDate(x.getDate()+n); return x; }
    var from,to,pf,pt;
    if(kind==='today'){ from=D(now.getFullYear(),now.getMonth(),now.getDate()); to=addD(from,1); pf=addD(from,-1); pt=from; }
    else if(kind==='week'){ var wd=(now.getDay()+6)%7; from=addD(D(now.getFullYear(),now.getMonth(),now.getDate()),-wd); to=addD(from,7); pf=addD(from,-7); pt=from; }
    else if(kind==='quarter'){ var q=Math.floor(now.getMonth()/3); from=D(now.getFullYear(),q*3,1); to=D(now.getFullYear(),q*3+3,1); pf=D(now.getFullYear(),q*3-3,1); pt=from; }
    else if(kind==='year'){ from=D(now.getFullYear(),0,1); to=D(now.getFullYear()+1,0,1); pf=D(now.getFullYear()-1,0,1); pt=from; }
    else { from=D(now.getFullYear(),now.getMonth(),1); to=D(now.getFullYear(),now.getMonth()+1,1); pf=D(now.getFullYear(),now.getMonth()-1,1); pt=from; }
    return { from:from.toISOString(), to:to.toISOString(), pf:pf.toISOString(), pt:pt.toISOString() };
  }
  function delta(cur,prev){ if(!prev) return null; return (cur-prev)/prev*100; }
  function deltaHtml(cur,prev,inverse){ var d=delta(cur,prev); if(d===null) return ''; var up=d>=0; var good=inverse?!up:up; return '<div class="s '+(good?'up':'down')+'">'+(up?'▲':'▼')+' '+Math.abs(d).toFixed(1)+'% к прошл.</div>'; }

  /* ---------- загрузка вкладок ---------- */
  async function loadTab(tab){
    var panel=document.getElementById('m4p-'+tab); panel.innerHTML='<div class="m4-loading"><div class="spin"></div>Загрузка…</div>';
    try{
      if(tab==='dashboard') await loadDashboard(panel);
      else if(tab==='treasury') await loadTreasury(panel);
      else if(tab==='org') await loadOrg(panel);
      else if(tab==='members') await loadMembers(panel);
      else if(tab==='reports') await loadReports(panel);
      else if(tab==='audit') await loadAudit(panel);
    }catch(err){ if(alive()) panel.innerHTML='<div class="m4-empty"><div class="t">Не удалось загрузить</div><div class="d">'+U.esc(err.message||String(err))+'</div></div>'; }
  }
  function renderCurrent(){ if(curTab==='members') renderMembers(); else if(curTab==='audit') renderAudit(); }

  /* ============ ДАШБОРД ============ */
  var _members=[], _pending=[], _audit=[];
  async function loadDashboard(panel){
    var p=computePeriod(period);
    var d=await RIVA.rpc('get_dashboard_summary',{p_from:p.from,p_to:p.to});
    if(!alive()) return;
    if(!(d&&d.ok)){ panel.innerHTML='<div class="m4-empty"><div class="t">Нет доступа</div><div class="d">'+U.esc((d&&d.error)||'')+'</div></div>'; return; }
    var s=d.sales||{}, su=d.supply||{}, pr=d.production||{}, w=d.warehouse||{};
    var whVal=num(w.materials_value)+num(w.products_value);
    var kpis='<div class="m4-kpis">'
      +kpi('Выручка (завершённые продажи)', U.formatMoney(s.revenue), (s.count||0)+' заказов', 'cart')
      +kpi('Закупки (оприходовано)', U.formatMoney(su.spent), (su.count||0)+' поставок', 'truck')
      +kpi('Выпуск продукции', U.formatNumber(pr.output)+' ед.', (pr.runs||0)+' партий', 'box')
      +kpi('Склад (стоимость)', U.formatMoney(whVal), (w.materials_count||0)+' мат. · '+(w.products_count||0)+' прод.', 'wh')
      +'</div>';
    var top=''
      +'<div class="m4-grid2">'
      +'<div class="m4-card"><div class="ch">Топ продаж</div>'+topTable(d.top_sales,'sales')+'</div>'
      +'<div class="m4-card"><div class="ch">Топ поставщиков</div>'+topTable(d.top_suppliers,'sup')+'</div>'
      +'</div>';
    panel.innerHTML=kpis+top;
  }
  function kpi(k,v,s,icon){ var ic={cart:'<path d="M3 3h2l2.4 12.3a2 2 0 0 0 2 1.7h7.7a2 2 0 0 0 2-1.6L22 8H6"/>',truck:'<path d="M3 7h11v8H3zM14 10h4l3 3v2h-7z"/>',box:'<path d="M21 16V8l-9-5-9 5v8l9 5z"/><path d="m3.3 7 8.7 5 8.7-5"/>',wh:'<path d="M3 7h13l5 5v6a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1z"/>'}[icon]||'';
    return '<div class="m4-kpi"><div class="k"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">'+ic+'</svg>'+k+'</div><div class="v">'+v+'</div><div class="s">'+s+'</div></div>'; }
  function topTable(rows,kind){
    rows=Array.isArray(rows)?rows:[];
    if(!rows.length) return '<div class="m4-empty"><div class="d">Нет данных за период</div></div>';
    var html='<div class="m4-tablewrap"><table class="m4-tbl"><tbody>';
    rows.forEach(function(r){

  async function loadTreasury(panel){
    try{ await RIVA.rpc('treasury_materialize_recurring'); }catch(e){}
    if(trView==='rec'){ return loadRecurring(panel); }
    var p=computePeriod(period);
    var sum=await RIVA.rpc('get_treasury_summary',{p_from:p.from,p_to:p.to,p_prev_from:p.pf,p_prev_to:p.pt});
    var led=await RIVA.rpc('get_treasury_ledger',{p_from:p.from,p_to:p.to});
    if(!alive()) return;
    if(!(sum&&sum.ok)){ panel.innerHTML='<div class="m4-empty"><div class="t">Нет доступа к казначейству</div></div>'; return; }
    var incCur=num(sum.auto.income_cur)+num(sum.manual.income_cur), incPrev=num(sum.auto.income_prev)+num(sum.manual.income_prev);
    var expCur=num(sum.auto.expense_cur)+num(sum.manual.expense_cur), expPrev=num(sum.auto.expense_prev)+num(sum.manual.expense_prev);
    var netCur=incCur-expCur, netPrev=incPrev-expPrev;
    var kpis='<div class="m4-kpis" style="grid-template-columns:repeat(3,1fr)">'
      +'<div class="m4-kpi"><div class="k">Доходы</div><div class="v inc">'+U.formatMoney(incCur)+'</div>'+deltaHtml(incCur,incPrev,false)+'</div>'
      +'<div class="m4-kpi"><div class="k">Расходы</div><div class="v exp">'+U.formatMoney(expCur)+'</div>'+deltaHtml(expCur,expPrev,true)+'</div>'
      +'<div class="m4-kpi"><div class="k">Итог (поток)</div><div class="v" style="color:'+(netCur>=0?'var(--st-completed)':'var(--st-cancelled)')+'">'+U.formatMoney(netCur)+'</div>'+deltaHtml(netCur,netPrev,false)+'</div>'
      +'</div>';
    // категории расходов
    var cats=(sum.categories||[]).filter(function(c){return c.direction==='expense';});
    var maxCat=cats.reduce(function(m,c){return Math.max(m,num(c.total));},0);
    var catHtml=cats.length?('<div class="m4-card" style="margin-bottom:var(--sp-5)"><div class="ch">Расходы по категориям (ручные)</div><div style="padding:var(--sp-4) var(--sp-5)"><div class="m4-cat-bar">'
      +cats.map(function(c){ var pct=maxCat?num(c.total)/maxCat*100:0; return '<div class="m4-cat"><span>'+U.esc(CAT_LABEL[c.category]||c.category)+'</span><span class="track"><span class="fill" style="width:'+pct+'%;background:var(--st-cancelled)"></span></span><span class="num exp">'+U.formatMoney(c.total)+'</span></div>'; }).join('')
      +'</div></div></div>'):'';
    // лента
    var rows=(led&&led.ok&&led.rows)||[];
    var ledHtml='<div class="m4-card"><div class="ch">Операции за период <span class="sub">'+rows.length+'</span></div>';
    if(!rows.length) ledHtml+='<div class="m4-empty"><div class="d">Нет операций за период</div></div>';
    else{
      ledHtml+='<div class="m4-tablewrap"><table class="m4-tbl"><thead><tr><th>Дата</th><th>Категория</th><th>Описание</th><th class="num">Сумма</th><th></th></tr></thead><tbody>';
      rows.forEach(function(r){
        var inc=r.direction==='income';
        ledHtml+='<tr><td class="sub">'+U.formatDate(r.occurred_on)+'</td>'
          +'<td>'+U.esc(CAT_LABEL[r.category]||r.category)+(r.source==='recurring'?' <span class="m4-chip ro">повтор</span>':'')+(r.source&&r.source.indexOf('auto')===0?' <span class="m4-chip lock">авто</span>':'')+'</td>'
          +'<td><div class="nm" style="font-weight:500">'+U.esc(r.description||'—')+'</div>'+(r.counterparty?'<div class="sub">'+U.esc(r.counterparty)+'</div>':'')+'</td>'
          +'<td class="num '+(inc?'inc':'exp')+'">'+(inc?'+':'−')+U.formatMoney(r.amount)+'</td>'
          +'<td>'+(r.editable&&canManage()?('<div class="m4-acts"><button class="m4-ic danger" title="Удалить" data-del="'+U.esc(r.id)+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button></div>'):'')+'</td></tr>';
      });
      ledHtml+='</tbody></table></div>';
    }
    ledHtml+='</div>';
    panel.innerHTML=kpis+catHtml+ledHtml;
    panel.querySelectorAll('[data-del]').forEach(function(b){ b.addEventListener('click', function(){ var id=b.getAttribute('data-del'); confirmAct('Удалить операцию?','Действие необратимо.','Удалить',true,async function(){ var r=await sb.from('treasury_operations').delete().eq('id',id); if(r.error){ U.toast('Ошибка: '+r.error.message); return false; } U.toast('Удалено'); await loadTab('treasury'); }); }); });
  }

      var box=ov.querySelector('#ca-body'); box.innerHTML='<div class="m4-loading"><div class="spin"></div>Расчёт…</div>';
      var p=computePeriod(per); var a=await RIVA.rpc('get_chain_analytics',{p_chain_id:chain.id,p_from:p.from,p_to:p.to});
      if(!a||!a.ok){ box.innerHTML='<div class="m4-hint">'+U.esc((a&&a.error)||'Ошибка')+'</div>'; return; }
      box.innerHTML='<div class="m4-kpis" style="grid-template-columns:1fr 1fr;gap:var(--sp-3)">'
        +'<div class="m4-kpi"><div class="k">Выручка</div><div class="v inc" style="font-size:1.3rem">'+U.formatMoney(a.sales.revenue)+'</div><div class="s">'+(a.sales.count||0)+' заказов</div></div>'
        +'<div class="m4-kpi"><div class="k">Закупки</div><div class="v exp" style="font-size:1.3rem">'+U.formatMoney(a.supply.spent)+'</div><div class="s">'+(a.supply.count||0)+' поставок</div></div>'
        +'<div class="m4-kpi"><div class="k">Выпуск</div><div class="v" style="font-size:1.3rem">'+U.formatNumber(a.production.output)+' ед.</div><div class="s">'+(a.production.runs||0)+' партий</div></div>'
        +'<div class="m4-kpi"><div class="k">Оценка прибыли</div><div class="v" style="font-size:1.3rem;color:'+(num(a.profit_estimate)>=0?'var(--st-completed)':'var(--st-cancelled)')+'">'+U.formatMoney(a.profit_estimate)+'</div><div class="s">склад: '+U.formatMoney(a.warehouse_value)+'</div></div>'
        +'</div>';
    }
    ov.querySelector('#ca-seg').addEventListener('click', function(e){ var b=e.target.closest('button'); if(!b) return; per=b.getAttribute('data-p'); ov.querySelectorAll('#ca-seg button').forEach(function(x){x.classList.remove('on');}); b.classList.add('on'); run(); });
    run();
  }

  /* ============ ПОЛЬЗОВАТЕЛИ ============ */
  async function loadMembers(panel){
    var m=await RIVA.rpc('list_group_members'); _members=Array.isArray(m)?m:[];
    var p=await RIVA.rpc('list_pending_invitations'); _pending=Array.isArray(p)?p:[];
    if(!alive()) return; renderMembers();
  }
  function renderMembers(){
    var panel=document.getElementById('m4p-members');
    var rows=_members.filter(function(u){ return !search || (u.name||'').toLowerCase().indexOf(search)>=0 || (u.email||'').toLowerCase().indexOf(search)>=0; });
    var html='<div class="m4-card" style="margin-bottom:var(--sp-5)"><div class="ch">Участники <span class="sub">'+_members.length+'</span></div><div class="m4-tablewrap"><table class="m4-tbl"><thead><tr><th>Участник</th><th>Роль</th><th>Статус</th><th>Сессия</th>'+(isAdmin()?'<th></th>':'')+'</tr></thead><tbody>';
    rows.forEach(function(u){
      html+='<tr><td><div class="nm">'+U.esc(u.name||'—')+(u.is_me?' <span class="m4-chip">вы</span>':'')+(u.is_owner?' <span class="m4-chip role-admin">владелец</span>':'')+'</div><div class="sub">'+U.esc(u.email||'')+'</div></td>'
        +'<td><span class="m4-chip'+(u.role==='admin'?' role-admin':'')+'">'+U.esc(ROLE_LABEL[u.role]||u.role)+'</span></td>'
        +'<td>'+(u.is_active?'<span class="dot-on"></span> активен':'<span class="dot-off"></span> отключён')+'</td>'
        +'<td>'+(u.session_active?('<span class="dot-on"></span> '+U.esc(u.session_device||'онлайн')):'<span class="sub">—</span>')+'</td>'
        +(isAdmin()?('<td><div class="m4-acts">'+(u.is_owner||u.is_me?'':memberActions(u))+'</div></td>'):'')+'</tr>';
    });
    html+='</tbody></table></div></div>';
    // приглашения
    html+='<div class="m4-card"><div class="ch">Приглашения <span class="sub">'+_pending.length+'</span></div>';
    if(!_pending.length) html+='<div class="m4-empty"><div class="d">Нет ожидающих приглашений</div></div>';
    else{ html+='<div class="m4-tablewrap"><table class="m4-tbl"><thead><tr><th>Email</th><th>Роль</th><th>Истекает</th>'+(isAdmin()?'<th></th>':'')+'</tr></thead><tbody>';
      _pending.forEach(function(p){ html+='<tr><td class="nm">'+U.esc(p.email)+'</td><td>'+U.esc(ROLE_LABEL[p.role]||p.role)+'</td><td class="sub">'+U.formatDate(p.expires_at)+'</td>'+(isAdmin()?('<td><div class="m4-acts"><button class="m4-ic danger" title="Отозвать" data-revoke="'+p.id+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div></td>'):'')+'</tr>'; });
      html+='</tbody></table></div>';
    }
    html+='</div>';
    panel.innerHTML=html;
    if(isAdmin()){
      panel.querySelectorAll('[data-role]').forEach(function(b){ b.onclick=function(){ openRoleDialog(b.getAttribute('data-id')); }; });
      panel.querySelectorAll('[data-units]').forEach(function(b){ b.onclick=function(){ openMemberUnits(b.getAttribute('data-id')); }; });
      panel.querySelectorAll('[data-active]').forEach(function(b){ b.onclick=async function(){ var on=b.getAttribute('data-on')==='1'; var r=await RIVA.rpc('set_member_active',{p_user_id:b.getAttribute('data-id'),p_is_active:!on}); handle(r, on?'Отключён':'Включён','members'); }; });
      panel.querySelectorAll('[data-remove]').forEach(function(b){ b.onclick=function(){ confirmAct('Удалить участника из группы?','Доступ будет отозван.','Удалить',true,async function(){ var r=await RIVA.rpc('remove_member',{p_user_id:b.getAttribute('data-remove')}); return handle(r,'Удалён','members'); }); }; });
      panel.querySelectorAll('[data-revoke]').forEach(function(b){ b.onclick=function(){ confirmAct('Отозвать приглашение?','',' Отозвать',true,async function(){ var r=await RIVA.rpc('revoke_invitation',{p_invitation_id:b.getAttribute('data-revoke')}); return handle(r,'Отозвано','members'); }); }; });
    }
  }
  function memberActions(u){
    return '<button class="m4-ic" title="Роль" data-role="" data-id="'+u.user_id+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M12 3l7 3v6c0 4-3 7-7 8-4-1-7-4-7-8V6z"/></svg></button>'
      +'<button class="m4-ic" title="Подразделения" data-units="" data-id="'+u.user_id+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M3 7h6l2 2h10v9H3z"/></svg></button>'
      +'<button class="m4-ic" title="'+(u.is_active?'Отключить':'Включить')+'" data-active="" data-id="'+u.user_id+'" data-on="'+(u.is_active?'1':'0')+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">'+(u.is_active?'<path d="M18.36 6.64A9 9 0 1 1 5.64 6.64M12 2v10"/>':'<path d="M5 12h14"/>')+'</svg></button>'
      +'<button class="m4-ic danger" title="Удалить" data-remove="'+u.user_id+'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>';
  }
  function openRoleDialog(userId){
    var u=_members.find(function(x){return x.user_id===userId;}); if(!u) return;
    var opts=Object.keys(ROLE_LABEL).map(function(r){ return '<option value="'+r+'"'+(u.role===r?' selected':'')+'>'+ROLE_LABEL[r]+'</option>'; }).join('');
    dialog({ title:'Роль · '+(u.name||u.email), ok:'Сохранить', body:'<div class="m4-field"><label>Роль</label><select class="m4-select" id="rl">'+opts+'</select></div><div class="m4-hint">Снабжение/Производство/Продажи — рядовые роли. Управление и Администратор имеют расширенные права.</div>', onOk:async function(ov){ var r=await RIVA.rpc('update_member_role',{p_user_id:userId,p_role:val(ov,'#rl')}); return handle(r,'Роль обновлена','members'); }});
  }
  async function openMemberUnits(userId){
    if(!cache.org){ cache.org=await RIVA.rpc('get_org_structure'); }
    var org=cache.org; if(!(org&&org.ok)){ U.toast('Нет данных оргструктуры'); return; }
    var mem=(org.members||[]).find(function(m){return m.user_id===userId;});
    var sel={}; (mem&&mem.unit_ids||[]).forEach(function(id){ sel[id]=true; });
    var body='<div class="m4-hint" style="margin-bottom:12px">Если ничего не отмечено — доступ ко <b>всем</b> подразделениям его раздела (общая роль). Отметьте конкретные, чтобы ограничить.</div>';
    ['supply','production','sales'].forEach(function(sec){
      var list=(org.units||[]).filter(function(u){return u.section===sec && u.is_active;});
      if(!list.length) return;
      body+='<div class="m4-section-block"><h4>'+SECTION_LABEL[sec]+'</h4>'+list.map(function(u){ return '<label class="m4-check'+(sel[u.id]?' sel':'')+'"><input type="checkbox" data-uid="'+u.id+'"'+(sel[u.id]?' checked':'')+'><span>'+U.esc(u.name)+'</span></label>'; }).join('')+'</div>';
    });
    dialog({ title:'Доступ к подразделениям', ok:'Сохранить', body:body,
      onMount:function(ov){ ov.querySelectorAll('.m4-check input').forEach(function(c){ c.addEventListener('change', function(){ c.closest('.m4-check').classList.toggle('sel', c.checked); }); }); },
      onOk:async function(ov){ var ids=Array.prototype.map.call(ov.querySelectorAll('.m4-check input:checked'), function(c){ return c.getAttribute('data-uid'); }); var r=await RIVA.rpc('set_member_units',{p_user_id:userId,p_unit_ids:ids}); if(r&&r.ok){ U.toast('Доступ обновлён'); cache.org=null; } else { U.toast('Ошибка: '+((r&&r.error)||'')); return false; } }});
  }
  function openInviteDialog(){
    var opts=Object.keys(ROLE_LABEL).map(function(r){ return '<option value="'+r+'"'+(r==='supply'?' selected':'')+'>'+ROLE_LABEL[r]+'</option>'; }).join('');
    dialog({ title:'Пригласить участника', ok:'Отправить', body:'<div class="m4-field"><label>Email (Google-аккаунт)</label><input class="m4-input" id="inv-email" type="email" placeholder="name@gmail.com"></div><div class="m4-field"><label>Роль</label><select class="m4-select" id="inv-role">'+opts+'</select></div><div class="m4-hint">Приглашение примет аккаунт с этим email при входе через Google.</div>',
      onOk:async function(ov){ var email=val(ov,'#inv-email'); if(!email){ U.toast('Укажите email'); return false; } var r=await RIVA.rpc('invite_member',{p_email:email,p_role:val(ov,'#inv-role')}); if(r&&r.ok){ U.toast('Приглашение создано'); await loadTab('members'); } else { U.toast('Ошибка: '+((r&&r.error)||'')); return false; } }});
  }

  /* ============ ОТЧЁТЫ ============ */
  async function loadReports(panel){
    var p=computePeriod(period);
    var d=await RIVA.rpc('get_dashboard_summary',{p_from:p.from,p_to:p.to});
    var sum=await RIVA.rpc('get_treasury_summary',{p_from:p.from,p_to:p.to,p_prev_from:p.pf,p_prev_to:p.pt});
    if(!alive()) return;
    var s=(d&&d.ok)?d:{sales:{},supply:{},production:{},warehouse:{}};
    var incCur=sum&&sum.ok?num(sum.auto.income_cur)+num(sum.manual.income_cur):0;
    var expCur=sum&&sum.ok?num(sum.auto.expense_cur)+num(sum.manual.expense_cur):0;
    var html='<div class="m4-card" style="margin-bottom:var(--sp-5)"><div class="ch">Сводка за период<button class="m4-btn sm" id="rep-csv">Экспорт ленты CSV</button></div>'
      +'<div class="m4-tablewrap"><table class="m4-tbl"><tbody>'
      +repRow('Выручка (продажи)', U.formatMoney(s.sales.revenue||0))
      +repRow('Закупки (оприходовано)', U.formatMoney(s.supply.spent||0))
      +repRow('Выпуск продукции', U.formatNumber(s.production.output||0)+' ед.')
      +repRow('Доходы (казначейство)', U.formatMoney(incCur))
      +repRow('Расходы (казначейство)', U.formatMoney(expCur))
      +repRow('Денежный поток', U.formatMoney(incCur-expCur))
      +repRow('Стоимость склада', U.formatMoney(num(s.warehouse.materials_value)+num(s.warehouse.products_value)))
      +'</tbody></table></div></div>'
      +'<div class="m4-hint">Аналитику по отдельным направлениям смотрите во вкладке «Подразделения и цепочки» → значок графика у цепочки. Срез по складу/цеху/отделу — выбором подразделения в верхнем меню (фильтр применится к дашборду).</div>';
    panel.innerHTML=html;
    panel.querySelector('#rep-csv').onclick=async function(){ var led=await RIVA.rpc('get_treasury_ledger',{p_from:p.from,p_to:p.to}); if(!(led&&led.ok)){ U.toast('Нет данных'); return; } exportLedgerCsv(led.rows||[]); };
  }
  function repRow(k,v){ return '<tr><td>'+k+'</td><td class="num nm">'+v+'</td></tr>'; }
  function exportLedgerCsv(rows){
    var head=['Дата','Направление','Категория','Описание','Контрагент','Сумма'];
    var lines=[head.join(';')].concat(rows.map(function(r){ return [U.formatDate(r.occurred_on), r.direction==='income'?'доход':'расход', CAT_LABEL[r.category]||r.category, (r.description||'').replace(/;/g,','), (r.counterparty||'').replace(/;/g,','), num(r.amount)].join(';'); }));
    var blob=new Blob(['\ufeff'+lines.join('\n')], {type:'text/csv;charset=utf-8;'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='riva-ledger-'+period+'.csv'; a.click(); setTimeout(function(){ URL.revokeObjectURL(a.href); },1000);
    U.toast('CSV выгружен');
  }

  /* ============ ЖУРНАЛ ============ */
  async function loadAudit(panel){
    var r=await sb.from('audit_log').select('*').order('created_at',{ascending:false}).limit(200);
    if(!alive()) return; _audit=r.error?[]:(r.data||[]); renderAudit();
  }
  function renderAudit(){
    var panel=document.getElementById('m4p-audit');
    var rows=_audit.filter(function(a){ return !search || (a.description||'').toLowerCase().indexOf(search)>=0 || (a.user_name||'').toLowerCase().indexOf(search)>=0 || (a.action||'').toLowerCase().indexOf(search)>=0; });
    if(!_audit.length){ panel.innerHTML='<div class="m4-card"><div class="m4-empty"><div class="t">Журнал пуст</div><div class="d">Здесь фиксируются действия участников: входы, операции, изменения.</div></div></div>'; return; }
    var html='<div class="m4-card"><div class="ch">Журнал действий <span class="sub">'+_audit.length+' (последние 200)</span></div><div class="m4-tablewrap"><table class="m4-tbl"><thead><tr><th>Время</th><th>Пользователь</th><th>Действие</th><th>Описание</th></tr></thead><tbody>';
    rows.forEach(function(a){ html+='<tr><td class="sub">'+U.formatDateTime(a.created_at)+'</td><td class="nm" style="font-weight:500">'+U.esc(a.user_name||'—')+'</td><td><span class="m4-chip ro">'+U.esc(a.action||'')+'</span></td><td>'+U.esc(a.description||'—')+'</td></tr>'; });
    html+='</tbody></table></div></div>';
    panel.innerHTML=html;
  }

  /* ---------- общие ---------- */
  function handle(r, okMsg, reloadTab){ if(r&&r.ok){ U.toast(okMsg); if(reloadTab) loadTab(reloadTab); return true; } U.toast('Ошибка: '+((r&&r.error)||'')); return false; }
  function dialog(opts){
    var ov=document.createElement('div'); ov.className='m4-overlay';
    ov.innerHTML='<div class="m4-dialog"><div class="m4-dhead"><h3>'+U.esc(opts.title)+'</h3><button class="m4-dclose">✕</button></div><div class="m4-dbody">'+opts.body+'</div><div class="m4-dfoot"><button class="m4-btn ghost" data-x="cancel">'+(opts.cancel||'Отмена')+'</button>'+(opts.ok===false?'':'<button class="m4-btn" data-x="ok">'+(opts.ok||'Сохранить')+'</button>')+'</div></div>';
    document.body.appendChild(ov);
    function close(){ ov.remove(); }
    ov.querySelector('.m4-dclose').onclick=close; ov.querySelector('[data-x="cancel"]').onclick=close;
    ov.addEventListener('mousedown', function(e){ if(e.target===ov) close(); });
    var okb=ov.querySelector('[data-x="ok"]'); if(okb) okb.onclick=async function(){ okb.disabled=true; try{ var r=await opts.onOk(ov); if(r!==false) close(); } finally { if(okb) okb.disabled=false; } };
    if(opts.onMount) opts.onMount(ov);
    return ov;
  }
  function openRenameDialog(title, current, fn){ dialog({ title:title, ok:'Сохранить', body:'<div class="m4-field"><label>Название</label><input class="m4-input" id="rn-val" value="'+U.esc(current||'')+'"></div>', onMount:function(ov){ ov.querySelector('#rn-val').focus(); }, onOk:async function(ov){ var v=val(ov,'#rn-val'); if(!v){ U.toast('Укажите название'); return false; } return await fn(v); } }); }
  function val(ov,s){ var e=ov.querySelector(s); return e?e.value.trim():''; }
  function confirmAct(title,text,okLabel,danger,fn){ var ov=dialog({ title:title, ok:okLabel, body:'<p style="color:var(--text-2);font-size:.92rem;line-height:1.5;">'+U.esc(text)+'</p>', onOk:async function(){ return await fn(); } }); if(danger){ var b=ov.querySelector('[data-x="ok"]'); if(b){ b.style.background='var(--st-cancelled)'; b.style.color='#fff'; b.style.boxShadow='none'; } } }

  /* ---------- события + старт ---------- */
  function onView(e){ if(!alive()){ document.removeEventListener('riva:view',onView); return; } var t=tabFromLabel(e.detail&&e.detail.tab); if(t!==curTab) showTab(t); }
  function onUnits(){ if(!alive()){ document.removeEventListener('riva:units-changed',onUnits); return; } cache.org=null; if(curTab==='dashboard'||curTab==='org') loadTab(curTab); }
  document.addEventListener('riva:view',onView);
  document.addEventListener('riva:units-changed',onUnits);
  showTab(tabFromLabel(RIVA.state.view && RIVA.state.view.tab));
})();
</script>
