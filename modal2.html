<!-- modal2.html — Страница "Производство". Подстраницы: Рецепты, Партии. -->
<!-- Доступ: admin, production, management. -->

<section id="m2">

  <div class="flex items-center justify-between gap-4 flex-wrap mb-6">
    <div class="leading-tight">
      <h1 class="text-[17px] font-medium tracking-tight">Производство</h1>
      <p class="text-xs text-fg-muted mt-0.5" id="m2-subtitle">—</p>
    </div>
    <nav class="m2-subnav" id="m2-subnav">
      <button class="m2-tab active" data-tab="recipes">Рецепты</button>
      <button class="m2-tab" data-tab="runs">Партии</button>
    </nav>
  </div>

  <!-- =========================
       RECIPES
  ========================== -->
  <div class="m2-panel" data-panel="recipes">

    <div class="bg-surface rounded-2xl border border-line mb-5 flex flex-wrap items-center" style="padding:10px; gap:10px;">
      <div class="flex-1 min-w-[180px]">
        <input id="m2-rec-search" type="search" placeholder="Поиск по коду или названию…"
          class="m2-bar-ctrl w-full rounded-xl bg-surface border border-line focus:border-fg focus:outline-none transition-colors text-sm">
      </div>
      <button id="m2-rec-new" class="btn-primary m2-bar-ctrl rounded-xl text-sm font-medium ml-auto" style="padding-left:16px; padding-right:16px;">
        + Новый рецепт
      </button>
    </div>

    <div id="m2-rec-list" class="space-y-3">
      <div class="flex items-center justify-center py-16">
        <div class="w-6 h-6 loader"></div>
      </div>
    </div>
  </div>

  <!-- =========================
       RUNS
  ========================== -->
  <div class="m2-panel hidden" data-panel="runs">

    <div class="bg-surface rounded-2xl border border-line mb-5 flex flex-wrap items-center" style="padding:10px; gap:10px;">
      <div class="flex-1 min-w-[180px]">
        <input id="m2-run-search" type="search" placeholder="Поиск по номеру или рецепту…"
          class="m2-bar-ctrl w-full rounded-xl bg-surface border border-line focus:border-fg focus:outline-none transition-colors text-sm">
      </div>
      <div class="m2-dd m2-bar-ctrl" id="m2-run-status-dd">
        <button type="button" class="m2-dd-btn" id="m2-run-status-btn">
          <span id="m2-run-status-label">Все статусы</span>
          <svg class="m2-dd-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="m2-dd-menu hidden" id="m2-run-status-menu">
          <div class="m2-dd-opt" data-value="all">Все статусы</div>
          <div class="m2-dd-opt" data-value="planned">Запланировано</div>
          <div class="m2-dd-opt" data-value="in_progress">В работе</div>
          <div class="m2-dd-opt" data-value="done">Завершено</div>
          <div class="m2-dd-opt" data-value="cancelled">Отменено</div>
        </div>
      </div>
      <button id="m2-run-new" class="btn-primary m2-bar-ctrl rounded-xl text-sm font-medium ml-auto" style="padding-left:16px; padding-right:16px;">
        + Новая партия
      </button>
    </div>

    <div id="m2-run-list" class="space-y-3">
      <div class="flex items-center justify-center py-16">
        <div class="w-6 h-6 loader"></div>
      </div>
    </div>
  </div>
</section>

<!-- ============================================================
     ШАБЛОН СТРОКИ РЕЦЕПТА — используется на подстранице "Рецепты".
============================================================ -->
<template id="m2-recipe-row-tpl">
  <article class="m2-row m2-row--recipe" data-rec-id="">
    <span class="m2-row__code"     data-field="code"></span>
    <span class="m2-row__title"    data-field="name"></span>
    <span class="m2-row__stat"     data-field="output"></span>
    <span class="m2-row__stat"     data-field="ingredients"></span>
    <span class="m2-row__stat"     data-field="hours"></span>
    <span class="m2-row__product"  data-field="product"></span>
    <span class="m2-badge"         data-field="chip"></span>
  </article>
</template>

<!-- ============================================================
     ШАБЛОН СТРОКИ ПАРТИИ — используется на подстранице "Партии".
============================================================ -->
<template id="m2-run-row-tpl">
  <article class="m2-row m2-row--run" data-run-id="">
    <span class="m2-row__code"     data-field="number"></span>
    <span class="m2-badge"         data-field="status"></span>
    <span class="m2-row__title"    data-field="recipe"></span>
    <span class="m2-row__planfact" data-field="planfact"></span>
    <span class="m2-row__date"     data-field="date"></span>
  </article>
</template>

<!-- =========================
     MODAL: редактор рецепта
========================== -->
<div id="m2-rec-modal" class="hidden fixed inset-0 z-40 bg-black/30 flex items-start justify-center px-4 py-8 overflow-y-auto">
  <div class="bg-surface rounded-2xl border border-line w-full max-w-3xl">
    <div class="px-5 py-4 border-b border-line flex items-center justify-between">
      <div>
        <h3 class="font-medium" id="m2-rec-modal-title">Новый рецепт</h3>
        <p class="text-xs text-fg-muted mt-0.5" id="m2-rec-modal-sub"></p>
      </div>
      <button class="m2-rec-close p-1 rounded-lg hover:bg-surface-alt">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="p-5 space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <label class="block">
          <span class="text-xs text-fg-muted block mb-1.5">Код</span>
          <input id="m2-rec-f-code" type="text" maxlength="50" class="w-full px-3 py-2 rounded-lg bg-surface border border-line focus:border-fg focus:outline-none text-sm" placeholder="RC-001">
        </label>
        <label class="block">
          <span class="text-xs text-fg-muted block mb-1.5">Название *</span>
          <input id="m2-rec-f-name" type="text" maxlength="200" class="w-full px-3 py-2 rounded-lg bg-surface border border-line focus:border-fg focus:outline-none text-sm">
        </label>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-4 gap-3">
        <label class="block md:col-span-2">
          <span class="text-xs text-fg-muted block mb-1.5">Готовая продукция *</span>
          <div class="m2-dd m2-dd--block" id="m2-rec-output-dd">
            <button type="button" class="m2-dd-btn m2-dd-btn--block" id="m2-rec-output-btn">
              <span id="m2-rec-output-label" class="truncate">— выберите со склада —</span>
              <svg class="m2-dd-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="m2-dd-menu hidden" id="m2-rec-output-menu"></div>
          </div>
          <p class="text-xs text-fg-muted mt-1.5">
            Сначала добавьте продукцию на Склад (тип «Готовая продукция»).
          </p>
        </label>
        <label class="block">
          <span class="text-xs text-fg-muted block mb-1.5">Выход за цикл *</span>
          <input id="m2-rec-f-output-qty" type="text" inputmode="decimal" value="1" class="w-full px-3 py-2 rounded-lg bg-surface border border-line focus:border-fg focus:outline-none text-sm">
        </label>
        <div>
          <span class="text-xs text-fg-muted block mb-1.5">Ед. изм.</span>
          <div id="m2-rec-f-output-unit" class="px-3 py-2 rounded-lg bg-surface-alt border border-line text-sm text-fg-muted">—</div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <label class="block">
          <span class="text-xs text-fg-muted block mb-1.5">Нормо-часы</span>
          <input id="m2-rec-f-hours" type="text" inputmode="decimal" value="0" class="w-full px-3 py-2 rounded-lg bg-surface border border-line focus:border-fg focus:outline-none text-sm">
        </label>
        <label class="block">
          <span class="text-xs text-fg-muted block mb-1.5">Ставка, ₽/час</span>
          <input id="m2-rec-f-rate" type="text" inputmode="decimal" value="0" class="w-full px-3 py-2 rounded-lg bg-surface border border-line focus:border-fg focus:outline-none text-sm">
        </label>
      </div>

      <!-- Состав -->
      <div class="border border-line rounded-xl overflow-hidden">
        <div class="px-4 py-3 bg-surface-alt border-b border-line flex items-center justify-between">
          <span class="text-sm font-medium">Состав</span>
          <span class="text-xs text-fg-muted">на 1 цикл (выход: <span id="m2-rec-cycle-out">—</span>)</span>
        </div>
        <div id="m2-rec-ingredients" class="divide-y divide-line-light">
          <div class="px-4 py-3 text-xs text-fg-muted">Добавьте ингредиенты</div>
        </div>
        <div class="px-4 py-3 border-t border-line flex items-center gap-2 flex-wrap">
          <button id="m2-rec-add-material" class="text-sm text-fg-muted hover:text-fg transition-colors">+ Материал</button>
          <span class="text-fg-muted">·</span>
          <button id="m2-rec-add-subrecipe" class="text-sm text-fg-muted hover:text-fg transition-colors">+ Рецепт (вложенный)</button>
        </div>
      </div>

      <label class="block">
        <span class="text-xs text-fg-muted block mb-1.5">Технология</span>
        <textarea id="m2-rec-f-desc" rows="3" maxlength="5000" class="w-full px-3 py-2 rounded-lg bg-surface border border-line focus:border-fg focus:outline-none text-sm resize-none" placeholder="Порядок операций, особенности и т.п."></textarea>
      </label>

      <!-- Себестоимость -->
      <div class="bg-surface-alt border border-line rounded-xl p-4">
        <div class="text-xs text-fg-muted mb-2">Расчёт себестоимости</div>
        <div id="m2-rec-cost" class="text-sm text-fg-muted">Сохраните рецепт, чтобы увидеть себестоимость</div>
      </div>
    </div>

    <div class="px-5 py-4 border-t border-line flex items-center justify-between gap-2">
      <button id="m2-rec-delete" class="hidden px-4 py-2 rounded-lg text-sm text-state-error hover:bg-surface-alt transition-colors">Удалить</button>
      <div class="flex items-center gap-2 ml-auto">
        <button id="m2-rec-duplicate" class="hidden btn-secondary px-4 py-2 rounded-lg text-sm">Дублировать</button>
        <button class="m2-rec-close btn-secondary px-4 py-2 rounded-lg text-sm">Отмена</button>
        <button id="m2-rec-save" class="btn-primary px-4 py-2 rounded-lg text-sm" disabled>Сохранить</button>
      </div>
    </div>
  </div>
</div>

<!-- =========================
     MODAL: редактор партии
========================== -->
<div id="m2-run-modal" class="hidden fixed inset-0 z-40 bg-black/30 flex items-start justify-center px-4 py-8 overflow-y-auto">
  <div class="bg-surface rounded-2xl border border-line w-full max-w-2xl">
    <div class="px-5 py-4 border-b border-line flex items-center justify-between">
      <div>
        <h3 class="font-medium" id="m2-run-modal-title">Новая партия</h3>
        <p class="text-xs text-fg-muted mt-0.5" id="m2-run-modal-sub"></p>
      </div>
      <button class="m2-run-close p-1 rounded-lg hover:bg-surface-alt">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="p-5 space-y-4">
      <div id="m2-run-status-row" class="hidden">
        <span class="text-xs text-fg-muted block mb-2">Статус партии</span>
        <div id="m2-run-status-badge" class="inline-block"></div>
      </div>

      <label class="block">
        <span class="text-xs text-fg-muted block mb-1.5">Рецепт *</span>
        <div class="m2-dd m2-dd--block" id="m2-run-recipe-dd">
          <button type="button" class="m2-dd-btn m2-dd-btn--block" id="m2-run-recipe-btn">
            <span id="m2-run-recipe-label" class="truncate">— выберите рецепт —</span>
            <svg class="m2-dd-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </button>
          <div class="m2-dd-menu hidden" id="m2-run-recipe-menu"></div>
        </div>
      </label>

      <div class="grid grid-cols-2 gap-3">
        <label class="block">
          <span class="text-xs text-fg-muted block mb-1.5">Плановое кол-во *</span>
          <div class="relative">
            <input id="m2-run-f-planned" type="text" inputmode="decimal" class="w-full px-3 py-2 pr-12 rounded-lg bg-surface border border-line focus:border-fg focus:outline-none text-sm">
            <span id="m2-run-f-planned-unit" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-fg-muted">—</span>
          </div>
        </label>
        <label class="block" id="m2-run-actual-wrap">
          <span class="text-xs text-fg-muted block mb-1.5">Фактическое кол-во</span>
          <div class="relative">
            <input id="m2-run-f-actual" type="text" inputmode="decimal" class="w-full px-3 py-2 pr-12 rounded-lg bg-surface border border-line focus:border-fg focus:outline-none text-sm">
            <span id="m2-run-f-actual-unit" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-fg-muted">—</span>
          </div>
        </label>
      </div>

      <!-- Требования по материалам -->
      <div id="m2-run-requirements" class="hidden border border-line rounded-xl overflow-hidden">
        <div class="px-4 py-3 bg-surface-alt border-b border-line">
          <span class="text-sm font-medium">Что потребуется со склада</span>
        </div>
        <div id="m2-run-req-list" class="divide-y divide-line-light"></div>
      </div>

      <label class="block">
        <span class="text-xs text-fg-muted block mb-1.5">Комментарий</span>
        <textarea id="m2-run-f-comment" rows="2" maxlength="1000" class="w-full px-3 py-2 rounded-lg bg-surface border border-line focus:border-fg focus:outline-none text-sm resize-none"></textarea>
      </label>

      <div id="m2-run-deficit" class="hidden border border-state-error/30 bg-state-error/5 rounded-xl p-4">
        <div class="text-sm font-medium text-state-error mb-2">Недостаточно материалов</div>
        <div id="m2-run-deficit-list" class="text-sm space-y-1"></div>
      </div>
    </div>

    <div class="px-5 py-4 border-t border-line flex items-center justify-between gap-2 flex-wrap">
      <button id="m2-run-delete" class="hidden px-4 py-2 rounded-lg text-sm text-state-error hover:bg-surface-alt transition-colors">Удалить</button>
      <div class="flex items-center gap-2 ml-auto flex-wrap">
        <div id="m2-run-actions" class="flex items-center gap-2 flex-wrap"></div>
        <button class="m2-run-close btn-secondary px-4 py-2 rounded-lg text-sm">Закрыть</button>
        <button id="m2-run-save" class="btn-primary px-4 py-2 rounded-lg text-sm" disabled>Сохранить</button>
      </div>
    </div>
  </div>
</div>

<style>
  /* Подстраничная навигация — segmented control как в шапке приложения */
  .m2-subnav {
    height: var(--ctrl-h, 38px);
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: var(--ctrl-radius, 12px);
    padding: 4px;
    display: inline-flex;
    align-items: stretch;
    gap: 0;
  }
  .m2-subnav .m2-tab {
    padding: 0 14px;
    border: none;
    background: none;
    cursor: pointer;
    border-radius: calc(var(--ctrl-radius, 12px) - 4px);
    color: var(--fg-muted);
    font-size: 13px;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    transition: all .15s ease-in-out;
  }
  .m2-subnav .m2-tab:hover { color: var(--fg); }
  .m2-subnav .m2-tab.active {
    background: var(--bg);
    color: var(--fg);
    font-weight: 600;
    box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 0 0 1px rgba(0,0,0,.04);
  }

  /* ============================================================
     ШАБЛОН СТРОКИ (modal2 — Рецепты и Партии)
  ============================================================ */
  .m2-row {
    --m2-accent: var(--fg);
    --m2-bg-pct: 3%;
    --m2-bg-hover: 6%;
    --m2-border-pct: 8%;
    --m2-blur: 3px;

    background: color-mix(in srgb, var(--m2-accent) var(--m2-bg-pct), transparent);
    backdrop-filter: blur(var(--m2-blur));
    -webkit-backdrop-filter: blur(var(--m2-blur));
    border: 1px solid color-mix(in srgb, var(--m2-accent) var(--m2-border-pct), transparent);
    border-radius: 12px;

    display: grid;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    min-height: 44px;

    transition: background .15s ease, border-color .15s ease;
    cursor: pointer;
  }
  .m2-row:hover {
    background: color-mix(in srgb, var(--m2-accent) var(--m2-bg-hover), transparent);
    border-color: color-mix(in srgb, var(--m2-accent) calc(var(--m2-border-pct) + 10%), transparent);
  }

  /* Грид для рецепта: код · название · 3 стата · продукт · чип */
  .m2-row--recipe {
    grid-template-columns:
      /* код         */ 110px
      /* название    */ minmax(0, 1fr)
      /* выход       */ 110px
      /* ингред.     */ 110px
      /* нормо-часы  */ 100px
      /* продукция   */ minmax(0, 1fr)
      /* чип         */ 90px;
  }

  /* Грид для партии: номер · статус · рецепт · план/факт · дата */
  .m2-row--run {
    grid-template-columns:
      /* номер     */ 170px
      /* статус    */ 140px
      /* рецепт    */ minmax(0, 1fr)
      /* план/факт */ 190px
      /* дата      */ 180px;
  }

  .m2-row__code {
    font-size: 13px;
    font-weight: 500;
    color: var(--fg);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .m2-row__title {
    font-size: 13px;
    color: var(--fg-secondary);
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .m2-row__stat {
    font-size: 12px;
    color: var(--fg);
    white-space: nowrap;
  }
  .m2-row__product {
    font-size: 12px;
    color: var(--fg-muted);
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .m2-row__planfact {
    font-size: 13px;
    color: var(--fg);
    text-align: right;
    white-space: nowrap;
  }
  .m2-row__date {
    font-size: 12px;
    color: var(--fg-muted);
    text-align: right;
    white-space: nowrap;
  }

  /* ============================================================
     БЕЙДЖИ И ЧИПЫ — фон/размытие на +10% сильнее карточки
  ============================================================ */
  .m2-badge,
  .m2-chip-sub,
  .m2-chip-mat {
    --m2-badge-pct: 13%;
    --m2-badge-blur: 6px;

    display: inline-flex;
    align-items: center;
    justify-self: start;
    padding: 3px 9px;
    border-radius: 7px;
    font-size: 11px;
    font-weight: 500;
    line-height: 1.4;
    white-space: nowrap;
    background: color-mix(in srgb, var(--badge-c, var(--fg-muted)) var(--m2-badge-pct), transparent);
    color: var(--badge-c, var(--fg-muted));
    backdrop-filter: blur(var(--m2-badge-blur));
    -webkit-backdrop-filter: blur(var(--m2-badge-blur));
  }
  .m2-badge:empty { display: none; }

  /* Статусы партии */
  .m2-badge-planned     { --badge-c: #6B7280; }
  .m2-badge-in_progress { --badge-c: #2563EB; }
  .m2-badge-done        { --badge-c: #15803D; }
  .m2-badge-cancelled   { --badge-c: #DC2626; }

  /* Чипы для ингредиентов в редакторе рецепта */
  .m2-chip-sub { --badge-c: #4338CA; }   /* вложенный рецепт — индиго */
  .m2-chip-mat { --badge-c: #15803D; }   /* материал — зелёный */

  /* ============================================================
     ТУЛБАР ПОДСТРАНИЦ — единая высота контролов
  ============================================================ */
  :root { --m2-bar-h: 36px; }

  .m2-bar-ctrl {
    height: var(--m2-bar-h);
    padding-top: 0;
    padding-bottom: 0;
  }
  input.m2-bar-ctrl { padding-left: 14px; padding-right: 14px; }

  /* ============================================================
     КАСТОМНЫЙ ДРОПДАУН — раскрытие снизу (как в modal1)
  ============================================================ */
  .m2-dd { position: relative; display: inline-flex; }
  .m2-dd-btn {
    height: var(--m2-bar-h, 36px);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px 0 14px;
    border-radius: 12px;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--fg);
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: border-color .15s ease;
  }
  .m2-dd-btn:hover { border-color: var(--fg-muted); }
  .m2-dd.is-open .m2-dd-btn { border-color: var(--fg); }
  .m2-dd-chev {
    width: 16px; height: 16px;
    color: var(--fg-muted);
    transition: transform .18s ease;
    flex-shrink: 0;
  }
  .m2-dd.is-open .m2-dd-chev { transform: rotate(180deg); }

  .m2-dd-menu {
    position: absolute;

    box-shadow: 0 8px 24px rgba(0,0,0,.08);
    padding: 4px;
  }
  .m2-dd-menu::-webkit-scrollbar { width: 4px; }
  .m2-dd-menu::-webkit-scrollbar-track { background: transparent; }
  .m2-dd-menu::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
  .m2-dd-menu:hover::-webkit-scrollbar-thumb { background: var(--fg-muted); }
  .m2-dd-menu { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }

  .m2-dd-opt {
    padding: 8px 10px;
    border-radius: 7px;

  .m2-dd-opt:hover { background: var(--bg-alt); }

    background: var(--bg-alt);
    font-weight: 600;

  /* Дропдаун на всю ширину (в формах модалок) */
  .m2-dd--block { display: block; }
  .m2-dd-btn--block { width: 100%; justify-content: space-between; }
  .m2-dd-btn--block > span { overflow: hidden; text-overflow: ellipsis; }

  /* Адаптив */
  @media (max-width: 1024px) {
    .m2-row--recipe,
    .m2-row--run {
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      gap: 10px;
    }
    .m2-row__product { display: none; }
  }
  @media (max-width: 700px) {
    .m2-row--recipe,
    .m2-row--run {
      grid-template-columns: 1fr;
      gap: 4px;
      padding: 12px 14px;
    }
    .m2-row__date, .m2-row__planfact { text-align: left; }
  }
</style>

<script type="module">
// ================================================================
// modal2.html — Производство
// ================================================================

const { sb, state } = window.RIVA;
const { toast, esc, formatDate, formatDateTime, formatMoney, formatNumber, formatQuantity } = window.RIVA_UTILS;
const $ = (id) => document.getElementById(id);

const myRole = state.currentGroup?.role;
const canWrite = ['admin','production','management'].includes(myRole);
const groupId = state.currentGroup.group_id;

$('m2-subtitle').textContent = `Группа «${state.currentGroup.group_name}»`;

if (!canWrite) {
  $('m2-rec-new')?.setAttribute('disabled', 'disabled');
  $('m2-run-new')?.setAttribute('disabled', 'disabled');
}

// ---- Универсальный кастомный select (раскрытие снизу) ----
// ids: { dd, btn, menu, label }. Опции живут в menu как .m2-dd-opt[data-value].
// onChange(value) вызывается при выборе. Возвращает { set(value), setOptions(html) }.
function initCustomSelect(ids, onChange) {
  const dd    = $(ids.dd);
  const btn   = $(ids.btn);
  const menu  = $(ids.menu);
  const label = $(ids.label);
  if (!dd || !btn || !menu) return { set() {}, setOptions() {} };

  const open  = () => { dd.classList.add('is-open'); menu.classList.remove('hidden'); };
  const close = () => { dd.classList.remove('is-open'); menu.classList.add('hidden'); };

  function mark(value) {
    menu.querySelectorAll('.m2-dd-opt').forEach(o =>
      o.classList.toggle('is-selected', o.dataset.value === value));
  }
  function set(value) {
    const opt = menu.querySelector(`.m2-dd-opt[data-value="${(value ?? '').replace(/"/g, '\\"')}"]`);
    if (opt) label.textContent = opt.textContent;
    mark(value ?? '');
  }
  function setOptions(html) {
    menu.innerHTML = html;
  }

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    dd.classList.contains('is-open') ? close() : open();
  });
  menu.addEventListener('click', (e) => {
    const opt = e.target.closest('.m2-dd-opt');
    if (!opt) return;
    set(opt.dataset.value);
    close();
    onChange?.(opt.dataset.value);
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#' + ids.dd)) close();
  });

  return { set, setOptions };
}

// ---- Парсинг чисел (запятая/точка) ----
function parseDecimalInput(str) {
  if (str == null) return null;
  const cleaned = String(str).replace(',', '.').replace(/[^\d.]/g, '');
  if (cleaned === '' || cleaned === '.') return null;
  const num = parseFloat(cleaned);
  return Number.isFinite(num) ? num : null;
}

// ---------- tabs ----------
function switchTab(name) {
  document.querySelectorAll('.m2-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.m2-panel').forEach(p => p.classList.toggle('hidden', p.dataset.panel !== name));
  if (name === 'recipes') loadRecipes();
  if (name === 'runs') loadRuns();
}
document.querySelectorAll('.m2-tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

// Делегирование клика — один раз для обоих списков карточек.
$('m2-rec-list').addEventListener('click', (e) => {
  const card = e.target.closest('[data-rec-id]');
  if (card && card.dataset.recId) openRecipeEditor(card.dataset.recId);
});
$('m2-run-list').addEventListener('click', (e) => {
  const card = e.target.closest('[data-run-id]');
  if (card && card.dataset.runId) openRunEditor(card.dataset.runId);
});

// Кэш склада и рецептов для селектов и автокомплита
const cache = {
  warehouse: [],
  recipes: []
};

async function refreshCache() {
  const [wh, rc] = await Promise.all([
    sb.from('warehouse_items').select('id, article, name, unit, type, quantity, price').order('name'),
    sb.from('recipes').select('id, code, name, output_item_id, output_quantity').order('name')
  ]);
  cache.warehouse = wh.data || [];
  cache.recipes = rc.data || [];
}

// ================================================================
// RECIPES
// ================================================================

const recState = {
  cached: [],
  editing: null,
  outputValue: '',
  ingredients: []
};

$('m2-rec-search').addEventListener('input', renderRecipes);

async function loadRecipes() {
  await refreshCache();

  const { data, error } = await sb
    .from('recipes')
    .select('*, recipe_ingredients!recipe_id(*)')
    .order('created_at', { ascending: false });

  if (error) {
    $('m2-rec-list').innerHTML = `<div class="text-sm text-state-error p-6">${esc(error.message)}</div>`;
    return;
  }
  recState.cached = data || [];
  renderRecipes();
}

function renderRecipes() {
  const q = ($('m2-rec-search').value || '').trim().toLowerCase();
  let list = recState.cached || [];
  if (q) list = list.filter(r => (r.name || '').toLowerCase().includes(q) || (r.code || '').toLowerCase().includes(q));

  if (list.length === 0) {
    $('m2-rec-list').innerHTML = `<div class="text-center py-16 text-sm text-fg-muted">${q ? 'Ничего не найдено' : 'Пока нет рецептов. Создайте первый.'}</div>`;
    return;
  }

  const container = $('m2-rec-list');
  container.innerHTML = '';
  const frag = document.createDocumentFragment();
  list.forEach(r => frag.appendChild(renderRecipeRow(r)));
  container.appendChild(frag);
}

function renderRecipeRow(r) {
  const tpl = document.getElementById('m2-recipe-row-tpl');
  const node = tpl.content.firstElementChild.cloneNode(true);
  node.dataset.recId = r.id;

  const fld = (name) => node.querySelector(`[data-field="${name}"]`);

  const out = cache.warehouse.find(w => w.id === r.output_item_id);
  const ingCount = r.recipe_ingredients?.length || 0;
  const hasSub = (r.recipe_ingredients || []).some(i => i.sub_recipe_id);
  const hours = Number(r.labor_hours || 0);

  fld('code').textContent = r.code || '—';

  const name = fld('name');
  name.textContent = r.name || '—';
  name.title = r.name || '';

  fld('output').textContent = `${formatNumber(r.output_quantity)} ${out?.unit || ''}`;
  fld('ingredients').textContent = `${ingCount} ингр.`;
  fld('hours').textContent = hours > 0 ? `${formatNumber(hours)} ч` : '—';

  const productName = out?.name || '—';
  const pr = fld('product');
  pr.textContent = productName;
  pr.title = productName;

  if (hasSub) {
    const chip = fld('chip');
    chip.textContent = 'вложен.';
    chip.title = 'Содержит вложенные рецепты';
    chip.classList.add('m2-chip-sub');
  }

  return node;
}

// ---- Кастомный select готовой продукции ----
const recOutputSelect = initCustomSelect(
  { dd: 'm2-rec-output-dd', btn: 'm2-rec-output-btn', menu: 'm2-rec-output-menu', label: 'm2-rec-output-label' },
  (value) => { recState.outputValue = value; updateOutputUnit(); updateCycleOut(); validateRecipeForm(); }
);

function fillRecOutputOptions() {
  const products = cache.warehouse.filter(w => w.type === 'product');
  const opts = ['<div class="m2-dd-opt" data-value="">— выберите со склада —</div>']
    .concat(products.map(p => `<div class="m2-dd-opt" data-value="${esc(p.id)}">${esc(p.name)}${p.article ? ' (' + esc(p.article) + ')' : ''}</div>`));
  recOutputSelect.setOptions(opts.join(''));
}

// ---- Recipe editor ----
async function openRecipeEditor(id) {
  if (!canWrite) return;
  await refreshCache();

  recState.editing = id;
  const recipe = id ? (recState.cached || []).find(x => x.id === id) : null;

  $('m2-rec-modal-title').textContent = recipe ? 'Редактирование рецепта' : 'Новый рецепт';
  $('m2-rec-modal-sub').textContent = recipe
    ? `Создан ${formatDateTime(new Date(recipe.created_at))}`
    : '';

  $('m2-rec-f-code').value = recipe?.code || '';
  $('m2-rec-f-name').value = recipe?.name || '';
  $('m2-rec-f-output-qty').value = recipe?.output_quantity || 1;
  $('m2-rec-f-hours').value = recipe?.labor_hours || 0;
  $('m2-rec-f-rate').value = recipe?.labor_rate || 0;
  $('m2-rec-f-desc').value = recipe?.description || '';

  // Селект готовой продукции (только type='product')
  fillRecOutputOptions();
  recState.outputValue = recipe?.output_item_id || '';
  recOutputSelect.set(recState.outputValue);
  updateOutputUnit();

  // Ингредиенты
  recState.ingredients = (recipe?.recipe_ingredients || []).map(i => ({
    kind: i.sub_recipe_id ? 'sub_recipe' : 'material',
    material_id: i.material_id,
    sub_recipe_id: i.sub_recipe_id,
    quantity: i.quantity
  }));
  renderIngredients();
  updateCycleOut();

  $('m2-rec-delete').classList.toggle('hidden', !id);
  $('m2-rec-duplicate').classList.toggle('hidden', !id);

  if (id) loadRecipeCost(id);
  else $('m2-rec-cost').textContent = 'Сохраните рецепт, чтобы увидеть себестоимость';

  validateRecipeForm();
  $('m2-rec-modal').classList.remove('hidden');
  setTimeout(() => $('m2-rec-f-name').focus(), 50);
}

document.querySelectorAll('.m2-rec-close').forEach(b => b.addEventListener('click', () => $('m2-rec-modal').classList.add('hidden')));
$('m2-rec-new').addEventListener('click', () => openRecipeEditor(null));

function updateOutputUnit() {
  const p = cache.warehouse.find(w => w.id === recState.outputValue);
  $('m2-rec-f-output-unit').textContent = p ? p.unit : '—';
}
$('m2-rec-f-output-qty').addEventListener('input', () => { updateCycleOut(); validateRecipeForm(); });
['m2-rec-f-name'].forEach(id => $(id).addEventListener('input', validateRecipeForm));

function updateCycleOut() {
  const p = cache.warehouse.find(w => w.id === recState.outputValue);
  const qty = $('m2-rec-f-output-qty').value;
  $('m2-rec-cycle-out').textContent = p && qty
    ? `${formatNumber(parseDecimalInput(qty))} ${p.unit} «${p.name}»`
    : '—';
}

function validateRecipeForm() {
  const ok = $('m2-rec-f-name').value.trim() && recState.outputValue && (parseDecimalInput($('m2-rec-f-output-qty').value) || 0) > 0;
  $('m2-rec-save').disabled = !ok;
}

function renderIngredients() {
  const el = $('m2-rec-ingredients');
  if (recState.ingredients.length === 0) {
    el.innerHTML = '<div class="px-4 py-3 text-xs text-fg-muted">Добавьте ингредиенты</div>';
    return;
  }
  el.innerHTML = recState.ingredients.map((ing, i) => {
    let label = '—', unit = '', chipClass = '', chipText = '';
    if (ing.kind === 'material') {
      const w = cache.warehouse.find(x => x.id === ing.material_id);
      label = w ? w.name : '(удалено)';
      unit = w?.unit || '';
      chipClass = 'm2-chip-mat';
      chipText = w?.type === 'product' ? 'продукция' : 'материал';
    } else {
      const r = cache.recipes.find(x => x.id === ing.sub_recipe_id);
      label = r ? r.name : '(удалено)';
      const outw = r ? cache.warehouse.find(w => w.id === r.output_item_id) : null;
      unit = outw?.unit || '';
      chipClass = 'm2-chip-sub';
      chipText = 'рецепт';
    }
    return `
      <div class="px-4 py-3 flex items-center gap-3">
        <span class="m2-badge ${chipClass}">${chipText}</span>
        <div class="min-w-0 flex-1 text-sm truncate">${esc(label)}</div>
        <div class="flex items-center gap-1">
          <input type="text" inputmode="decimal" value="${ing.quantity}"
            class="w-24 px-2 py-1.5 rounded-lg bg-surface border border-line focus:border-fg focus:outline-none text-sm text-right"
            data-ing-idx="${i}">
          <span class="text-xs text-fg-muted w-10">${esc(unit)}</span>
        </div>
        <button class="p-1.5 rounded-lg hover:bg-surface-alt" data-remove-ing="${i}">
          <svg class="w-4 h-4 text-state-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
    `;
  }).join('');

  el.querySelectorAll('[data-ing-idx]').forEach(input => {
    input.addEventListener('input', () => {
      const i = Number(input.dataset.ingIdx);
      recState.ingredients[i].quantity = parseDecimalInput(input.value) || 0;
    });
  });
  el.querySelectorAll('[data-remove-ing]').forEach(btn => {
    btn.addEventListener('click', () => {
      recState.ingredients.splice(Number(btn.dataset.removeIng), 1);
      renderIngredients();
    });
  });
}

$('m2-rec-add-material').addEventListener('click', () => {
  const mat = promptChoose('Выберите материал/продукцию со склада:', cache.warehouse.map(w => ({
    value: w.id,
    label: `${w.name} ${w.article ? '(' + w.article + ')' : ''} — ${w.unit}`
  })));
  if (!mat) return;
  recState.ingredients.push({ kind: 'material', material_id: mat, sub_recipe_id: null, quantity: 1 });
  renderIngredients();
});

$('m2-rec-add-subrecipe').addEventListener('click', () => {
  const others = cache.recipes.filter(r => r.id !== recState.editing);
  if (others.length === 0) {
    toast('Нет других рецептов для вложения', 'warning');
    return;
  }
  const sub = promptChoose('Выберите рецепт для вложения:', others.map(r => ({
    value: r.id,
    label: `${r.name} ${r.code ? '(' + r.code + ')' : ''}`
  })));
  if (!sub) return;
  recState.ingredients.push({ kind: 'sub_recipe', material_id: null, sub_recipe_id: sub, quantity: 1 });
  renderIngredients();
});

function promptChoose(title, options) {
  if (options.length === 0) { toast('Список пуст', 'warning'); return null; }
  const listText = options.map((o, i) => `${i + 1}. ${o.label}`).join('\n');
  const raw = prompt(title + '\n\n' + listText + '\n\nВведите номер:');
  if (!raw) return null;
  const idx = Number(raw.trim()) - 1;
  if (idx < 0 || idx >= options.length || !Number.isFinite(idx)) {
    toast('Неверный номер', 'error');
    return null;
  }
  return options[idx].value;
}

async function loadRecipeCost(recipeId) {
  const { data, error } = await sb.rpc('get_recipe_cost', { p_recipe_id: recipeId });
  if (error) { $('m2-rec-cost').textContent = 'Ошибка: ' + error.message; return; }
  if (!data?.ok) { $('m2-rec-cost').textContent = '—'; return; }
  const mat = Number(data.materials_cost || 0);
  const lab = Number(data.labor_cost || 0);
  const total = Number(data.total_cost || 0);
  const unit = Number(data.unit_cost || 0);
  const p = cache.warehouse.find(w => w.id === recState.outputValue);
  const unitLabel = p ? p.unit : '';
  $('m2-rec-cost').innerHTML = `
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
      <div>
        <div class="text-xs text-fg-muted">Материалы</div>
        <div class="font-medium text-fg">${esc(formatMoney(mat))}</div>
      </div>
      <div>
        <div class="text-xs text-fg-muted">Труд</div>
        <div class="font-medium text-fg">${esc(formatMoney(lab))}</div>
      </div>
      <div>
        <div class="text-xs text-fg-muted">Итого за цикл</div>
        <div class="font-medium text-fg">${esc(formatMoney(total))}</div>
      </div>
      <div>
        <div class="text-xs text-fg-muted">За ед. ${esc(unitLabel)}</div>
        <div class="font-medium text-fg">${esc(formatMoney(unit))}</div>
      </div>
    </div>
  `;
}

// Save recipe
$('m2-rec-save').addEventListener('click', async () => {
  const btn = $('m2-rec-save');
  btn.disabled = true;
  btn.textContent = 'Сохраняем…';
  try {
    const payload = {
      code: $('m2-rec-f-code').value.trim() || null,
      name: $('m2-rec-f-name').value.trim(),
      output_item_id: recState.outputValue,
      output_quantity: parseDecimalInput($('m2-rec-f-output-qty').value) || 0,
      labor_hours: parseDecimalInput($('m2-rec-f-hours').value) || 0,
      labor_rate: parseDecimalInput($('m2-rec-f-rate').value) || 0,
      description: $('m2-rec-f-desc').value.trim() || null
    };

    let recipeId = recState.editing;
    if (recipeId) {
      const { error } = await sb.from('recipes').update(payload).eq('id', recipeId);
      if (error) throw error;
    } else {
      const { data, error } = await sb.from('recipes').insert({ ...payload, group_id: groupId }).select().single();
      if (error) throw error;
      recipeId = data.id;
    }

    await sb.from('recipe_ingredients').delete().eq('recipe_id', recipeId);
    const ings = recState.ingredients
      .filter(i => i.quantity > 0 && (i.material_id || i.sub_recipe_id))
      .map(i => ({
        recipe_id: recipeId,
        material_id: i.material_id,
        sub_recipe_id: i.sub_recipe_id,
        quantity: Number(i.quantity)
      }));
    if (ings.length) {
      const { error } = await sb.from('recipe_ingredients').insert(ings);
      if (error) throw error;
    }

    toast('Рецепт сохранён', 'success');
    recState.editing = recipeId;
    await loadRecipes();
    loadRecipeCost(recipeId);
    $('m2-rec-delete').classList.remove('hidden');
    $('m2-rec-duplicate').classList.remove('hidden');
  } catch (e) {
    toast('Ошибка: ' + e.message, 'error');
  } finally {
    btn.textContent = 'Сохранить';
    validateRecipeForm();
  }
});

$('m2-rec-delete').addEventListener('click', async () => {
  if (!recState.editing) return;
  if (!confirm('Удалить рецепт? Если он используется в других рецептах или партиях — удаление может быть заблокировано.')) return;
  try {
    const { error } = await sb.from('recipes').delete().eq('id', recState.editing);
    if (error) throw error;
    toast('Рецепт удалён', 'success');
    $('m2-rec-modal').classList.add('hidden');
    await loadRecipes();
  } catch (e) { toast('Ошибка: ' + e.message, 'error'); }
});

$('m2-rec-duplicate').addEventListener('click', async () => {
  if (!recState.editing) return;
  try {
    const { data: orig, error: e1 } = await sb.from('recipes').select('*, recipe_ingredients!recipe_id(*)').eq('id', recState.editing).single();
    if (e1) throw e1;

    const { data: copy, error: e2 } = await sb.from('recipes').insert({
      group_id: groupId,
      code: orig.code ? orig.code + ' (копия)' : null,
      name: orig.name + ' (копия)',
      output_item_id: orig.output_item_id,
      output_quantity: orig.output_quantity,
      labor_hours: orig.labor_hours,
      labor_rate: orig.labor_rate,
      description: orig.description
    }).select().single();
    if (e2) throw e2;

    if (orig.recipe_ingredients?.length) {
      const dup = orig.recipe_ingredients.map(i => ({
        recipe_id: copy.id,
        material_id: i.material_id,
        sub_recipe_id: i.sub_recipe_id,
        quantity: i.quantity
      }));
      const { error: e3 } = await sb.from('recipe_ingredients').insert(dup);
      if (e3) throw e3;
    }

    toast('Рецепт скопирован', 'success');
    $('m2-rec-modal').classList.add('hidden');
    await loadRecipes();
    openRecipeEditor(copy.id);
  } catch (e) { toast('Ошибка: ' + e.message, 'error'); }
});

// ================================================================
// RUNS
// ================================================================

const runState = {
  cached: [],
  editing: null,
  currentRun: null,
  statusFilter: 'all',
  recipeValue: ''
};

$('m2-run-search').addEventListener('input', renderRuns);

// ---- Фильтр статуса (тулбар) ----
initCustomSelect(
  { dd: 'm2-run-status-dd', btn: 'm2-run-status-btn', menu: 'm2-run-status-menu', label: 'm2-run-status-label' },
  (value) => { runState.statusFilter = value; renderRuns(); }
);

// ---- Кастомный select рецепта в редакторе партии ----
const runRecipeSelect = initCustomSelect(
  { dd: 'm2-run-recipe-dd', btn: 'm2-run-recipe-btn', menu: 'm2-run-recipe-menu', label: 'm2-run-recipe-label' },
  async (value) => { runState.recipeValue = value; updateRunUnits(); await refreshRequirements(); validateRunForm(); }
);

function fillRunRecipeOptions() {
  const opts = ['<div class="m2-dd-opt" data-value="">— выберите рецепт —</div>']
    .concat(cache.recipes.map(r => `<div class="m2-dd-opt" data-value="${esc(r.id)}">${esc(r.name)}${r.code ? ' (' + esc(r.code) + ')' : ''}</div>`));
  runRecipeSelect.setOptions(opts.join(''));
}

async function loadRuns() {
  await refreshCache();

  const { data, error } = await sb
    .from('production_runs')
    .select('*, recipes(id, name, code, output_item_id, output_quantity)')
    .order('created_at', { ascending: false });

  if (error) {
    $('m2-run-list').innerHTML = `<div class="text-sm text-state-error p-6">${esc(error.message)}</div>`;
    return;
  }
  runState.cached = data || [];
  renderRuns();
}

const RUN_STATUS = {
  planned: { label: 'Запланировано' },
  in_progress: { label: 'В работе' },
  done: { label: 'Завершено' },
  cancelled: { label: 'Отменено' }
};

function renderRuns() {
  const q = ($('m2-run-search').value || '').trim().toLowerCase();
  const st = runState.statusFilter;
  let list = runState.cached;
  if (st !== 'all') list = list.filter(r => r.status === st);
  if (q) list = list.filter(r =>
    (r.run_number || '').toLowerCase().includes(q) ||
    (r.recipes?.name || '').toLowerCase().includes(q)
  );

  if (list.length === 0) {
    $('m2-run-list').innerHTML = `<div class="text-center py-16 text-sm text-fg-muted">${q || st !== 'all' ? 'Ничего не найдено' : 'Пока нет партий. Создайте первую.'}</div>`;
    return;
  }

  const container = $('m2-run-list');
  container.innerHTML = '';
  const frag = document.createDocumentFragment();
  list.forEach(r => frag.appendChild(renderRunRow(r)));
  container.appendChild(frag);
}

function renderRunRow(r) {
  const tpl = document.getElementById('m2-run-row-tpl');
  const node = tpl.content.firstElementChild.cloneNode(true);
  node.dataset.runId = r.id;

  const fld = (name) => node.querySelector(`[data-field="${name}"]`);
  const out = r.recipes ? cache.warehouse.find(w => w.id === r.recipes.output_item_id) : null;
  const unit = out?.unit || '';

  fld('number').textContent = r.run_number || '—';

  const status = fld('status');
  status.textContent = RUN_STATUS[r.status]?.label || r.status;
  status.classList.add('m2-badge-' + r.status);

  const recipeName = r.recipes?.name || '(рецепт удалён)';
  const recipe = fld('recipe');
  recipe.textContent = recipeName;
  recipe.title = recipeName;

  const planFact = `${formatNumber(r.planned_quantity)}${r.actual_quantity ? ' / ' + formatNumber(r.actual_quantity) : ' / —'}`;
  fld('planfact').textContent = `${planFact} ${unit}`.trim();

  fld('date').textContent = r.status === 'done' && r.finished_at
    ? `Завершено ${formatDate(new Date(r.finished_at))}`
    : r.status === 'in_progress' && r.started_at
      ? `В работе с ${formatDate(new Date(r.started_at))}`
      : `Создано ${formatDate(new Date(r.created_at))}`;

  return node;
}

// ---- Run editor ----
async function openRunEditor(id) {
  if (!canWrite) return;
  await refreshCache();

  runState.editing = id;
  const run = id ? runState.cached.find(x => x.id === id) : null;
  runState.currentRun = run;

  $('m2-run-modal-title').textContent = run ? `Партия ${run.run_number}` : 'Новая партия';
  $('m2-run-modal-sub').textContent = run
    ? `Создана ${formatDateTime(new Date(run.created_at))}`
    : '';

  // Селект рецептов
  fillRunRecipeOptions();
  runState.recipeValue = run?.recipe_id || '';
  runRecipeSelect.set(runState.recipeValue);
  // После создания менять рецепт нельзя — блокируем кнопку дропдауна
  $('m2-run-recipe-btn').disabled = !!run;
  $('m2-run-recipe-dd').style.opacity = run ? '0.6' : '';
  $('m2-run-recipe-dd').style.pointerEvents = run ? 'none' : '';

  $('m2-run-f-planned').value = run?.planned_quantity ?? '';
  $('m2-run-f-planned').disabled = run && run.status !== 'planned';

  $('m2-run-f-actual').value = run?.actual_quantity ?? '';
  $('m2-run-f-actual').disabled = !(run && run.status === 'in_progress');
  $('m2-run-actual-wrap').style.display = (run && ['in_progress','done','cancelled'].includes(run.status)) ? '' : 'none';

  $('m2-run-f-comment').value = run?.comment || '';

  updateRunUnits();
  await refreshRequirements();
  renderRunStatus(run);
  renderRunActions(run);

  $('m2-run-delete').classList.toggle('hidden', !run || run.status !== 'planned');
  validateRunForm();

  $('m2-run-modal').classList.remove('hidden');
}

document.querySelectorAll('.m2-run-close').forEach(b => b.addEventListener('click', () => $('m2-run-modal').classList.add('hidden')));
$('m2-run-new').addEventListener('click', () => openRunEditor(null));

$('m2-run-f-planned').addEventListener('input', async () => { await refreshRequirements(); validateRunForm(); });

function updateRunUnits() {
  const r = cache.recipes.find(x => x.id === runState.recipeValue);
  const out = r ? cache.warehouse.find(w => w.id === r.output_item_id) : null;
  const unit = out?.unit || '—';
  $('m2-run-f-planned-unit').textContent = unit;
  $('m2-run-f-actual-unit').textContent = unit;
}

async function refreshRequirements() {
  const recipeId = runState.recipeValue;
  const plannedQ = parseDecimalInput($('m2-run-f-planned').value);
  const reqEl = $('m2-run-requirements');
  const listEl = $('m2-run-req-list');
  $('m2-run-deficit').classList.add('hidden');

  if (!recipeId || !plannedQ || plannedQ <= 0) {
    reqEl.classList.add('hidden');
    return;
  }

  const { data, error } = await sb.rpc('get_recipe_composition', { p_recipe_id: recipeId });
  if (error) { reqEl.classList.add('hidden'); return; }

  const recipe = cache.recipes.find(r => r.id === recipeId);
  if (!recipe || !recipe.output_quantity) return;
  const ratio = plannedQ / recipe.output_quantity;

  const rows = (data || []).map(m => {
    const need = Number(m.total_quantity) * ratio;
    const have = Number(m.material_stock || 0);
    const deficit = need - have;
    const enough = deficit <= 0;
    return { ...m, need, have, deficit, enough };
  });

  if (rows.length === 0) {
    reqEl.classList.add('hidden');
    return;
  }

  reqEl.classList.remove('hidden');
  listEl.innerHTML = rows.map(r => `
    <div class="px-4 py-2.5 flex items-center gap-3 text-sm">
      <div class="min-w-0 flex-1">
        <div class="truncate">${esc(r.material_name)}</div>
        <div class="text-xs text-fg-muted">Нужно ${formatNumber(r.need)} ${esc(r.material_unit)} · на складе ${formatNumber(r.have)} ${esc(r.material_unit)}</div>
      </div>
      ${r.enough
        ? '<span class="m2-badge m2-badge-done">хватит</span>'
        : `<span class="m2-badge m2-badge-cancelled">не хватает ${formatNumber(-r.deficit)}</span>`}
    </div>
  `).join('');
}

function renderRunStatus(run) {
  if (!run) { $('m2-run-status-row').classList.add('hidden'); return; }
  $('m2-run-status-row').classList.remove('hidden');
  $('m2-run-status-badge').innerHTML = `<span class="m2-badge m2-badge-${run.status}">${esc(RUN_STATUS[run.status]?.label || run.status)}</span>`;
}

function renderRunActions(run) {
  const el = $('m2-run-actions');
  if (!run || !canWrite) { el.innerHTML = ''; return; }
  if (run.status === 'planned') {
    el.innerHTML = `
      <button id="m2-run-start" class="btn-primary px-4 py-2 rounded-lg text-sm">Запустить</button>
      <button id="m2-run-cancel" class="btn-secondary px-4 py-2 rounded-lg text-sm">Отменить</button>
    `;
    $('m2-run-start')?.addEventListener('click', startRun);
    $('m2-run-cancel')?.addEventListener('click', cancelRun);
  } else if (run.status === 'in_progress') {
    el.innerHTML = `
      <button id="m2-run-finish" class="btn-primary px-4 py-2 rounded-lg text-sm">Завершить</button>
      <button id="m2-run-cancel" class="btn-secondary px-4 py-2 rounded-lg text-sm">Отменить (вернуть материалы)</button>
    `;
    $('m2-run-finish')?.addEventListener('click', finishRun);
    $('m2-run-cancel')?.addEventListener('click', cancelRun);
  } else {
    el.innerHTML = '';
  }
}

function validateRunForm() {
  const run = runState.currentRun;
  if (run && run.status !== 'planned') {
    $('m2-run-save').disabled = true;
    return;
  }
  const ok = runState.recipeValue && (parseDecimalInput($('m2-run-f-planned').value) || 0) > 0;
  $('m2-run-save').disabled = !ok;
}

$('m2-run-save').addEventListener('click', async () => {
  const btn = $('m2-run-save');
  btn.disabled = true;
  btn.textContent = 'Сохраняем…';
  try {
    const payload = {
      recipe_id: runState.recipeValue,
      planned_quantity: parseDecimalInput($('m2-run-f-planned').value) || 0,
      comment: $('m2-run-f-comment').value.trim() || null
    };

    if (runState.editing) {
      const { error } = await sb.from('production_runs').update(payload).eq('id', runState.editing);
      if (error) throw error;
      toast('Партия сохранена', 'success');
    } else {
      const { data, error } = await sb.from('production_runs').insert({ ...payload, group_id: groupId, status: 'planned' }).select().single();
      if (error) throw error;
      toast('Партия создана', 'success');
      runState.editing = data.id;
    }
    $('m2-run-modal').classList.add('hidden');
    await loadRuns();
  } catch (e) {
    toast('Ошибка: ' + e.message, 'error');
  } finally {
    btn.textContent = 'Сохранить';
    validateRunForm();
  }
});

$('m2-run-delete').addEventListener('click', async () => {
  if (!runState.editing) return;
  if (!confirm('Удалить запланированную партию?')) return;
  try {
    const { error } = await sb.from('production_runs').delete().eq('id', runState.editing);
    if (error) throw error;
    toast('Партия удалена', 'success');
    $('m2-run-modal').classList.add('hidden');
    await loadRuns();
  } catch (e) { toast('Ошибка: ' + e.message, 'error'); }
});

async function startRun() {
  if (!runState.editing) return;
  try {
    const { data, error } = await sb.rpc('start_production_run', { p_run_id: runState.editing });
    if (error) throw error;
    if (!data?.ok) {
      if (data?.error === 'INSUFFICIENT_STOCK' && Array.isArray(data.deficit)) {
        $('m2-run-deficit').classList.remove('hidden');
        $('m2-run-deficit-list').innerHTML = data.deficit.map(d =>
          `<div>• ${esc(d.name)}: не хватает ${formatNumber(d.missing)} ${esc(d.unit || '')} (нужно ${formatNumber(d.need)}, есть ${formatNumber(d.have)})</div>`
        ).join('');
        toast('Недостаточно материалов на складе', 'error');
        return;
      }
      throw new Error(data?.error || 'UNKNOWN');
    }
    toast('Партия запущена, материалы списаны', 'success');
    $('m2-run-modal').classList.add('hidden');
    await loadRuns();
  } catch (e) { toast('Ошибка: ' + e.message, 'error'); }
}

async function finishRun() {
  if (!runState.editing) return;
  const actual = parseDecimalInput($('m2-run-f-actual').value);
  if (!actual || actual <= 0) { toast('Укажите фактическое количество', 'warning'); return; }
  try {
    const { data, error } = await sb.rpc('finish_production_run', { p_run_id: runState.editing, p_actual_quantity: actual });
    if (error) throw error;
    if (!data?.ok) throw new Error(data?.error || 'UNKNOWN');
    toast('Партия завершена, продукция оприходована', 'success');
    $('m2-run-modal').classList.add('hidden');
    await loadRuns();
  } catch (e) { toast('Ошибка: ' + e.message, 'error'); }
}

async function cancelRun() {
  if (!runState.editing) return;
  const status = runState.currentRun?.status;
  const msg = status === 'in_progress'
    ? 'Отменить партию? Ранее списанные материалы будут возвращены на склад.'
    : 'Отменить запланированную партию?';
  if (!confirm(msg)) return;
  try {
    const { data, error } = await sb.rpc('cancel_production_run', { p_run_id: runState.editing });
    if (error) throw error;
    if (!data?.ok) throw new Error(data?.error || 'UNKNOWN');
    toast('Партия отменена', 'success');
    $('m2-run-modal').classList.add('hidden');
    await loadRuns();
  } catch (e) { toast('Ошибка: ' + e.message, 'error'); }
}

// ---- helpers ----
function pluralize(n, forms) {
  const mod100 = Math.abs(n) % 100;
  const mod10 = mod100 % 10;
  if (mod100 >= 11 && mod100 <= 19) return forms[2];
  if (mod10 === 1) return forms[0];
  if (mod10 >= 2 && mod10 <= 4) return forms[1];
  return forms[2];
}

// ---- init ----
switchTab('recipes');
</script>
