<style>
/* ============================================================ RIVA · modal2 — Производство ============================================================ */
.m2{ color:var(--text); }
.m2-head{ display:flex; align-items:center; justify-content:space-between; gap:var(--sp-4); margin-bottom:var(--sp-5); flex-wrap:wrap; }
.m2-title{ font-size:1.35rem; font-weight:700; letter-spacing:-.02em; }
.m2-tools{ display:flex; align-items:center; gap:var(--sp-3); flex-wrap:wrap; }
.m2-search{ display:flex; align-items:center; gap:var(--sp-2); height:38px; padding:0 var(--sp-3); background:var(--card); border:1px solid var(--border); border-radius:var(--r); color:var(--text-3); min-width:190px; }
.m2-search:focus-within{ border-color:var(--accent-line); }
.m2-search svg{ width:15px; height:15px; flex:0 0 auto; }
.m2-search input{ flex:1; background:none; border:none; outline:none; color:var(--text); font-size:.875rem; min-width:0; }
.m2-pill{ display:inline-flex; align-items:center; gap:6px; height:34px; padding:0 var(--sp-3); border-radius:var(--r); background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent-line); font-size:.8rem; font-weight:600; }
.m2-pill.muted{ background:var(--card); color:var(--text-3); border-color:var(--border); font-weight:500; }
.m2-pill svg{ width:14px; height:14px; }

.m2-btn{ display:inline-flex; align-items:center; gap:var(--sp-2); height:38px; padding:0 var(--sp-4); border-radius:var(--r); background:var(--btn-bg); color:var(--btn-fg); font-size:.875rem; font-weight:600; box-shadow:var(--shadow-card); transition:transform var(--dur-fast) var(--ease),opacity var(--dur-fast) var(--ease); white-space:nowrap; }
.m2-btn:hover{ transform:translateY(-1px); opacity:.92; }
.m2-btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
.m2-btn svg{ width:16px; height:16px; }
.m2-btn.ghost{ background:var(--card); color:var(--text); border:1px solid var(--border-strong); box-shadow:none; }
.m2-btn.ghost:hover{ background:var(--card-hover); }
.m2-btn.sm{ height:32px; padding:0 var(--sp-3); font-size:.82rem; }

.m2-card{ border:1px solid var(--border); border-radius:var(--r-lg); background:var(--card); box-shadow:var(--shadow-card); overflow:hidden; }
.m2-panel{ display:none; }
.m2-panel.on{ display:block; animation:m2in .3s var(--ease); }
@keyframes m2in{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:none; } }

.m2-tablewrap{ overflow-x:auto; }
table.m2-tbl{ width:100%; border-collapse:collapse; font-size:.875rem; }
.m2-tbl th{ text-align:left; font-size:.72rem; letter-spacing:.06em; text-transform:uppercase; color:var(--text-3); font-weight:600; padding:var(--sp-3) var(--sp-4); border-bottom:1px solid var(--border); white-space:nowrap; }
.m2-tbl td{ padding:var(--sp-3) var(--sp-4); border-bottom:1px solid var(--border); color:var(--text-2); vertical-align:middle; }
.m2-tbl tbody tr.row{ transition:background var(--dur-fast) var(--ease); }
.m2-tbl tbody tr.row:hover{ background:var(--card-hover); }
.m2-tbl td.num, .m2-tbl th.num{ text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
.m2-tbl .nm{ color:var(--text); font-weight:600; }
.m2-tbl .sub{ color:var(--text-3); font-size:.78rem; font-family:var(--font-mono); }
.m2-clickable{ cursor:pointer; }
.m2-caret{ display:inline-block; width:14px; transition:transform var(--dur) var(--ease); color:var(--text-3); }
.m2-row-open .m2-caret{ transform:rotate(90deg); }

.m2-detail td{ background:var(--bg-2); padding:0; border-bottom:1px solid var(--border); }
.m2-detail-inner{ padding:var(--sp-4) var(--sp-5); }
.m2-detail-grid{ display:grid; grid-template-columns:1.4fr .9fr; gap:var(--sp-5); }
@media (max-width:780px){ .m2-detail-grid{ grid-template-columns:1fr; } }
.m2-sub-tbl{ width:100%; border-collapse:collapse; font-size:.82rem; }
.m2-sub-tbl th{ text-transform:uppercase; font-size:.68rem; letter-spacing:.05em; color:var(--text-3); text-align:left; padding:6px 8px; border-bottom:1px solid var(--border); }
.m2-sub-tbl td{ padding:6px 8px; border-bottom:1px solid var(--border); color:var(--text-2); }
.m2-sub-tbl td.num{ text-align:right; font-variant-numeric:tabular-nums; }
.m2-cost{ display:flex; flex-direction:column; gap:8px; }
.m2-cost .line{ display:flex; align-items:center; justify-content:space-between; font-size:.85rem; color:var(--text-2); }
.m2-cost .line.total{ border-top:1px solid var(--border); padding-top:8px; font-weight:700; color:var(--text); font-size:.95rem; }
.m2-cost .line b{ color:var(--text); }

.m2-chip{ display:inline-flex; align-items:center; gap:5px; font-size:.74rem; font-weight:500; padding:3px 9px; border-radius:var(--r-sm); white-space:nowrap; border:1px solid var(--border); background:var(--card); color:var(--text-2); }
.m2-chip::before{ content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }
.st-planned{ color:var(--st-pending); background:var(--st-pending-bg); border-color:transparent; }
.st-progress{ color:var(--st-upcoming); background:var(--st-upcoming-bg); border-color:transparent; }
.st-done{ color:var(--st-completed); background:var(--st-completed-bg); border-color:transparent; }
.st-cancelled{ color:var(--st-cancelled); background:var(--st-cancelled-bg); border-color:transparent; }
.m2-ok{ color:var(--st-completed); font-weight:600; } .m2-no{ color:var(--text-3); }
.m2-sub-badge{ display:inline-flex; align-items:center; gap:4px; font-size:.7rem; color:var(--accent); background:var(--accent-soft); border:1px solid var(--accent-line); border-radius:var(--r-sm); padding:1px 7px; margin-left:6px; }

.m2-acts{ display:flex; gap:6px; justify-content:flex-end; }
.m2-ic{ width:30px; height:30px; display:grid; place-items:center; border-radius:var(--r-sm); border:1px solid var(--border); background:var(--card); color:var(--text-2); transition:all var(--dur-fast) var(--ease); }
.m2-ic:hover{ border-color:var(--border-strong); color:var(--text); background:var(--card-hover); }
.m2-ic.danger:hover{ color:var(--st-cancelled); border-color:var(--st-cancelled); }
.m2-ic.go:hover{ color:var(--st-completed); border-color:var(--st-completed); }
.m2-ic svg{ width:15px; height:15px; }

.m2-empty{ display:grid; place-items:center; gap:var(--sp-2); padding:var(--sp-12) var(--sp-4); text-align:center; color:var(--text-3); }
.m2-empty svg{ width:36px; height:36px; opacity:.45; }
.m2-empty .t{ font-size:1rem; font-weight:600; color:var(--text-2); }
.m2-empty .d{ font-size:.875rem; max-width:42ch; }
.m2-loading{ display:grid; place-items:center; gap:var(--sp-3); padding:var(--sp-12); color:var(--text-3); }
.m2-loading .spin{ width:24px; height:24px; border-radius:50%; border:2px solid var(--border); border-top-color:var(--accent); animation:m2spin 1s linear infinite; }
@keyframes m2spin{ to{ transform:rotate(360deg);} }
.m2-foot{ display:flex; align-items:center; justify-content:space-between; padding:var(--sp-3) var(--sp-4); border-top:1px solid var(--border); font-size:.8rem; color:var(--text-3); }
.m2-foot b{ color:var(--text); font-weight:600; }

/* диалоги */
.m2-overlay{ position:fixed; inset:0; z-index:400; display:grid; place-items:center; padding:var(--sp-4); background:rgba(0,0,0,.45); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); animation:m2fade .2s var(--ease); }
@keyframes m2fade{ from{ opacity:0;} to{ opacity:1; } }
.m2-dialog{ width:100%; max-width:600px; max-height:90vh; display:flex; flex-direction:column; background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--r-lg); box-shadow:var(--shadow-pop); animation:m2pop .25s var(--ease); }
@keyframes m2pop{ from{ opacity:0; transform:translateY(10px) scale(.98);} to{ opacity:1; transform:none; } }
.m2-dialog.wide{ max-width:760px; }
.m2-dhead{ display:flex; align-items:center; justify-content:space-between; padding:var(--sp-4) var(--sp-5); border-bottom:1px solid var(--border); }
.m2-dhead h3{ font-size:1.05rem; font-weight:700; letter-spacing:-.01em; }
.m2-dclose{ width:32px; height:32px; display:grid; place-items:center; border-radius:var(--r-sm); color:var(--text-3); }
.m2-dclose:hover{ background:var(--card-hover); color:var(--text); }
.m2-dbody{ padding:var(--sp-5); overflow-y:auto; }
.m2-dfoot{ display:flex; justify-content:flex-end; gap:var(--sp-3); padding:var(--sp-4) var(--sp-5); border-top:1px solid var(--border); }
.m2-field{ margin-bottom:var(--sp-4); } .m2-field:last-child{ margin-bottom:0; }
.m2-field label{ display:block; font-size:.78rem; font-weight:600; color:var(--text-2); margin-bottom:6px; }
.m2-input, .m2-select, .m2-textarea{ width:100%; height:40px; padding:0 var(--sp-3); background:var(--card); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-size:.9rem; font-family:inherit; transition:border-color var(--dur-fast) var(--ease); }
.m2-textarea{ height:auto; min-height:64px; padding:var(--sp-2) var(--sp-3); resize:vertical; }
.m2-input:focus, .m2-select:focus, .m2-textarea:focus{ outline:none; border-color:var(--accent-line); }
.m2-row2{ display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-3); }
.m2-row3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:var(--sp-3); }
.m2-hint{ font-size:.78rem; color:var(--text-3); margin-top:6px; }
.m2-deficit{ border:1px solid var(--st-cancelled); border-radius:var(--r); padding:var(--sp-3); background:var(--st-cancelled-bg); margin-bottom:var(--sp-3); }
.m2-deficit .dh{ font-weight:600; color:var(--st-cancelled); margin-bottom:6px; font-size:.85rem; }
.m2-deficit .di{ display:flex; justify-content:space-between; font-size:.82rem; color:var(--text-2); padding:2px 0; }

/* строки ингредиентов */
.m2-ing-head{ display:grid; grid-template-columns:120px 1fr 90px 30px; gap:var(--sp-2); font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; color:var(--text-3); margin-bottom:6px; padding:0 2px; }
.m2-ing{ display:grid; grid-template-columns:120px 1fr 90px 30px; gap:var(--sp-2); align-items:center; margin-bottom:var(--sp-2); }
.m2-ing .m2-input, .m2-ing .m2-select{ height:36px; }
.m2-ing-del{ width:30px; height:30px; display:grid; place-items:center; border-radius:var(--r-sm); border:1px solid var(--border); color:var(--text-3); }
.m2-ing-del:hover{ color:var(--st-cancelled); border-color:var(--st-cancelled); }
</style>

<div class="m2" id="m2-root">
  <div class="m2-head">
    <div class="m2-title" id="m2-title">Рецепты</div>
    <div class="m2-tools" id="m2-tools"></div>
  </div>
  <div class="m2-card">
    <div class="m2-panel" data-tab="recipes" id="m2p-recipes"></div>
    <div class="m2-panel" data-tab="runs" id="m2p-runs"></div>
    <div class="m2-panel" data-tab="producible" id="m2p-producible"></div>
  </div>
</div>

<script>
(function(){
  var RIVA=window.RIVA, U=window.RIVA_UTILS;
  if(!RIVA||!U){ var r=document.getElementById('m2-root'); if(r) r.innerHTML='<div class="m2-empty"><div class="t">Модуль не инициализирован</div></div>'; return; }
  var sb=RIVA.sb;
  var INSTANCE=Date.now()+'-'+Math.random(); RIVA._m2Instance=INSTANCE;
  function alive(){ return RIVA._m2Instance===INSTANCE && document.getElementById('m2-root'); }

  var data={ recipes:[], runs:[], producible:[], whLite:[], recById:{} };
  var search='', curTab='recipes', openRecipe=null;

  function role(){ return (RIVA.state.currentGroup && RIVA.state.currentGroup.role)||null; }
  function canWrite(){ return ['admin','production','management'].indexOf(role())>=0; }
  function groupId(){ return RIVA.state.currentGroup && RIVA.state.currentGroup.group_id; }
  function prodUnits(){ return (RIVA.unitsBySection&&RIVA.unitsBySection.production)||[]; }
  function activeUnit(){ return RIVA.state.activeUnitId||null; }
  function activeProdUnit(){ var id=activeUnit(); return prodUnits().some(function(u){return u.id===id;})?id:null; }
  function activeProdName(){ var id=activeProdUnit(); var u=prodUnits().find(function(x){return x.id===id;}); return u?u.name:null; }
  function defaultProdUnit(){ var us=prodUnits(); var d=us.find(function(u){return u.is_default;})||us[0]; return d?d.id:null; }
  function resolveRunUnit(){ return activeProdUnit()||defaultProdUnit(); }
  function num(v){ var n=typeof v==='number'?v:parseFloat(v); return isFinite(n)?n:0; }

  function tabFromLabel(label){ var l=(label||'').toLowerCase(); if(l.indexOf('парти')>=0) return 'runs'; if(l.indexOf('произвести')>=0||l.indexOf('можно')>=0) return 'producible'; return 'recipes'; }

  function showTab(tab){
    curTab=tab; search=''; openRecipe=null;
    var titles={recipes:'Рецепты',runs:'Партии',producible:'Можно произвести'};
    document.getElementById('m2-title').textContent=titles[tab]||'';
    document.querySelectorAll('#m2-root .m2-panel').forEach(function(p){ p.classList.toggle('on', p.getAttribute('data-tab')===tab); });
    renderTools(); loadTab(tab);
  }

  function renderTools(){
    var t=document.getElementById('m2-tools'); t.innerHTML='';
    if(curTab==='runs'){
      var an=activeProdName(); var pill=document.createElement('span'); pill.className='m2-pill'+(an?'':' muted');
      pill.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V10l6 4V10l6 4V8l6 4v9z"/></svg>'+(an?U.esc(an):'Все производства');
      t.appendChild(pill);
    } else if(curTab==='recipes'){
      var pill2=document.createElement('span'); pill2.className='m2-pill muted'; pill2.textContent='Общая библиотека группы'; t.appendChild(pill2);
    }
    var s=document.createElement('label'); s.className='m2-search';
    s.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>';
    var i=document.createElement('input'); i.type='text'; i.placeholder='Поиск'; i.value=search;
    i.addEventListener('input', function(){ search=i.value.toLowerCase(); renderCurrent(); }); s.appendChild(i); t.appendChild(s);
    if(canWrite()){
      if(curTab==='recipes') t.appendChild(mkbtn('Новый рецепт', iconPlus(), function(){ openRecipeDialog(null); }));
      else if(curTab==='runs') t.appendChild(mkbtn('Новая партия', iconPlus(), function(){ openRunDialog(null); }));
    }
  }
  function mkbtn(label,icon,on,cls){ var b=document.createElement('button'); b.className='m2-btn'+(cls?(' '+cls):''); b.innerHTML=icon+'<span>'+label+'</span>'; b.addEventListener('click',on); return b; }
  function iconPlus(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>'; }

  async function ensureWhLite(){ if(data.whLite.length) return; var r=await sb.from('warehouse_items').select('id,name,unit,type,quantity').order('name'); if(!r.error) data.whLite=r.data||[]; }
  async function ensureRecipes(){ if(data.recipes.length){ return; } var r=await sb.from('recipes').select('*').order('code',{nullsFirst:false}).order('name'); if(!r.error){ data.recipes=r.data||[]; data.recById={}; data.recipes.forEach(function(x){ data.recById[x.id]=x; }); } }

  async function loadTab(tab){
    var panel=document.getElementById('m2p-'+tab); panel.innerHTML='<div class="m2-loading"><div class="spin"></div>Загрузка…</div>';
    try{
      if(tab==='recipes'){ await ensureWhLite(); var r=await sb.from('recipes').select('*, recipe_ingredients(id)').order('code',{nullsFirst:false}).order('name'); if(r.error) throw r.error; data.recipes=r.data||[]; data.recById={}; data.recipes.forEach(function(x){ data.recById[x.id]=x; }); }
      else if(tab==='runs'){ await ensureRecipes(); var ru=await sb.from('production_runs').select('*, recipes(name,output_unit), resp:app_users!responsible_id(name)').order('created_at',{ascending:false}); if(ru.error) throw ru.error; data.runs=ru.data||[]; }
      else if(tab==='producible'){ await ensureRecipes(); var p=await RIVA.rpc('get_recipes_producible'); data.producible=Array.isArray(p)?p:[]; }
      if(!alive()) return; renderCurrent();
    }catch(err){ if(!alive())return; panel.innerHTML='<div class="m2-empty"><div class="t">Не удалось загрузить</div><div class="d">'+U.esc(err.message||String(err))+'</div></div>'; }
  }

  function renderCurrent(){ if(curTab==='recipes') renderRecipes(); else if(curTab==='runs') renderRuns(); else renderProducible(); }
  function match(s){ return !search||(s||'').toLowerCase().indexOf(search)>=0; }

  /* ---------- РЕЦЕПТЫ ---------- */
  function renderRecipes(){
    var panel=document.getElementById('m2p-recipes');
    var rows=data.recipes.filter(function(r){ return match(r.name)||match(r.code); });
    if(!data.recipes.length){ panel.innerHTML=empty('Нет рецептов','Создайте первый рецепт: укажите изделие, его состав (материалы и/или полуфабрикаты) и нормы труда.'); return; }
    var html='<div class="m2-tablewrap"><table class="m2-tbl"><thead><tr><th style="width:32px"></th><th>Рецепт</th><th class="num">Выход</th><th class="num">Состав</th>'+(canWrite()?'<th></th>':'')+'</tr></thead><tbody>';
    rows.forEach(function(r){
      var ing=(r.recipe_ingredients||[]).length;
      html+='<tr class="row m2-clickable" data-rec="'+r.id+'">'
        +'<td><span class="m2-caret">▸</span></td>'
        +'<td><div class="nm">'+U.esc(r.name)+'</div>'+(r.code?'<div class="sub">'+U.esc(r.code)+'</div>':'')+'</td>'
        +'<td class="num">'+U.formatQuantity(r.output_quantity)+' '+U.esc(r.output_unit||'шт')+'</td>'
        +'<td class="num">'+ing+'</td>'
        +(canWrite()?('<td><div class="m2-acts">'+ic('edit','Изменить',r.id,svgEdit())+ic('del','Удалить',r.id,svgTrash(),true)+'</div></td>'):'')
        +'</tr>'
        +'<tr class="m2-detail" data-detail="'+r.id+'" style="display:none"><td colspan="'+(canWrite()?5:4)+'"><div class="m2-detail-inner" id="m2-det-'+r.id+'"></div></td></tr>';
    });
    html+='</tbody></table></div><div class="m2-foot"><span>Рецептов: <b>'+data.recipes.length+'</b></span></div>';
    panel.innerHTML=html;
    panel.querySelectorAll('tr.row').forEach(function(tr){ tr.addEventListener('click', function(e){ if(e.target.closest('[data-act]')) return; toggleRecipe(tr.getAttribute('data-rec')); }); });
    panel.querySelectorAll('[data-act]').forEach(function(b){ b.addEventListener('click', function(e){ e.stopPropagation(); var id=b.getAttribute('data-id'), rec=data.recById[id]; if(b.getAttribute('data-act')==='edit') openRecipeDialog(rec); else confirmAct('Удалить рецепт «'+rec.name+'»?','Действие необратимо. Нельзя удалить, если рецепт используется в партиях или как полуфабрикат.','Удалить',true,function(){ return delRecipe(id); }); }); });
  }
  async function toggleRecipe(id){
    var detail=document.querySelector('[data-detail="'+id+'"]'); var row=document.querySelector('tr.row[data-rec="'+id+'"]');
    if(!detail) return;
    var open=detail.style.display!=='none';
    document.querySelectorAll('#m2p-recipes .m2-detail').forEach(function(d){ d.style.display='none'; });
    document.querySelectorAll('#m2p-recipes tr.row').forEach(function(r){ r.classList.remove('m2-row-open'); });
    if(open){ openRecipe=null; return; }
    detail.style.display=''; row.classList.add('m2-row-open'); openRecipe=id;
    var box=document.getElementById('m2-det-'+id); box.innerHTML='<div class="m2-loading"><div class="spin"></div>Состав…</div>';
    try{
      var comp=await RIVA.rpc('get_recipe_composition',{p_recipe_id:id});
      var cost=await RIVA.rpc('get_recipe_cost',{p_recipe_id:id});
      if(!alive())return;
      var rows=Array.isArray(comp)?comp:[];
      var compHtml = rows.length ? ('<table class="m2-sub-tbl"><thead><tr><th>Материал (весь состав)</th><th class="num">Нужно</th><th class="num">На складе</th><th class="num">Цена</th></tr></thead><tbody>'
        + rows.map(function(c){ var short=num(c.material_stock)<num(c.total_quantity); return '<tr><td>'+U.esc(c.material_name)+'</td><td class="num">'+U.formatQuantity(c.total_quantity)+' '+U.esc(c.material_unit||'')+'</td><td class="num"'+(short?' style="color:var(--st-cancelled)"':'')+'>'+U.formatQuantity(c.material_stock)+'</td><td class="num">'+(c.material_price!=null?U.formatMoney(c.material_price):'—')+'</td></tr>'; }).join('')
        + '</tbody></table>') : '<div class="m2-hint">Состав пуст — добавьте ингредиенты в рецепт.</div>';
      var costHtml='';
      if(cost&&cost.ok){ costHtml='<div class="m2-cost"><div class="line"><span>Материалы</span><b>'+U.formatMoney(cost.materials_cost)+'</b></div>'
        +'<div class="line"><span>Труд</span><b>'+U.formatMoney(cost.labor_cost)+'</b></div>'
        +'<div class="line total"><span>Себестоимость</span><b>'+U.formatMoney(cost.total_cost)+'</b></div>'
        +'<div class="line"><span>На единицу ('+U.formatQuantity(cost.output_quantity)+')</span><b>'+U.formatMoney(cost.unit_cost)+'</b></div></div>'; }
      var r=data.recById[id];
      box.innerHTML='<div class="m2-detail-grid"><div><div class="sub" style="margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;font-size:.68rem;color:var(--text-3)">Полный состав (с разворотом матрёшки)</div>'+compHtml+'</div>'
        +'<div><div class="sub" style="margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;font-size:.68rem;color:var(--text-3)">Калькуляция</div>'+costHtml
        +(r&&r.description?('<div class="m2-hint" style="margin-top:12px">'+U.esc(r.description)+'</div>'):'')+'</div></div>';
    }catch(err){ if(alive()) box.innerHTML='<div class="m2-hint">Ошибка: '+U.esc(err.message||String(err))+'</div>'; }
  }

  function openRecipeDialog(rec){
    var isEdit=!!rec;
    var body=''
      +'<div class="m2-row2"><div class="m2-field"><label>Название изделия *</label><input class="m2-input" id="r-name" value="'+U.esc(isEdit?rec.name:'')+'"></div>'
      +'<div class="m2-field"><label>Код</label><input class="m2-input" id="r-code" value="'+U.esc(isEdit?(rec.code||''):'')+'"></div></div>'
      +'<div class="m2-row3"><div class="m2-field"><label>Выход, кол-во</label><input class="m2-input" id="r-outq" type="number" step="any" value="'+(isEdit?num(rec.output_quantity):1)+'"></div>'
      +'<div class="m2-field"><label>Ед. изм.</label><input class="m2-input" id="r-unit" value="'+U.esc(isEdit?(rec.output_unit||'шт'):'шт')+'"></div>'
      +'<div class="m2-field"><label>Часы труда</label><input class="m2-input" id="r-lh" type="number" step="any" value="'+(isEdit?num(rec.labor_hours):0)+'"></div></div>'
      +'<div class="m2-field"><label>Ставка труда, ₽/час</label><input class="m2-input" id="r-lr" type="number" step="any" value="'+(isEdit?num(rec.labor_rate):0)+'"></div>'
      +'<div class="m2-field"><label>Состав</label><div class="m2-ing-head"><span>Тип</span><span>Позиция</span><span>Кол-во</span><span></span></div><div id="r-ings"></div>'
      +'<button class="m2-btn ghost sm" id="r-adding" style="margin-top:8px;">+ ингредиент</button></div>'
      +'<div class="m2-field"><label>Описание / техпроцесс</label><textarea class="m2-textarea" id="r-desc">'+U.esc(isEdit?(rec.description||''):'')+'</textarea></div>';
    var ov=dialog({ title:isEdit?'Рецепт':'Новый рецепт', wide:true, ok:isEdit?'Сохранить':'Создать', body:body,
      onMount:async function(ov){
        await ensureWhLite(); await ensureRecipes();
        var box=ov.querySelector('#r-ings');
        function addIng(pre){
          var row=document.createElement('div'); row.className='m2-ing';
          var typeSel='<select class="m2-select ing-type"><option value="material">Материал</option><option value="sub">Полуфабрикат</option></select>';
          row.innerHTML=typeSel+'<select class="m2-select ing-val"></select><input class="m2-input ing-qty" type="number" step="any" placeholder="0"><button class="m2-ing-del" title="Удалить">✕</button>';
          row.querySelector('.m2-ing-del').onclick=function(){ row.remove(); };
          function fillVal(type, selId){
            var sel=row.querySelector('.ing-val');
            if(type==='sub'){ sel.innerHTML=data.recipes.filter(function(x){ return !isEdit || x.id!==rec.id; }).map(function(x){ return '<option value="'+x.id+'">'+U.esc(x.name)+'</option>'; }).join('')||'<option value="">нет рецептов</option>'; }
            else { sel.innerHTML=data.whLite.map(function(w){ return '<option value="'+w.id+'">'+U.esc(w.name)+(w.type==='product'?' (продукт)':'')+'</option>'; }).join('')||'<option value="">склад пуст</option>'; }
            if(selId) sel.value=selId;
          }
          row.querySelector('.ing-type').addEventListener('change', function(e){ fillVal(e.target.value); });
          var t=(pre&&pre.type)||'material'; row.querySelector('.ing-type').value=t; fillVal(t, pre&&pre.val);
          if(pre&&pre.qty!=null) row.querySelector('.ing-qty').value=pre.qty;
          box.appendChild(row);
        }
        ov.querySelector('#r-adding').onclick=function(){ addIng(null); };
        if(isEdit){
          var ing=await sb.from('recipe_ingredients').select('material_id,sub_recipe_id,quantity').eq('recipe_id',rec.id);
          (ing.data||[]).forEach(function(x){ addIng({ type:x.sub_recipe_id?'sub':'material', val:x.sub_recipe_id||x.material_id, qty:num(x.quantity) }); });
          if(!(ing.data||[]).length) addIng(null);
        } else { addIng(null); }
      },
      onOk:async function(ov){
        var name=val(ov,'#r-name'); if(!name){ U.toast('Укажите название'); return false; }
        var recRec={ name:name, code:val(ov,'#r-code')||null, output_quantity:isFinite(numVal(ov,'#r-outq'))?numVal(ov,'#r-outq'):1, output_unit:val(ov,'#r-unit')||'шт', labor_hours:isFinite(numVal(ov,'#r-lh'))?numVal(ov,'#r-lh'):0, labor_rate:isFinite(numVal(ov,'#r-lr'))?numVal(ov,'#r-lr'):0, description:val(ov,'#r-desc')||null };
        var recId;
        if(isEdit){ var up=await sb.from('recipes').update(recRec).eq('id',rec.id); if(up.error){ U.toast('Ошибка: '+up.error.message); return false; } recId=rec.id; }
        else { recRec.group_id=groupId(); recRec.unit_id=null; var insR=await sb.from('recipes').insert(recRec).select().single(); if(insR.error){ U.toast('Ошибка: '+insR.error.message); return false; } recId=insR.data.id; }
        // собрать ингредиенты
        var ings=Array.prototype.map.call(ov.querySelectorAll('#r-ings .m2-ing'), function(row){
          var type=row.querySelector('.ing-type').value, v=row.querySelector('.ing-val').value, q=parseFloat(row.querySelector('.ing-qty').value);
          if(!v||!(q>0)) return null;
          return type==='sub' ? { recipe_id:recId, sub_recipe_id:v, quantity:q } : { recipe_id:recId, material_id:v, quantity:q };
        }).filter(Boolean);
        // заменить состав
        await sb.from('recipe_ingredients').delete().eq('recipe_id',recId);
        if(ings.length){ var insI=await sb.from('recipe_ingredients').insert(ings); if(insI.error){ U.toast('Состав с ошибкой: '+(/cycle|цикл/i.test(insI.error.message)?'обнаружен цикл вложенности рецептов':insI.error.message)); /* рецепт сохранён */ } }
        U.toast(isEdit?'Рецепт сохранён':'Рецепт создан'); await loadTab('recipes');
      }});
    return ov;
  }
  async function delRecipe(id){ var r=await sb.from('recipes').delete().eq('id',id); if(r.error){ U.toast('Нельзя удалить: рецепт используется в партиях или как полуфабрикат'); return false; } U.toast('Рецепт удалён'); await loadTab('recipes'); }

  /* ---------- ПАРТИИ ---------- */
  function runStatus(st){ var m={planned:['st-planned','Запланирована'],in_progress:['st-progress','В работе'],done:['st-done','Завершена'],cancelled:['st-cancelled','Отменена']}; var x=m[st]||['','—']; return '<span class="m2-chip '+x[0]+'">'+x[1]+'</span>'; }
  function renderRuns(){
    var panel=document.getElementById('m2p-runs');
    var rows=data.runs.filter(function(r){ return match(r.run_number)||match(r.recipes&&r.recipes.name); });
    if(!data.runs.length){ panel.innerHTML=empty('Нет партий','Создайте партию по рецепту. При запуске материалы спишутся со склада, при завершении — оприходуется готовая продукция.'); return; }
    var html='<div class="m2-tablewrap"><table class="m2-tbl"><thead><tr><th>Партия</th><th>Рецепт</th><th class="num">План</th><th class="num">Факт</th><th>Статус</th><th>Готовность</th><th></th></tr></thead><tbody>';
    rows.forEach(function(r){
      html+='<tr class="row"><td><div class="nm">'+U.esc(r.run_number||'—')+'</div><div class="sub">'+U.formatDate(r.created_at)+'</div></td>'
        +'<td>'+U.esc((r.recipes&&r.recipes.name)||'—')+'</td>'
        +'<td class="num">'+U.formatQuantity(r.planned_quantity)+'</td>'
        +'<td class="num">'+(r.actual_quantity!=null?U.formatQuantity(r.actual_quantity):'—')+'</td>'
        +'<td>'+runStatus(r.status)+'</td>'
        +'<td class="sub">'+(r.planned_ready_at?U.formatDate(r.planned_ready_at):'—')+'</td>'
        +'<td><div class="m2-acts">'+runActions(r)+'</div></td></tr>';
    });
    html+='</tbody></table></div><div class="m2-foot"><span>Партий: <b>'+data.runs.length+'</b></span></div>';
    panel.innerHTML=html;
    panel.querySelectorAll('[data-ract]').forEach(function(b){ b.addEventListener('click', function(){
      var id=b.getAttribute('data-id'), r=data.runs.find(function(x){return x.id===id;}), a=b.getAttribute('data-ract');
      if(a==='start') doStart(id);
      else if(a==='finish') openFinish(r);
      else if(a==='cancel') confirmAct('Отменить партию '+(r.run_number||'')+'?', (r.status==='in_progress'?'Списанные материалы вернутся на склад.':'Партия будет отменена.'),'Отменить партию',true,function(){ return doCancel(id); });
      else if(a==='edit') openRunDialog(r);
      else if(a==='del') confirmAct('Удалить партию '+(r.run_number||'')+'?','Действие необратимо.','Удалить',true,function(){ return delRun(id); });
    });});
  }
  function runActions(r){
    var s='';
    if(canWrite()){
      if(r.status==='planned'){ s+=ic('start','Запустить',r.id,'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m6 4 14 8-14 8z"/></svg>',false,'ract','go'); s+=ic('edit','Изменить',r.id,svgEdit(),false,'ract'); s+=ic('del','Удалить',r.id,svgTrash(),true,'ract'); }
      else if(r.status==='in_progress'){ s+=ic('finish','Завершить',r.id,'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 6 9 17l-5-5"/></svg>',false,'ract','go'); s+=ic('cancel','Отменить',r.id,'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 6 6 18M6 6l12 12"/></svg>',true,'ract'); }
    }
    if(!s) s='<span class="sub">—</span>';
    return s;
  }
  function openRunDialog(run){
    var isEdit=!!run;
    if(!data.recipes.length){ U.toast('Сначала создайте рецепт'); return; }
    var recOpts=data.recipes.map(function(r){ return '<option value="'+r.id+'"'+(isEdit&&run.recipe_id===r.id?' selected':'')+'>'+U.esc(r.name)+'</option>'; }).join('');
    var an=activeProdName();
    var body=''
      +'<div class="m2-field"><label>Рецепт *</label><select class="m2-select" id="rn-rec"'+(isEdit?' disabled':'')+'>'+recOpts+'</select></div>'
      +'<div class="m2-row2"><div class="m2-field"><label>Плановое кол-во *</label><input class="m2-input" id="rn-qty" type="number" step="any" value="'+(isEdit?num(run.planned_quantity):'')+'"></div>'
      +'<div class="m2-field"><label>Готовность к</label><input class="m2-input" id="rn-ready" type="datetime-local" value="'+(isEdit&&run.planned_ready_at?toLocalInput(run.planned_ready_at):'')+'"></div></div>'
      +'<div class="m2-field"><label>Комментарий</label><textarea class="m2-textarea" id="rn-comment">'+U.esc(isEdit?(run.comment||''):'')+'</textarea></div>'
      +'<div class="m2-hint">Производство: <b style="color:var(--text)">'+U.esc(an||'по умолчанию')+'</b>. Материалы спишутся при запуске партии.</div>';
    dialog({ title:isEdit?'Партия '+(run.run_number||''):'Новая партия', ok:isEdit?'Сохранить':'Создать', body:body, onOk:async function(ov){
      var qty=numVal(ov,'#rn-qty'); if(!(qty>0)){ U.toast('Укажите плановое количество'); return false; }
      var ready=val(ov,'#rn-ready'); var readyIso=ready?new Date(ready).toISOString():null;
      if(isEdit){ var up=await sb.from('production_runs').update({ planned_quantity:qty, planned_ready_at:readyIso, comment:val(ov,'#rn-comment')||null }).eq('id',run.id); if(up.error){ U.toast('Ошибка: '+up.error.message); return false; } U.toast('Партия обновлена'); }
      else { var ins=await sb.from('production_runs').insert({ group_id:groupId(), recipe_id:val(ov,'#rn-rec'), planned_quantity:qty, unit_id:resolveRunUnit(), status:'planned', planned_ready_at:readyIso, comment:val(ov,'#rn-comment')||null }); if(ins.error){ U.toast('Ошибка: '+ins.error.message); return false; } U.toast('Партия создана'); }
      await loadTab('runs');
    }});
  }
  async function doStart(id){
    var r=await RIVA.rpc('start_production_run',{p_run_id:id});
    if(r&&r.ok){ U.toast('Партия запущена, материалы списаны'); await loadTab('runs'); return; }
    if(r&&r.error==='INSUFFICIENT_STOCK'){ showDeficit(r.deficit||[]); return; }
    U.toast('Ошибка: '+((r&&r.error)||''));
  }
  function showDeficit(def){
    var body='<div class="m2-deficit"><div class="dh">Недостаточно материалов на складе</div>'
      + def.map(function(d){ return '<div class="di"><span>'+U.esc(d.name)+'</span><span>не хватает '+U.formatQuantity(d.missing)+' '+U.esc(d.unit||'')+'</span></div>'; }).join('')
      + '</div><div class="m2-hint">Пополните склад (оприходуйте заказ снабжения) или уменьшите плановое количество.</div>';
    dialog({ title:'Нельзя запустить партию', ok:false, cancel:'Понятно', body:body, onOk:function(){} });
  }
  function openFinish(run){
    var body='<div class="m2-field"><label>Фактически произведено *</label><input class="m2-input" id="fn-qty" type="number" step="any" value="'+num(run.planned_quantity)+'"></div>'
      +'<div class="m2-hint">Готовая продукция «'+U.esc((run.recipes&&run.recipes.name)||'')+'» будет оприходована на склад.</div>';
    dialog({ title:'Завершить партию '+(run.run_number||''), ok:'Завершить', body:body, onOk:async function(ov){
      var q=numVal(ov,'#fn-qty'); if(!(q>0)){ U.toast('Укажите фактическое количество'); return false; }
      var r=await RIVA.rpc('finish_production_run',{p_run_id:run.id,p_actual_quantity:q});
      if(!(r&&r.ok)){ U.toast('Ошибка: '+((r&&r.error)||'')); return false; }
      U.toast('Партия завершена, продукция на складе'); await loadTab('runs');
    }});
  }
  async function doCancel(id){ var r=await RIVA.rpc('cancel_production_run',{p_run_id:id}); if(!(r&&r.ok)){ U.toast('Ошибка: '+((r&&r.error)||'')); return false; } U.toast('Партия отменена'); await loadTab('runs'); }
  async function delRun(id){ var r=await sb.from('production_runs').delete().eq('id',id); if(r.error){ U.toast('Ошибка: '+r.error.message); return false; } U.toast('Партия удалена'); await loadTab('runs'); }

  /* ---------- МОЖНО ПРОИЗВЕСТИ ---------- */
  function renderProducible(){
    var panel=document.getElementById('m2p-producible');
    var list=data.producible.map(function(p){ var r=data.recById[p.recipe_id]; return { p:p, name:r?r.name:'—', unit:r?(r.output_unit||'шт'):'', code:r?r.code:'' }; })
      .filter(function(x){ return match(x.name)||match(x.code); });
    if(!data.producible.length){ panel.innerHTML=empty('Нет данных','Добавьте рецепты с составом — здесь появится расчёт, сколько можно произвести из текущих остатков.'); return; }
    list.sort(function(a,b){ return num(b.p.producible)-num(a.p.producible); });
    var html='<div class="m2-tablewrap"><table class="m2-tbl"><thead><tr><th>Рецепт</th><th class="num">Можно произвести</th><th>Ограничивает</th>'+(canWrite()?'<th></th>':'')+'</tr></thead><tbody>';
    list.forEach(function(x){
      var has=x.p.has_materials; var n=num(x.p.producible);
      html+='<tr class="row"><td><div class="nm">'+U.esc(x.name)+'</div>'+(x.code?'<div class="sub">'+U.esc(x.code)+'</div>':'')+'</td>'
        +'<td class="num '+(n>0?'m2-ok':'m2-no')+'">'+(has?(U.formatQuantity(n)+' '+U.esc(x.unit)):'<span class="m2-no">нет состава</span>')+'</td>'
        +'<td class="sub">'+(x.p.limiting_material?U.esc(x.p.limiting_material):'—')+'</td>'
        +(canWrite()?('<td><div class="m2-acts">'+(n>0?'<button class="m2-btn ghost sm" data-mk="'+x.p.recipe_id+'">Партия</button>':'')+'</div></td>'):'')
        +'</tr>';
    });
    html+='</tbody></table></div><div class="m2-foot"><span>Рассчитано по текущим остаткам склада</span></div>';
    panel.innerHTML=html;
    panel.querySelectorAll('[data-mk]').forEach(function(b){ b.addEventListener('click', function(){ var rec=data.recById[b.getAttribute('data-mk')]; if(rec){ /* перейти в Партии с префиллом */ data.runs=[]; openRunDialogPrefill(rec); } }); });
  }
  function openRunDialogPrefill(rec){
    // открыть диалог новой партии с выбранным рецептом (вкладку не переключаем — создастся в текущем производстве)
    var fake={ recipe_id:rec.id };
    // временно гарантируем, что список рецептов есть
    if(!data.recipes.length) data.recipes=[rec];
    openRunDialog(null);
    setTimeout(function(){ var sel=document.querySelector('#rn-rec'); if(sel){ sel.value=rec.id; } }, 0);
  }

  /* ---------- общие ---------- */
  function empty(t,d){ return '<div class="m2-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 3v18h18"/><path d="m7 14 3-3 3 2 5-6"/></svg><div class="t">'+t+'</div><div class="d">'+d+'</div></div>'; }
  function svgEdit(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>'; }
  function svgTrash(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>'; }
  function ic(act,title,id,svg,danger,attr,extra){ return '<button class="m2-ic'+(danger?' danger':'')+(extra?(' '+extra):'')+'" title="'+title+'" data-'+(attr||'act')+'="'+act+'" data-id="'+id+'">'+svg+'</button>'; }
  function toLocalInput(iso){ var d=new Date(iso); if(isNaN(d)) return ''; var p=function(n){return String(n).padStart(2,'0');}; return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes()); }

  function dialog(opts){
    var ov=document.createElement('div'); ov.className='m2-overlay';
    ov.innerHTML='<div class="m2-dialog'+(opts.wide?' wide':'')+'"><div class="m2-dhead"><h3>'+U.esc(opts.title)+'</h3><button class="m2-dclose">✕</button></div><div class="m2-dbody">'+opts.body+'</div><div class="m2-dfoot"><button class="m2-btn ghost" data-x="cancel">'+(opts.cancel||'Отмена')+'</button>'+(opts.ok===false?'':'<button class="m2-btn" data-x="ok">'+(opts.ok||'Сохранить')+'</button>')+'</div></div>';
    document.body.appendChild(ov);
    function close(){ ov.remove(); }
    ov.querySelector('.m2-dclose').onclick=close; ov.querySelector('[data-x="cancel"]').onclick=close;
    ov.addEventListener('mousedown', function(e){ if(e.target===ov) close(); });
    var okb=ov.querySelector('[data-x="ok"]'); if(okb) okb.onclick=async function(){ okb.disabled=true; try{ var r=await opts.onOk(ov); if(r!==false) close(); } finally { if(okb) okb.disabled=false; } };
    if(opts.onMount) opts.onMount(ov);
    return ov;
  }
  function val(ov,s){ var e=ov.querySelector(s); return e?e.value.trim():''; }
  function numVal(ov,s){ var e=ov.querySelector(s); return e?parseFloat(e.value):NaN; }
  function confirmAct(title,text,okLabel,danger,fn){ var ov=dialog({ title:title, ok:okLabel, body:'<p style="color:var(--text-2);font-size:.92rem;line-height:1.5;">'+U.esc(text)+'</p>', onOk:async function(){ return await fn(); } }); if(danger){ var b=ov.querySelector('[data-x="ok"]'); if(b){ b.style.background='var(--st-cancelled)'; b.style.color='#fff'; b.style.boxShadow='none'; } } }

  /* ---------- события + старт ---------- */
  function onView(e){ if(!alive()){ document.removeEventListener('riva:view',onView); return; } var t=tabFromLabel(e.detail&&e.detail.tab); if(t!==curTab) showTab(t); }
  function onUnits(){ if(!alive()){ document.removeEventListener('riva:units-changed',onUnits); return; } renderTools(); if(curTab==='runs'||curTab==='producible') loadTab(curTab); }
  document.addEventListener('riva:view',onView);
  document.addEventListener('riva:units-changed',onUnits);
  showTab(tabFromLabel(RIVA.state.view && RIVA.state.view.tab));
})();
</script>
