<!-- modal3.html — Страница "Продажи". Подстраницы: Активные, Завершённые. -->
<!-- Доступ: admin, sales, management. -->

<section id="m3">

  <div class="flex items-center justify-between gap-4 flex-wrap mb-6">
    <div class="leading-tight">
      <h1 class="text-[17px] font-medium tracking-tight">Продажи</h1>
      <p class="text-xs text-fg-muted mt-0.5" id="m3-subtitle">—</p>
    </div>
    <div class="flex items-center gap-3">
      <nav class="m3-subnav" id="m3-subnav">
        <button class="m3-tab active" data-tab="active">Активные</button>
        <button class="m3-tab" data-tab="completed">Завершённые</button>
      </nav>
      <div id="m3-chat-btn-wrap"></div>
    </div>
  </div>

  <!-- =========================
       ACTIVE
  ========================== -->
  <div class="m3-panel" data-panel="active">
    <div class="bg-surface rounded-2xl border border-line mb-5 flex flex-wrap items-center" style="padding:10px; gap:10px;">
      <div class="flex-1 min-w-[180px]">
        <input id="m3-act-search" type="search" placeholder="Поиск по номеру или клиенту…"
          class="m3-bar-ctrl w-full rounded-xl bg-surface border border-line focus:border-fg focus:outline-none transition-colors text-sm">
      </div>
      <div class="m3-dd m3-bar-ctrl" id="m3-act-status-dd">
        <button type="button" class="m3-dd-btn" id="m3-act-status-btn">
          <span id="m3-act-status-label">Все статусы</span>
          <svg class="m3-dd-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="m3-dd-menu hidden" id="m3-act-status-menu">
          <div class="m3-dd-opt" data-value="all">Все статусы</div>
          <div class="m3-dd-opt" data-value="draft">Черновик</div>
          <div class="m3-dd-opt" data-value="confirmed">Подтверждён</div>
          <div class="m3-dd-opt" data-value="shipped">Отгружен</div>
          <div class="m3-dd-opt" data-value="cancelled">Отменён</div>
        </div>
      </div>
      <button id="m3-order-new" class="btn-primary m3-bar-ctrl rounded-xl text-sm font-medium ml-auto" style="padding-left:16px; padding-right:16px;">
        + Новый заказ
      </button>
    </div>
    <div id="m3-act-list" class="space-y-3">
      <div class="flex items-center justify-center py-16"><div class="w-6 h-6 loader"></div></div>
    </div>
  </div>

  <!-- =========================
       COMPLETED
  ========================== -->
  <div class="m3-panel hidden" data-panel="completed">
    <div class="bg-surface rounded-2xl border border-line mb-5 flex flex-wrap items-center" style="padding:10px; gap:10px;">
      <div class="flex-1 min-w-[180px]">
        <input id="m3-cmp-search" type="search" placeholder="Поиск по номеру или клиенту…"
          class="m3-bar-ctrl w-full rounded-xl bg-surface border border-line focus:border-fg focus:outline-none transition-colors text-sm">
      </div>
      <span id="m3-cmp-count" class="text-xs text-fg-muted ml-auto">—</span>
    </div>
    <div id="m3-cmp-list" class="space-y-3">
      <div class="flex items-center justify-center py-16"><div class="w-6 h-6 loader"></div></div>
    </div>
  </div>
</section>

<!-- ============================================================
     ШАБЛОН СТРОКИ ЗАКАЗА
============================================================ -->
<template id="m3-order-row-tpl">
  <article class="m3-row" data-ord-id="">
    <span class="m3-row__num"      data-field="number"></span>
    <span class="m3-badge"          data-field="status"></span>
    <span class="m3-badge"          data-field="payment"></span>
    <span class="m3-row__customer" data-field="customer"></span>
    <span class="m3-row__items"    data-field="items"></span>
    <span class="m3-row__total"    data-field="total"></span>
    <span class="m3-row__date"     data-field="date"></span>
  </article>
</template>

<!-- =========================
     MODAL: редактор заказа продажи
========================== -->
<div id="m3-order-modal" class="hidden fixed inset-0 z-40 bg-black/30 flex items-start justify-center px-4 py-8 overflow-y-auto">
  <div class="bg-surface rounded-2xl border border-line w-full max-w-3xl">
    <div class="px-5 py-4 border-b border-line flex items-center justify-between">
      <div>
        <h3 class="font-medium" id="m3-order-modal-title">Новый заказ</h3>
        <p class="text-xs text-fg-muted mt-0.5" id="m3-order-modal-sub"></p>
      </div>
      <button class="m3-order-close p-1 rounded-lg hover:bg-surface-alt">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="p-5 space-y-4">

      <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
        <label class="block md:col-span-2">
          <span class="text-xs text-fg-muted block mb-1.5">Клиент</span>
          <input id="m3-order-f-customer" list="m3-customers-dl" type="text" maxlength="200"
            placeholder="Начните вводить или выберите…"
            class="w-full px-3 py-2 rounded-lg bg-surface border border-line focus:border-fg focus:outline-none text-sm">
          <datalist id="m3-customers-dl"></datalist>
        </label>
        <label class="block">
          <span class="text-xs text-fg-muted block mb-1.5">Статус оплаты</span>
          <div class="m3-dd m3-dd--block" id="m3-order-payment-dd">
            <button type="button" class="m3-dd-btn m3-dd-btn--block" id="m3-order-payment-btn">
              <span id="m3-order-payment-label" class="truncate">Не оплачено</span>
              <svg class="m3-dd-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="m3-dd-menu hidden" id="m3-order-payment-menu">
              <div class="m3-dd-opt" data-value="unpaid">Не оплачено</div>
              <div class="m3-dd-opt" data-value="partial">Частично оплачено</div>
              <div class="m3-dd-opt" data-value="paid">Оплачено</div>
            </div>
          </div>
        </label>
      </div>

      <!-- Статус заказа -->
      <div id="m3-order-status-row" class="hidden">
        <span class="text-xs text-fg-muted block mb-2">Статус заказа</span>
        <div id="m3-order-status-badges" class="flex items-center gap-1 flex-wrap"></div>
      </div>

      <!-- Позиции -->
      <div class="border border-line rounded-xl overflow-hidden">
        <div class="px-4 py-3 bg-surface-alt border-b border-line flex items-center justify-between">
          <span class="text-sm font-medium">Позиции заказа</span>
          <span id="m3-order-total" class="text-sm text-fg-muted">Итого: 0,00 ₽</span>
        </div>
        <div id="m3-order-items" class="divide-y divide-line-light"></div>
        <div class="px-4 py-3 border-t border-line">
          <button id="m3-order-add-item" class="text-sm text-fg-muted hover:text-fg transition-colors">
            + Добавить позицию
          </button>
        </div>
      </div>

      <!-- Вложения -->
      <div class="border border-line rounded-xl overflow-hidden">
        <div class="px-4 py-3 bg-surface-alt border-b border-line flex items-center justify-between">
          <span class="text-sm font-medium">Документы</span>
          <label class="text-sm text-fg-muted hover:text-fg transition-colors cursor-pointer">
            + Загрузить
            <input id="m3-order-file-input" type="file" class="hidden" multiple>
          </label>
        </div>
        <div id="m3-order-attachments" class="divide-y divide-line-light">
          <div class="px-4 py-3 text-xs text-fg-muted">Нет вложений</div>
        </div>
      </div>

      <div id="m3-order-deficit" class="hidden border border-state-error/30 bg-state-error/5 rounded-xl p-4">
        <div class="text-sm font-medium text-state-error mb-2">Недостаточно продукции на складе</div>
        <div id="m3-order-deficit-list" class="text-sm space-y-1"></div>
      </div>

    </div>

    <div class="px-5 py-4 border-t border-line flex items-center justify-between gap-2 flex-wrap">
      <button id="m3-order-delete" class="hidden px-4 py-2 rounded-lg text-sm text-state-error hover:bg-surface-alt transition-colors">Удалить</button>
      <div class="flex items-center gap-2 ml-auto flex-wrap">
        <div id="m3-order-actions" class="flex items-center gap-2 flex-wrap"></div>
        <button class="m3-order-close btn-secondary px-4 py-2 rounded-lg text-sm">Закрыть</button>
        <button id="m3-order-save" class="btn-primary px-4 py-2 rounded-lg text-sm" disabled>Сохранить</button>
      </div>
    </div>
  </div>
</div>

  }

    font-size: 13px;
    font-weight: 600;

    text-align: right;
    white-space: nowrap;
  }
  .m3-row__date { text-align: right; }

  /* ============================================================
     ЧИПЫ СТАТУСОВ
  ============================================================ */
  .m3-badge {
    --m3-badge-pct: 13%;
    --m3-badge-blur: 6px;

    display: inline-flex;
    align-items: center;
    justify-self: start;

    line-height: 1.4;

    background: color-mix(in srgb, var(--badge-c, var(--fg-muted)) var(--m3-badge-pct), transparent);
    color: var(--badge-c, var(--fg-muted));
    backdrop-filter: blur(var(--m3-badge-blur));
    -webkit-backdrop-filter: blur(var(--m3-badge-blur));
  }
  .m3-badge-draft     { --badge-c: #6B7280; }
  .m3-badge-confirmed { --badge-c: #2563EB; }
  .m3-badge-shipped   { --badge-c: #D97706; }

  ============================================================ */

  .m3-bar-ctrl {
    height: var(--m3-bar-h);
    padding-top: 0;
    padding-bottom: 0;
  }
  input.m3-bar-ctrl { padding-left: 14px; padding-right: 14px; }

  /* ============================================================
     КАСТОМНЫЙ ДРОПДАУН
  ============================================================ */
  .m3-dd { position: relative; display: inline-flex; }
  .m3-dd-btn {
    height: var(--m3-bar-h, 36px);
    display: inline-flex;

  }
  .m3-dd.is-open .m3-dd-chev { transform: rotate(180deg); }

  .m3-dd-menu {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    min-width: 100%;
    z-index: 30;
    max-height: 260px;
    overflow-y: auto;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,.08);

  .m3-dd-menu::-webkit-scrollbar { width: 4px; }
  .m3-dd-menu::-webkit-scrollbar-track { background: transparent; }

  .m3-dd-menu:hover::-webkit-scrollbar-thumb { background: var(--fg-muted); }

    padding: 8px 10px;

<script type="module">
// ================================================================
// modal3.html — Продажи
// ================================================================

const { sb, state } = window.RIVA;
const { toast, esc, formatDate, formatDateTime, formatMoney, formatNumber } = window.RIVA_UTILS;
const $ = (id) => document.getElementById(id);

const myRole = state.currentGroup?.role;
const canWrite = ['admin','sales','management'].includes(myRole);
const groupId = state.currentGroup.group_id;

$('m3-subtitle').textContent = `Группа «${state.currentGroup.group_name}»`;
if (!canWrite) {
  $('m3-order-new')?.setAttribute('disabled', 'disabled');
}

// ---- Парсинг чисел (запятая/точка) ----
function parseDecimalInput(str) {
  if (str == null) return null;
  const cleaned = String(str).replace(',', '.').replace(/[^\d.]/g, '');
  if (cleaned === '' || cleaned === '.') return null;
  const num = parseFloat(cleaned);
  return Number.isFinite(num) ? num : null;
}

// ---- Универсальный кастомный select ----
function initCustomSelect(ids, onChange) {
  const dd    = $(ids.dd);
  const btn   = $(ids.btn);
  const menu  = $(ids.menu);
  const label = $(ids.label);
  if (!dd || !btn || !menu) return { set() {}, setOptions() {} };

  const open  = () => { dd.classList.add('is-open'); menu.classList.remove('hidden'); };
  const close = () => { dd.classList.remove('is-open'); menu.classList.add('hidden'); };

  function mark(value) {
    menu.querySelectorAll('.m3-dd-opt').forEach(o =>
      o.classList.toggle('is-selected', o.dataset.value === value));
  }
  function set(value) {
    const opt = menu.querySelector(`.m3-dd-opt[data-value="${(value ?? '').replace(/"/g, '\\"')}"]`);
    if (opt) label.textContent = opt.textContent;
    mark(value ?? '');
  }
  function setOptions(html) { menu.innerHTML = html; }

  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    dd.classList.contains('is-open') ? close() : open();
  });
  menu.addEventListener('click', (e) => {
    const opt = e.target.closest('.m3-dd-opt');
    if (!opt) return;
    set(opt.dataset.value);
    close();
    onChange?.(opt.dataset.value);
  });
  document.addEventListener('click', (e) => {
    if (!e.target.closest('#' + ids.dd)) close();
  });

  return { set, setOptions };
}

function switchTab(name) {
  document.querySelectorAll('.m3-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.m3-panel').forEach(p => p.classList.toggle('hidden', p.dataset.panel !== name));
  if (name === 'active') loadActive();
  if (name === 'completed') loadCompleted();
}
document.querySelectorAll('.m3-tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.tab)));

const PAYMENT_LABEL = { unpaid: 'Не оплачено', partial: 'Частично', paid: 'Оплачено' };

function renderActive() {

function renderOrderCard(o) {
  const tpl = document.getElementById('m3-order-row-tpl');

  if (!canWrite && !id) return;

  ord.current = null;

  $('m3-order-modal-sub').textContent = order

function renderOrderStatusBadges(current) {

    html = `<span class="m3-badge m3-badge-cancelled">${esc(STATUS_LABEL.cancelled)}</span>`;

      ${i < flow.length - 1 ? '<span class="text-fg-muted text-xs">→</span>' : ''}

// ---- Описание позиции: имя, ед., остаток ----
function itemMeta(it) {
  if (it.source === 'recipe') {
    const r = cache.recipes.find(x => x.id === it.recipe_id);
    // остаток продукта ищем на складе по имени рецепта
    const prod = r ? cache.warehouse.find(w => w.type === 'product' && w.name === r.name) : null;
    return {
      name: r?.name || '(рецепт удалён)',
      unit: r?.output_unit || (prod?.unit || ''),
      stock: prod ? Number(prod.quantity || 0) : 0,
      stockKnown: !!prod,
      isRecipe: true
    };
  }
  const w = cache.warehouse.find(x => x.id === it.warehouse_item_id);
  return {
    name: w?.name || '(не выбрано)',
    unit: w?.unit || '',
    stock: w ? Number(w.quantity || 0) : 0,
    stockKnown: !!w,
    isRecipe: false
  };
}

// ---- Items editor ----
function renderOrderItems() {
  const el = $('m3-order-items');
  const readOnly = ord.current && ['shipped','completed','cancelled'].includes(ord.current.status);

  if (ord.items.length === 0) {
    el.innerHTML = '<div class="px-4 py-3 text-xs text-fg-muted">Добавьте позиции заказа</div>';
    updateOrderTotal();
    return;
  }

  el.innerHTML = ord.items.map((it, i) => {
    const m = itemMeta(it);
    const sum = Number(it.quantity || 0) * Number(it.price || 0);
    const chosen = (it.source === 'recipe' && it.recipe_id) || (it.source === 'warehouse' && it.warehouse_item_id);
    const short = chosen && Number(it.quantity) > 0 && (!m.stockKnown || Number(it.quantity) > m.stock);

    if (readOnly) {
      return `
        <div class="m3-oi-row" data-item-index="${i}">
          <div class="text-sm truncate">${esc(m.name)}</div>
          <div class="m3-oi-input--num text-sm">${formatNumber(it.quantity || 0)}</div>
          <div class="m3-oi-unit">${esc(m.unit)}</div>
          <div class="m3-oi-input--num text-sm">${esc(formatMoney(it.price || 0))}</div>
          <div class="m3-oi-sum">${esc(formatMoney(sum))}</div>
          <div></div>
        </div>`;
    }

    return `
      <div class="m3-oi-row" data-item-index="${i}">
        <button type="button" class="m3-oi-pick ${chosen ? '' : 'is-empty'}" data-pick="${i}">
          ${chosen ? `<span class="m3-badge ${m.isRecipe ? 'm3-chip-prod' : 'm3-chip-wh'}">${m.isRecipe ? 'рецепт' : 'склад'}</span>` : ''}
          <span class="m3-oi-pick-label">${chosen ? esc(m.name) : '— выберите позицию —'}</span>
          <svg class="m3-dd-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <input type="text" inputmode="decimal" placeholder="Кол-во"
          class="m3-oi-input m3-oi-input--num" data-field="quantity" value="${it.quantity ?? ''}">
        <div class="m3-oi-unit">${esc(m.unit)}</div>
        <input type="text" inputmode="decimal" placeholder="Цена"
          class="m3-oi-input m3-oi-input--num" data-field="price" value="${it.price ?? ''}">
        <div class="m3-oi-sum" data-item-sum>${esc(formatMoney(sum))}</div>
        <div class="m3-oi-del" data-remove-item="${i}">
          <svg class="w-4 h-4 text-state-error" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </div>
        ${chosen ? `<div class="m3-oi-stock ${short ? 'is-short' : ''}">${m.stockKnown ? `На складе: ${formatNumber(m.stock)} ${esc(m.unit)}` : (m.isRecipe ? 'Ещё не произведено — потребуется выпуск' : 'Нет на складе')}</div>` : ''}
        ${ord.pickerOpenIdx === i ? renderPickerHtml(it) : ''}
      </div>`;
  }).join('');

  // обработчики
  el.querySelectorAll('[data-item-index]').forEach(row => {
    const idx = Number(row.dataset.itemIndex);

    row.querySelectorAll('[data-field]').forEach(input => {
      input.addEventListener('input', () => {
        const field = input.dataset.field;
        ord.items[idx][field] = parseDecimalInput(input.value);
        const sum = Number(ord.items[idx].quantity || 0) * Number(ord.items[idx].price || 0);
        const sumEl = row.querySelector('[data-item-sum]');
        if (sumEl) sumEl.textContent = formatMoney(sum);
        updateOrderTotal();
      });
    });

    row.querySelector('[data-pick]')?.addEventListener('click', (e) => {
      e.stopPropagation();
      ord.pickerOpenIdx = ord.pickerOpenIdx === idx ? -1 : idx;
      ord.pickerActive = -1;
      renderOrderItems();
      if (ord.pickerOpenIdx === idx) {
        setTimeout(() => row.parentElement.querySelector(`[data-item-index="${idx}"] .m3-picker-search`)?.focus(), 30);
      }
    });

    row.querySelector('[data-remove-item]')?.addEventListener('click', () => {
      ord.items.splice(idx, 1);
      if (ord.pickerOpenIdx === idx) ord.pickerOpenIdx = -1;
      renderOrderItems();
    });

    // пикер (если открыт в этой строке)
    if (ord.pickerOpenIdx === idx) {
      const search = row.querySelector('.m3-picker-search');
      const listEl = row.querySelector('.m3-picker-list');
      if (search) {
        search.addEventListener('input', () => fillPicker(listEl, search.value));
        search.addEventListener('keydown', (e) => pickerKeydown(e, idx, listEl, search));
      }
      listEl?.addEventListener('click', (e) => {
        const opt = e.target.closest('[data-opt-source]');
        if (!opt) return;
        applyPick(idx, opt.dataset.optSource, opt.dataset.optId);
      });
      fillPicker(listEl, '');
    }
  });

  updateOrderTotal();
}

// HTML контейнера пикера
function renderPickerHtml(it) {
  return `
    <div class="m3-picker">
      <input class="m3-picker-search" type="text" autocomplete="off" spellcheck="false" placeholder="Поиск товара или рецепта…">
      <div class="m3-picker-list"></div>
    </div>`;
}

// Заполнение списка пикера (две группы: склад и рецепты)
function fillPicker(listEl, query) {
  if (!listEl) return;
  const q = (query || '').trim().toLowerCase();

  const wh = cache.warehouse
    .filter(w => !q || w.name.toLowerCase().includes(q) || (w.article || '').toLowerCase().includes(q))
    .map(w => ({
      source: 'warehouse', id: w.id, name: w.name,
      meta: `${w.article ? w.article + ' · ' : ''}${w.unit || ''}${w.type === 'product' ? ' · продукция' : ' · материал'}`
    }));

  const rc = cache.recipes
    .filter(r => !q || r.name.toLowerCase().includes(q) || (r.code || '').toLowerCase().includes(q))
    .map(r => ({
      source: 'recipe', id: r.id, name: r.name,
      meta: `${r.code ? r.code + ' · ' : ''}${r.output_unit || ''}`
    }));

  let html = '';
  if (wh.length) {
    html += `<div class="m3-picker-group">Склад</div>`;
    html += wh.map(o => optHtml(o, 'm3-chip-wh', 'склад')).join('');
  }
  if (rc.length) {
    html += `<div class="m3-picker-group">Рецепты</div>`;
    html += rc.map(o => optHtml(o, 'm3-chip-prod', 'рецепт')).join('');
  }
  if (!html) html = `<div class="m3-picker-opt m3-picker-opt--empty">Ничего не найдено</div>`;

  listEl.innerHTML = html;
  ord.pickerActive = -1;
}

function optHtml(o, chipClass, chipText) {
  return `<div class="m3-picker-opt" data-opt-source="${esc(o.source)}" data-opt-id="${esc(o.id)}">
    <span class="m3-badge ${chipClass}">${chipText}</span>
    <span class="m3-picker-opt-name">${esc(o.name)}</span>
    ${o.meta ? `<small>${esc(o.meta)}</small>` : ''}
  </div>`;
}

function pickerKeydown(e, idx, listEl, search) {
  const opts = Array.from(listEl.querySelectorAll('[data-opt-source]'));
  if (e.key === 'Escape') { ord.pickerOpenIdx = -1; renderOrderItems(); return; }
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    ord.pickerActive = Math.min(ord.pickerActive + 1, opts.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    ord.pickerActive = Math.max(ord.pickerActive - 1, 0);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    const target = ord.pickerActive >= 0 ? opts[ord.pickerActive] : (opts.length === 1 ? opts[0] : null);
    if (target) applyPick(idx, target.dataset.optSource, target.dataset.optId);
    return;
  } else { return; }
  opts.forEach((o, i) => o.classList.toggle('active', i === ord.pickerActive));
  opts[ord.pickerActive]?.scrollIntoView({ block: 'nearest' });
}

// Выбор позиции из пикера
function applyPick(idx, source, id) {
  const it = ord.items[idx];
  it.source = source;
  if (source === 'recipe') {
    it.recipe_id = id;
    it.warehouse_item_id = null;
  } else {
    it.warehouse_item_id = id;
    it.recipe_id = null;
    // автоподстановка цены из склада, если ещё пусто
    const w = cache.warehouse.find(x => x.id === id);
    if (w && (it.price === null || it.price === undefined || it.price === '')) it.price = w.price;
  }
  ord.pickerOpenIdx = -1;
  renderOrderItems();
}

function updateOrderTotal() {
  const total = ord.items.reduce((s, it) => s + Number(it.quantity || 0) * Number(it.price || 0), 0);
  $('m3-order-total').textContent = 'Итого: ' + formatMoney(total);
}

$('m3-order-add-item').addEventListener('click', () => {

    toast('Нет ни товаров на складе, ни рецептов', 'warning');
    return;
  }
  ord.items.push({ source: 'warehouse', warehouse_item_id: null, recipe_id: null, quantity: null, price: null });
  ord.pickerOpenIdx = ord.items.length - 1;  // сразу открываем пикер новой позиции
  renderOrderItems();
  const row = $('m3-order-items').querySelector(`[data-item-index="${ord.items.length - 1}"] .m3-picker-search`);
  setTimeout(() => row?.focus(), 30);
});

async function loadAttachments(orderId) {
  const { data } = await sb.from('attachments')
    .select('*')
    .eq('entity_type', 'sales_order')
    .eq('entity_id', orderId)
    .order('uploaded_at', { ascending: false });
  ord.attachments = data || [];
}

function renderAttachments() {
  const el = $('m3-order-attachments');
  if (ord.attachments.length === 0) {
    el.innerHTML = '<div class="px-4 py-3 text-xs text-fg-muted">Нет вложений</div>';
    return;
  }
  el.innerHTML = ord.attachments.map(a => `
    <div class="px-4 py-3 flex items-center gap-3">
      <svg class="w-5 h-5 text-fg-muted flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      <div class="min-w-0 flex-1">
        <div class="text-sm truncate">${esc(a.file_name)}</div>
        <div class="text-xs text-fg-muted">${esc(humanFileSize(a.file_size))} · ${esc(formatDate(new Date(a.uploaded_at)))}</div>
      </div>
      <a href="#" class="text-xs text-fg-muted hover:text-fg" data-download="${esc(a.storage_path)}">Скачать</a>
      <button class="text-xs text-state-error hover:underline" data-del-att="${esc(a.id)}" data-path="${esc(a.storage_path)}">Удалить</button>
    </div>
  `).join('');

  el.querySelectorAll('[data-download]').forEach(a => {
    a.addEventListener('click', async (e) => {
      e.preventDefault();
      try {
        const { data, error } = await sb.storage.from('attachments').createSignedUrl(a.dataset.download, 60);
        if (error) throw error;
        window.open(data.signedUrl, '_blank');
      } catch (err) { toast('Ошибка: ' + err.message, 'error'); }
    });
  });

  el.querySelectorAll('[data-del-att]').forEach(b => {
    b.addEventListener('click', async () => {
      if (!confirm('Удалить вложение?')) return;
      try {
        await sb.storage.from('attachments').remove([b.dataset.path]);
        await sb.from('attachments').delete().eq('id', b.dataset.delAtt);
        ord.attachments = ord.attachments.filter(x => x.id !== b.dataset.delAtt);
        renderAttachments();
        toast('Вложение удалено', 'success');
      } catch (err) { toast('Ошибка: ' + err.message, 'error'); }
    });
  });
}

$('m3-order-file-input').addEventListener('change', async (e) => {
  const files = Array.from(e.target.files || []);
  e.target.value = '';
  if (files.length === 0) return;

  if (!ord.editing) {
    toast('Сначала сохраните заказ, затем прикрепите файлы', 'warning');
    return;
  }

  const maxSize = 49 * 1024 * 1024;
  for (const f of files) {
    if (f.size > maxSize) {
      toast(`"${f.name}" больше 49 МБ, пропущен`, 'error');
      continue;
    }
    try {
      const path = `${groupId}/sales_order/${ord.editing}/${Date.now()}_${f.name}`;
      const { error: upErr } = await sb.storage.from('attachments').upload(path, f, { contentType: f.type || 'application/octet-stream' });
      if (upErr) throw upErr;

      const { data: row, error: insErr } = await sb.from('attachments').insert({
        group_id: groupId,
        entity_type: 'sales_order',
        entity_id: ord.editing,
        file_name: f.name,
        file_size: f.size,
        storage_path: path,
        uploaded_by: state.authUser.id
      }).select().single();
      if (insErr) throw insErr;

      ord.attachments.unshift(row);
      renderAttachments();
      toast(`"${f.name}" загружен`, 'success');
    } catch (err) { toast(`Ошибка загрузки "${f.name}": ` + err.message, 'error'); }
  }
});

// ---- Actions ----
function renderOrderActions() {
  const el = $('m3-order-actions');
  const o = ord.current;
  if (!o || !canWrite) { el.innerHTML = ''; return; }

  const buttons = [];

  if (o.status === 'draft') {
    buttons.push(`<button id="m3-btn-confirm" class="btn-secondary px-4 py-2 rounded-lg text-sm">Подтвердить</button>`);
  }
  if (['draft','confirmed'].includes(o.status)) {
    buttons.push(`<button id="m3-btn-ship" class="btn-primary px-4 py-2 rounded-lg text-sm">Отгрузить</button>`);
  }
  if (o.status === 'shipped') {
    const disabled = o.payment_status !== 'paid';
    buttons.push(`<button id="m3-btn-complete" class="btn-primary px-4 py-2 rounded-lg text-sm" ${disabled ? 'disabled title="Сначала отметьте оплату"' : ''}>Закрыть заказ</button>`);
  }
  if (!['completed','cancelled'].includes(o.status)) {
    const label = o.status === 'shipped' ? 'Отменить (вернуть на склад)' : 'Отменить';
    buttons.push(`<button id="m3-btn-cancel" class="btn-secondary px-4 py-2 rounded-lg text-sm">${label}</button>`);
  }

  el.innerHTML = buttons.join('');

  $('m3-btn-confirm')?.addEventListener('click', confirmOrder);
  $('m3-btn-ship')?.addEventListener('click', shipOrder);
  $('m3-btn-complete')?.addEventListener('click', completeOrder);
  $('m3-btn-cancel')?.addEventListener('click', cancelOrder);
}

function validateOrderForm() {
  const readOnly = ord.current && ['completed','cancelled'].includes(ord.current.status);
  if (readOnly && ord.current.status === 'completed') {
    $('m3-order-save').disabled = true;
    return;
  }
  $('m3-order-save').disabled = false;
}

// ---- Save ----
async function resolveCustomerId() {
  const name = $('m3-order-f-customer').value.trim();
  if (!name) return null;
  const match = cache.customers.find(c => c.name.toLowerCase() === name.toLowerCase());
  if (match) return match.id;
  const { data, error } = await sb.from('customers').insert({ group_id: groupId, name }).select().single();
  if (error) throw error;
  cache.customers.push({ id: data.id, name: data.name });
  return data.id;
}

async function persistOrder() {
  const customerId = await resolveCustomerId();
  const paymentValue = paymentValueFromLabel();

  let orderId = ord.editing;

  if (orderId) {
    const patch = { customer_id: customerId, payment_status: paymentValue };
    const { error } = await sb.from('sales_orders').update(patch).eq('id', orderId);
    if (error) throw error;
  } else {
    const { data, error } = await sb.from('sales_orders').insert({
      group_id: groupId, customer_id: customerId, status: 'draft', payment_status: paymentValue
    }).select().single();
    if (error) throw error;
    orderId = data.id;
    ord.editing = orderId;
  }

  await sb.from('sales_order_items').delete().eq('order_id', orderId);
  const payload = ord.items
    .filter(it => Number(it.quantity) > 0 && ((it.source === 'recipe' && it.recipe_id) || (it.source === 'warehouse' && it.warehouse_item_id)))
    .map(it => ({
      order_id: orderId,
      warehouse_item_id: it.source === 'warehouse' ? it.warehouse_item_id : null,
      recipe_id: it.source === 'recipe' ? it.recipe_id : null,
      quantity: Number(it.quantity),
      price: it.price === null || it.price === '' ? null : Number(it.price)
    }));
  if (payload.length) {
    const { error } = await sb.from('sales_order_items').insert(payload);
    if (error) throw error;
  }

  return orderId;
}

$('m3-order-save').addEventListener('click', async () => {
  const btn = $('m3-order-save');
  btn.disabled = true;
  btn.textContent = 'Сохраняем…';
  try {
    await persistOrder();
    toast('Заказ сохранён', 'success');
    $('m3-order-modal').classList.add('hidden');
    await loadActive();
  } catch (e) {
    toast('Ошибка: ' + e.message, 'error');
  } finally {
    btn.textContent = 'Сохранить';
    validateOrderForm();
  }
});

$('m3-order-delete').addEventListener('click', async () => {
  if (!ord.editing) return;
  if (!confirm('Удалить заказ? Все позиции и вложения будут удалены.')) return;
  try {
    if (ord.attachments.length) {
      await sb.storage.from('attachments').remove(ord.attachments.map(a => a.storage_path));
    }
    await sb.from('attachments').delete().eq('entity_type', 'sales_order').eq('entity_id', ord.editing);
    const { error } = await sb.from('sales_orders').delete().eq('id', ord.editing);
    if (error) throw error;
    toast('Заказ удалён', 'success');
    $('m3-order-modal').classList.add('hidden');
    await loadActive();
  } catch (e) { toast('Ошибка: ' + e.message, 'error'); }
});

async function confirmOrder() {
  try {
    await persistOrder();
    const { error } = await sb.from('sales_orders').update({ status: 'confirmed' }).eq('id', ord.editing);
    if (error) throw error;
    toast('Заказ подтверждён', 'success');
    $('m3-order-modal').classList.add('hidden');
    await loadActive();
  } catch (e) { toast('Ошибка: ' + e.message, 'error'); }
}

async function shipOrder() {
  try {
    $('m3-order-deficit').classList.add('hidden');
    await persistOrder();
    const { data, error } = await sb.rpc('ship_sales_order', { p_order_id: ord.editing });
    if (error) throw error;
    if (!data?.ok) {
      if (data?.error === 'INSUFFICIENT_STOCK' && Array.isArray(data.deficit)) {
        $('m3-order-deficit').classList.remove('hidden');
        $('m3-order-deficit-list').innerHTML = data.deficit.map(d =>
          `<div>• ${esc(d.name)}: не хватает ${formatNumber(d.missing)} ${esc(d.unit || '')} (нужно ${formatNumber(d.need)}, есть ${formatNumber(d.have)})</div>`
        ).join('');
        toast('Недостаточно продукции на складе', 'error');
        return;
      }
      if (data?.error === 'NO_ITEMS') throw new Error('В заказе нет позиций');
      if (data?.error === 'ITEM_NOT_LINKED') throw new Error('Одна из позиций не привязана к складу или рецепту');
      if (data?.error === 'INVALID_QUANTITY') throw new Error('Неверное количество в позиции');
      throw new Error(data?.error || 'UNKNOWN');
    }
    toast('Заказ отгружен, товар списан со склада', 'success');
    $('m3-order-modal').classList.add('hidden');
    await loadActive();
  } catch (e) { toast('Ошибка: ' + e.message, 'error'); }
}

async function completeOrder() {
  try {
    await sb.from('sales_orders').update({ payment_status: paymentValueFromLabel() }).eq('id', ord.editing);
    const { data, error } = await sb.rpc('complete_sales_order', { p_order_id: ord.editing });
    if (error) throw error;
    if (!data?.ok) {
      if (data?.error === 'NOT_PAID') throw new Error('Нельзя закрыть неоплаченный заказ');
      throw new Error(data?.error || 'UNKNOWN');
    }
    toast('Заказ закрыт', 'success');
    $('m3-order-modal').classList.add('hidden');
    await loadActive();
  } catch (e) { toast('Ошибка: ' + e.message, 'error'); }
}

async function cancelOrder() {
  const wasShipped = ord.current?.status === 'shipped';
  const msg = wasShipped
    ? 'Отменить заказ? Товар будет возвращён на склад.'
    : 'Отменить заказ?';
  if (!confirm(msg)) return;
  try {
    const { data, error } = await sb.rpc('cancel_sales_order', { p_order_id: ord.editing });
    if (error) throw error;
    if (!data?.ok) throw new Error(data?.error || 'UNKNOWN');
    toast('Заказ отменён', 'success');
    $('m3-order-modal').classList.add('hidden');
    await loadActive();
  } catch (e) { toast('Ошибка: ' + e.message, 'error'); }
}

// ---- helpers ----
function pluralize(n, forms) {
  const mod100 = Math.abs(n) % 100;
  const mod10 = mod100 % 10;
  if (mod100 >= 11 && mod100 <= 19) return forms[2];
  if (mod10 === 1) return forms[0];
  if (mod10 >= 2 && mod10 <= 4) return forms[1];
  return forms[2];
}
function humanFileSize(bytes) {
  if (!bytes && bytes !== 0) return '';
  const units = ['Б','КБ','МБ','ГБ'];
  let i = 0; let n = Number(bytes);
  while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
  return `${n.toFixed(i === 0 ? 0 : 1)} ${units[i]}`;
}

// ---- init ----
switchTab('active');
</script>
