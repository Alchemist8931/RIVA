<style>
/* ============================================================ RIVA · modal3 — Продажи ============================================================ */
.m3{ color:var(--text); }
.m3-head{ display:flex; align-items:center; justify-content:space-between; gap:var(--sp-4); margin-bottom:var(--sp-5); flex-wrap:wrap; }
.m3-title{ font-size:1.35rem; font-weight:700; letter-spacing:-.02em; }
.m3-tools{ display:flex; align-items:center; gap:var(--sp-3); flex-wrap:wrap; }
.m3-search{ display:flex; align-items:center; gap:var(--sp-2); height:38px; padding:0 var(--sp-3); background:var(--card); border:1px solid var(--border); border-radius:var(--r); color:var(--text-3); min-width:190px; }
.m3-search:focus-within{ border-color:var(--accent-line); }
.m3-search svg{ width:15px; height:15px; flex:0 0 auto; }
.m3-search input{ flex:1; background:none; border:none; outline:none; color:var(--text); font-size:.875rem; min-width:0; }
.m3-pill{ display:inline-flex; align-items:center; gap:6px; height:34px; padding:0 var(--sp-3); border-radius:var(--r); background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent-line); font-size:.8rem; font-weight:600; }
.m3-pill.muted{ background:var(--card); color:var(--text-3); border-color:var(--border); font-weight:500; }
.m3-pill svg{ width:14px; height:14px; }

.m3-btn{ display:inline-flex; align-items:center; gap:var(--sp-2); height:38px; padding:0 var(--sp-4); border-radius:var(--r); background:var(--btn-bg); color:var(--btn-fg); font-size:.875rem; font-weight:600; box-shadow:var(--shadow-card); transition:transform var(--dur-fast) var(--ease),opacity var(--dur-fast) var(--ease); white-space:nowrap; }
.m3-btn:hover{ transform:translateY(-1px); opacity:.92; }
.m3-btn:disabled{ opacity:.5; cursor:not-allowed; transform:none; }
.m3-btn svg{ width:16px; height:16px; }
.m3-btn.ghost{ background:var(--card); color:var(--text); border:1px solid var(--border-strong); box-shadow:none; }
.m3-btn.ghost:hover{ background:var(--card-hover); }
.m3-btn.sm{ height:32px; padding:0 var(--sp-3); font-size:.82rem; }

.m3-card{ border:1px solid var(--border); border-radius:var(--r-lg); background:var(--card); box-shadow:var(--shadow-card); overflow:hidden; }
.m3-panel{ display:none; }
.m3-panel.on{ display:block; animation:m3in .3s var(--ease); }
@keyframes m3in{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:none; } }

.m3-tablewrap{ overflow-x:auto; }
table.m3-tbl{ width:100%; border-collapse:collapse; font-size:.875rem; }
.m3-tbl th{ text-align:left; font-size:.72rem; letter-spacing:.06em; text-transform:uppercase; color:var(--text-3); font-weight:600; padding:var(--sp-3) var(--sp-4); border-bottom:1px solid var(--border); white-space:nowrap; }
.m3-tbl td{ padding:var(--sp-3) var(--sp-4); border-bottom:1px solid var(--border); color:var(--text-2); vertical-align:middle; }
.m3-tbl tr:last-child td{ border-bottom:none; }
.m3-tbl tbody tr.row{ transition:background var(--dur-fast) var(--ease); }
.m3-tbl tbody tr.row:hover{ background:var(--card-hover); }
.m3-tbl td.num, .m3-tbl th.num{ text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; }
.m3-tbl .nm{ color:var(--text); font-weight:600; }
.m3-tbl .sub{ color:var(--text-3); font-size:.78rem; font-family:var(--font-mono); }

.m3-chip{ display:inline-flex; align-items:center; gap:5px; font-size:.74rem; font-weight:500; padding:3px 9px; border-radius:var(--r-sm); white-space:nowrap; border:1px solid var(--border); background:var(--card); color:var(--text-2); }
.m3-chip::before{ content:""; width:6px; height:6px; border-radius:50%; background:currentColor; }
.st-draft{ color:var(--st-pending); background:var(--st-pending-bg); border-color:transparent; }
.st-confirmed{ color:var(--st-upcoming); background:var(--st-upcoming-bg); border-color:transparent; }
.st-shipped{ color:var(--st-upcoming); background:var(--st-upcoming-bg); border-color:transparent; }
.st-completed{ color:var(--st-completed); background:var(--st-completed-bg); border-color:transparent; }
.st-cancelled{ color:var(--st-cancelled); background:var(--st-cancelled-bg); border-color:transparent; }
.pay-paid{ color:var(--st-completed); } .pay-partial{ color:var(--st-pending); } .pay-unpaid{ color:var(--text-3); }
.it-prod{ color:var(--st-upcoming); } .it-recipe{ color:var(--accent); }

.m3-acts{ display:flex; gap:6px; justify-content:flex-end; }
.m3-ic{ width:30px; height:30px; display:grid; place-items:center; border-radius:var(--r-sm); border:1px solid var(--border); background:var(--card); color:var(--text-2); transition:all var(--dur-fast) var(--ease); }
.m3-ic:hover{ border-color:var(--border-strong); color:var(--text); background:var(--card-hover); }
.m3-ic.danger:hover{ color:var(--st-cancelled); border-color:var(--st-cancelled); }
.m3-ic.go:hover{ color:var(--st-completed); border-color:var(--st-completed); }
.m3-ic svg{ width:15px; height:15px; }

.m3-empty{ display:grid; place-items:center; gap:var(--sp-2); padding:var(--sp-12) var(--sp-4); text-align:center; color:var(--text-3); }
.m3-empty svg{ width:36px; height:36px; opacity:.45; }
.m3-empty .t{ font-size:1rem; font-weight:600; color:var(--text-2); }
.m3-empty .d{ font-size:.875rem; max-width:42ch; }
.m3-loading{ display:grid; place-items:center; gap:var(--sp-3); padding:var(--sp-12); color:var(--text-3); }
.m3-loading .spin{ width:24px; height:24px; border-radius:50%; border:2px solid var(--border); border-top-color:var(--accent); animation:m3spin 1s linear infinite; }
@keyframes m3spin{ to{ transform:rotate(360deg);} }
.m3-foot{ display:flex; align-items:center; justify-content:space-between; padding:var(--sp-3) var(--sp-4); border-top:1px solid var(--border); font-size:.8rem; color:var(--text-3); }
.m3-foot b{ color:var(--text); font-weight:600; }

/* воронка статусов */
.m3-funnel{ display:flex; gap:var(--sp-2); padding:var(--sp-3) var(--sp-4); border-bottom:1px solid var(--border); flex-wrap:wrap; }
.m3-funnel button{ display:inline-flex; align-items:center; gap:6px; height:30px; padding:0 var(--sp-3); border-radius:var(--r); border:1px solid var(--border); background:var(--card); color:var(--text-3); font-size:.8rem; }
.m3-funnel button.on{ background:var(--accent-soft); color:var(--accent); border-color:var(--accent-line); }
.m3-funnel button .c{ font-family:var(--font-mono); font-size:.72rem; opacity:.8; }

/* диалоги */
.m3-overlay{ position:fixed; inset:0; z-index:400; display:grid; place-items:center; padding:var(--sp-4); background:rgba(0,0,0,.45); -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); animation:m3fade .2s var(--ease); }
@keyframes m3fade{ from{ opacity:0;} to{ opacity:1; } }
.m3-dialog{ width:100%; max-width:600px; max-height:90vh; display:flex; flex-direction:column; background:var(--surface); border:1px solid var(--border-strong); border-radius:var(--r-lg); box-shadow:var(--shadow-pop); animation:m3pop .25s var(--ease); }
@keyframes m3pop{ from{ opacity:0; transform:translateY(10px) scale(.98);} to{ opacity:1; transform:none; } }
.m3-dialog.wide{ max-width:780px; }
.m3-dhead{ display:flex; align-items:center; justify-content:space-between; padding:var(--sp-4) var(--sp-5); border-bottom:1px solid var(--border); }
.m3-dhead h3{ font-size:1.05rem; font-weight:700; letter-spacing:-.01em; }
.m3-dclose{ width:32px; height:32px; display:grid; place-items:center; border-radius:var(--r-sm); color:var(--text-3); }
.m3-dclose:hover{ background:var(--card-hover); color:var(--text); }
.m3-dbody{ padding:var(--sp-5); overflow-y:auto; }
.m3-dfoot{ display:flex; justify-content:flex-end; gap:var(--sp-3); padding:var(--sp-4) var(--sp-5); border-top:1px solid var(--border); }
.m3-field{ margin-bottom:var(--sp-4); } .m3-field:last-child{ margin-bottom:0; }
.m3-field label{ display:block; font-size:.78rem; font-weight:600; color:var(--text-2); margin-bottom:6px; }
.m3-input, .m3-select, .m3-textarea{ width:100%; height:40px; padding:0 var(--sp-3); background:var(--card); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-size:.9rem; font-family:inherit; transition:border-color var(--dur-fast) var(--ease); }
.m3-textarea{ height:auto; min-height:64px; padding:var(--sp-2) var(--sp-3); resize:vertical; }
.m3-input:focus, .m3-select:focus, .m3-textarea:focus{ outline:none; border-color:var(--accent-line); }
.m3-row2{ display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-3); }
.m3-hint{ font-size:.78rem; color:var(--text-3); margin-top:6px; }
.m3-total{ display:flex; align-items:center; justify-content:space-between; padding:var(--sp-3) 0; border-top:1px solid var(--border); margin-top:var(--sp-2); font-weight:700; color:var(--text); }

/* строки позиций заказа */
.m3-li-head{ display:grid; grid-template-columns:110px 1fr 70px 90px 30px; gap:var(--sp-2); font-size:.7rem; text-transform:uppercase; letter-spacing:.05em; color:var(--text-3); margin-bottom:6px; padding:0 2px; }
.m3-li{ display:grid; grid-template-columns:110px 1fr 70px 90px 30px; gap:var(--sp-2); align-items:center; margin-bottom:var(--sp-2); }
.m3-li .m3-input, .m3-li .m3-select{ height:36px; }
.m3-li-del{ width:30px; height:30px; display:grid; place-items:center; border-radius:var(--r-sm); border:1px solid var(--border); color:var(--text-3); }
.m3-li-del:hover{ color:var(--st-cancelled); border-color:var(--st-cancelled); }
</style>

<div class="m3" id="m3-root">
  <div class="m3-head">
    <div class="m3-title" id="m3-title">Клиенты</div>
    <div class="m3-tools" id="m3-tools"></div>
  </div>
  <div class="m3-card">
    <div class="m3-panel" data-tab="customers" id="m3p-customers"></div>
    <div class="m3-panel" data-tab="orders" id="m3p-orders"></div>
    <div class="m3-panel" data-tab="shipments" id="m3p-shipments"></div>
  </div>
</div>

<script>
(function(){
  var RIVA=window.RIVA, U=window.RIVA_UTILS;
  if(!RIVA||!U){ var r=document.getElementById('m3-root'); if(r) r.innerHTML='<div class="m3-empty"><div class="t">Модуль не инициализирован</div></div>'; return; }
  var sb=RIVA.sb;
  var INSTANCE=Date.now()+'-'+Math.random(); RIVA._m3Instance=INSTANCE;
  function alive(){ return RIVA._m3Instance===INSTANCE && document.getElementById('m3-root'); }

  var data={ customers:[], orders:[], whLite:[], recLite:[] };
  var search='', curTab='customers', statusFilter='all';

  function role(){ return (RIVA.state.currentGroup && RIVA.state.currentGroup.role)||null; }
  function canWrite(){ return ['admin','sales','management'].indexOf(role())>=0; }
  function groupId(){ return RIVA.state.currentGroup && RIVA.state.currentGroup.group_id; }
  function salesUnits(){ return (RIVA.unitsBySection&&RIVA.unitsBySection.sales)||[]; }
  function activeUnit(){ return RIVA.state.activeUnitId||null; }
  function activeSalesUnit(){ var id=activeUnit(); return salesUnits().some(function(u){return u.id===id;})?id:null; }
  function activeSalesName(){ var id=activeSalesUnit(); var u=salesUnits().find(function(x){return x.id===id;}); return u?u.name:null; }
  function defaultSalesUnit(){ var us=salesUnits(); var d=us.find(function(u){return u.is_default;})||us[0]; return d?d.id:null; }
  function resolveSalesUnit(){ return activeSalesUnit()||defaultSalesUnit(); }
  function num(v){ var n=typeof v==='number'?v:parseFloat(v); return isFinite(n)?n:0; }

  function tabFromLabel(label){ var l=(label||'').toLowerCase(); if(l.indexOf('заказ')>=0) return 'orders'; if(l.indexOf('отгруз')>=0) return 'shipments'; return 'customers'; }

  function showTab(tab){
    curTab=tab; search=''; statusFilter='all';
    var titles={customers:'Клиенты',orders:'Заказы',shipments:'Отгрузки'};
    document.getElementById('m3-title').textContent=titles[tab]||'';
    document.querySelectorAll('#m3-root .m3-panel').forEach(function(p){ p.classList.toggle('on', p.getAttribute('data-tab')===tab); });
    renderTools(); loadTab(tab);
  }

  function renderTools(){
    var t=document.getElementById('m3-tools'); t.innerHTML='';
    var an=activeSalesName(); var pill=document.createElement('span'); pill.className='m3-pill'+(an?'':' muted');
    pill.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h2l2.4 12.3a2 2 0 0 0 2 1.7h7.7a2 2 0 0 0 2-1.6L22 8H6"/><circle cx="9" cy="20" r="1.5"/><circle cx="18" cy="20" r="1.5"/></svg>'+(an?U.esc(an):'Все отделы продаж');
    t.appendChild(pill);
    var s=document.createElement('label'); s.className='m3-search';
    s.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>';
    var i=document.createElement('input'); i.type='text'; i.placeholder='Поиск'; i.value=search;
    i.addEventListener('input', function(){ search=i.value.toLowerCase(); renderCurrent(); }); s.appendChild(i); t.appendChild(s);
    if(canWrite()){
      if(curTab==='customers') t.appendChild(mkbtn('Новый клиент', iconPlus(), function(){ openCustomerDialog(null); }));
      else if(curTab==='orders') t.appendChild(mkbtn('Новый заказ', iconPlus(), function(){ openOrderDialog(null); }));
    }
  }
  function mkbtn(label,icon,on){ var b=document.createElement('button'); b.className='m3-btn'; b.innerHTML=icon+'<span>'+label+'</span>'; b.addEventListener('click',on); return b; }
  function iconPlus(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>'; }

  async function ensurePickers(){
    if(!data.whLite.length){ var w=await sb.from('warehouse_items').select('id,name,unit,type,quantity,price').order('name'); if(!w.error) data.whLite=w.data||[]; }
    if(!data.recLite.length){ var r=await sb.from('recipes').select('id,name,output_unit').order('name'); if(!r.error) data.recLite=r.data||[]; }
  }

  async function loadTab(tab){
    var panel=document.getElementById('m3p-'+tab); panel.innerHTML='<div class="m3-loading"><div class="spin"></div>Загрузка…</div>';
    try{
      if(tab==='customers'){ var c=await sb.from('customers').select('*').order('name'); if(c.error) throw c.error; data.customers=c.data||[]; }
      else { // orders + shipments из одной выборки
        var o=await sb.from('sales_orders').select('*, customers(name), sales_order_items(*)').order('created_at',{ascending:false}); if(o.error) throw o.error; data.orders=o.data||[];
      }
      if(!alive()) return; renderCurrent();
    }catch(err){ if(!alive())return; panel.innerHTML='<div class="m3-empty"><div class="t">Не удалось загрузить</div><div class="d">'+U.esc(err.message||String(err))+'</div></div>'; }
  }

  function renderCurrent(){ if(curTab==='customers') renderCustomers(); else if(curTab==='orders') renderOrders(); else renderShipments(); }
  function match(s){ return !search||(s||'').toLowerCase().indexOf(search)>=0; }

  /* ---------- КЛИЕНТЫ ---------- */
  function renderCustomers(){
    var panel=document.getElementById('m3p-customers');
    var rows=data.customers.filter(function(c){ return match(c.name)||match(c.contact)||match(c.phone); });
    if(!data.customers.length){ panel.innerHTML=empty('Нет клиентов','Добавьте клиента, чтобы оформлять продажи.'); return; }
    var html='<div class="m3-tablewrap"><table class="m3-tbl"><thead><tr><th>Клиент</th><th>Контакт</th><th>Телефон</th><th>Email</th>'+(canWrite()?'<th></th>':'')+'</tr></thead><tbody>';
    rows.forEach(function(c){
      html+='<tr class="row"><td><div class="nm">'+U.esc(c.name)+'</div>'+(c.comment?'<div class="sub">'+U.esc(c.comment)+'</div>':'')+'</td>'
        +'<td>'+U.esc(c.contact||'—')+'</td><td>'+U.esc(c.phone||'—')+'</td><td>'+U.esc(c.email||'—')+'</td>'
        +(canWrite()?('<td><div class="m3-acts">'+ic('edit','Изм.',c.id,svgEdit())+ic('del','Удал.',c.id,svgTrash(),true)+'</div></td>'):'')+'</tr>';
    });
    html+='</tbody></table></div><div class="m3-foot"><span>Клиентов: <b>'+data.customers.length+'</b></span></div>';
    panel.innerHTML=html;
    panel.querySelectorAll('[data-act]').forEach(function(b){ b.addEventListener('click', function(){ var id=b.getAttribute('data-id'), it=data.customers.find(function(x){return x.id===id;}); if(b.getAttribute('data-act')==='edit') openCustomerDialog(it); else confirmAct('Удалить клиента «'+it.name+'»?','Нельзя удалить, если есть заказы.','Удалить',true,function(){ return delCustomer(id); }); }); });
  }
  function openCustomerDialog(it){
    var e=!!it;
    var body=''
      +'<div class="m3-field"><label>Название / ФИО *</label><input class="m3-input" id="c-name" value="'+U.esc(e?it.name:'')+'"></div>'
      +'<div class="m3-row2"><div class="m3-field"><label>Контактное лицо</label><input class="m3-input" id="c-contact" value="'+U.esc(e?(it.contact||''):'')+'"></div>'
      +'<div class="m3-field"><label>Телефон</label><input class="m3-input" id="c-phone" value="'+U.esc(e?(it.phone||''):'')+'"></div></div>'
      +'<div class="m3-field"><label>Email</label><input class="m3-input" id="c-email" value="'+U.esc(e?(it.email||''):'')+'"></div>'
      +(e?'':'<div class="m3-field"><label>Отдел продаж</label>'+unitSelectHTML('c-unitid')+'</div>')
      +'<div class="m3-field"><label>Комментарий</label><textarea class="m3-textarea" id="c-comment">'+U.esc(e?(it.comment||''):'')+'</textarea></div>';
    dialog({ title:e?'Клиент':'Новый клиент', ok:e?'Сохранить':'Добавить', body:body, onOk:async function(ov){
      var name=val(ov,'#c-name'); if(!name){ U.toast('Укажите название'); return false; }
      var rec={ name:name, contact:val(ov,'#c-contact')||null, phone:val(ov,'#c-phone')||null, email:val(ov,'#c-email')||null, comment:val(ov,'#c-comment')||null };
      var res;
      if(e){ res=await sb.from('customers').update(rec).eq('id',it.id); }
      else { rec.group_id=groupId(); rec.unit_id=(ov.querySelector('#c-unitid')||{}).value||resolveSalesUnit(); res=await sb.from('customers').insert(rec); }
      if(res.error){ U.toast('Ошибка: '+res.error.message); return false; }
      U.toast(e?'Сохранено':'Клиент добавлен'); await loadTab('customers');
    }});
  }
  async function delCustomer(id){ var r=await sb.from('customers').delete().eq('id',id); if(r.error){ U.toast('Нельзя удалить: есть заказы'); return false; } U.toast('Удалено'); await loadTab('customers'); }

  /* ---------- ЗАКАЗЫ ---------- */
  function orderStatus(st){ var m={draft:['st-draft','Черновик'],confirmed:['st-confirmed','Подтверждён'],shipped:['st-shipped','Отгружен'],completed:['st-completed','Завершён'],cancelled:['st-cancelled','Отменён']}; var x=m[st]||['','—']; return '<span class="m3-chip '+x[0]+'">'+x[1]+'</span>'; }
  function payChip(p){ var m={paid:['pay-paid','оплачен'],partial:['pay-partial','частично'],unpaid:['pay-unpaid','не оплачен']}; var x=m[p||'unpaid']||['pay-unpaid','—']; return '<span class="'+x[0]+'" style="font-size:.78rem">'+x[1]+'</span>'; }
  function orderSum(o){ return (o.sales_order_items||[]).reduce(function(a,i){ return a+num(i.quantity)*num(i.price); },0); }

  function renderOrders(){
    var panel=document.getElementById('m3p-orders');
    var counts={all:data.orders.length,draft:0,confirmed:0,shipped:0,completed:0,cancelled:0};
    data.orders.forEach(function(o){ if(counts[o.status]!=null) counts[o.status]++; });
    var funnel='<div class="m3-funnel">'+['all','draft','confirmed','shipped','completed','cancelled'].map(function(k){
      var labels={all:'Все',draft:'Черновики',confirmed:'Подтверждённые',shipped:'Отгруженные',completed:'Завершённые',cancelled:'Отменённые'};
      return '<button data-st="'+k+'"'+(statusFilter===k?' class="on"':'')+'>'+labels[k]+' <span class="c">'+counts[k]+'</span></button>';
    }).join('')+'</div>';
    var rows=data.orders.filter(function(o){ return (statusFilter==='all'||o.status===statusFilter) && (match(o.order_number)||match(o.customers&&o.customers.name)); });
    var inner;
    if(!data.orders.length){ inner=empty('Нет заказов','Создайте заказ: позиции — товар со склада или рецепт. После подтверждения и отгрузки склад спишется автоматически.'); }
    else {
      var html='<div class="m3-tablewrap"><table class="m3-tbl"><thead><tr><th>Заказ</th><th>Клиент</th><th>Статус</th><th class="num">Позиций</th><th class="num">Сумма</th><th>Оплата</th><th></th></tr></thead><tbody>';
      rows.forEach(function(o){
        html+='<tr class="row"><td><div class="nm">'+U.esc(o.order_number||'—')+'</div><div class="sub">'+U.formatDate(o.created_at)+'</div></td>'
          +'<td>'+U.esc((o.customers&&o.customers.name)||'—')+'</td>'
          +'<td>'+orderStatus(o.status)+'</td>'
          +'<td class="num">'+(o.sales_order_items||[]).length+'</td>'
          +'<td class="num">'+U.formatMoney(orderSum(o))+'</td>'
          +'<td>'+payChip(o.payment_status)+'</td>'
          +'<td><div class="m3-acts">'+orderActions(o)+'</div></td></tr>';
      });
      html+='</tbody></table></div><div class="m3-foot"><span>Показано: <b>'+rows.length+'</b> из '+data.orders.length+'</span></div>';
      inner=html;
    }
    panel.innerHTML=funnel+inner;
    panel.querySelectorAll('.m3-funnel [data-st]').forEach(function(b){ b.addEventListener('click', function(){ statusFilter=b.getAttribute('data-st'); renderOrders(); }); });
    panel.querySelectorAll('[data-oact]').forEach(function(b){ b.addEventListener('click', function(){
      var id=b.getAttribute('data-id'), o=data.orders.find(function(x){return x.id===id;}), a=b.getAttribute('data-oact');
      if(a==='view') openOrderView(o);
      else if(a==='edit') openOrderDialog(o);
      else if(a==='confirm') doConfirm(id);
      else if(a==='ship') confirmAct('Отгрузить заказ '+(o.order_number||'')+'?','Товары спишутся со склада, движение запишется в журнал.','Отгрузить',false,function(){ return doShip(id); });
      else if(a==='complete') confirmAct('Завершить заказ '+(o.order_number||'')+'?','Заказ перейдёт в «Завершён» и попадёт в доход казначейства.','Завершить',false,function(){ return doComplete(id); });
      else if(a==='cancel') confirmAct('Отменить заказ '+(o.order_number||'')+'?',(o.status==='shipped'?'Отгруженные товары вернутся на склад.':'Заказ будет отменён.'),'Отменить заказ',true,function(){ return doCancel(id); });
      else if(a==='del') confirmAct('Удалить черновик '+(o.order_number||'')+'?','Действие необратимо.','Удалить',true,function(){ return delOrder(id); });
    });});
  }
  function orderActions(o){
    var s=ic('view','Открыть',o.id,'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>',false,'oact');
    if(canWrite()){
      if(o.status==='draft'){ s+=ic('confirm','Подтвердить',o.id,'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 6 9 17l-5-5"/></svg>',false,'oact','go'); s+=ic('edit','Изменить',o.id,svgEdit(),false,'oact'); s+=ic('del','Удалить',o.id,svgTrash(),true,'oact'); }
      else if(o.status==='confirmed'){ s+=ic('ship','Отгрузить',o.id,'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7h11v8H3zM14 10h4l3 3v2h-7z"/><circle cx="7" cy="18" r="1.6"/><circle cx="17" cy="18" r="1.6"/></svg>',false,'oact','go'); s+=ic('cancel','Отменить',o.id,svgX(),true,'oact'); }
      else if(o.status==='shipped'){ s+=ic('complete','Завершить',o.id,'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 6 9 17l-5-5"/></svg>',false,'oact','go'); s+=ic('cancel','Отменить',o.id,svgX(),true,'oact'); }
    }
    return s;
  }

  /* ---------- ОТГРУЗКИ (confirmed/shipped/completed) ---------- */
  function renderShipments(){
    var panel=document.getElementById('m3p-shipments');
    var ship=data.orders.filter(function(o){ return ['confirmed','shipped','completed'].indexOf(o.status)>=0; });
    var rows=ship.filter(function(o){ return match(o.order_number)||match(o.customers&&o.customers.name); });
    if(!ship.length){ panel.innerHTML=empty('Нет отгрузок','Подтверждённые заказы появятся здесь — их можно отгрузить и завершить.'); return; }
    var html='<div class="m3-tablewrap"><table class="m3-tbl"><thead><tr><th>Заказ</th><th>Клиент</th><th>Статус</th><th>Отгружен</th><th class="num">Сумма</th><th></th></tr></thead><tbody>';
    rows.forEach(function(o){
      html+='<tr class="row"><td><div class="nm">'+U.esc(o.order_number||'—')+'</div></td>'
        +'<td>'+U.esc((o.customers&&o.customers.name)||'—')+'</td>'
        +'<td>'+orderStatus(o.status)+'</td>'
        +'<td class="sub">'+(o.shipped_at?U.formatDateTime(o.shipped_at):'—')+'</td>'
        +'<td class="num">'+U.formatMoney(orderSum(o))+'</td>'
        +'<td><div class="m3-acts">'+orderActions(o)+'</div></td></tr>';
    });
    html+='</tbody></table></div><div class="m3-foot"><span>В работе: <b>'+ship.length+'</b></span></div>';
    panel.innerHTML=html;
    panel.querySelectorAll('[data-oact]').forEach(function(b){ b.addEventListener('click', function(){
      var id=b.getAttribute('data-id'), o=data.orders.find(function(x){return x.id===id;}), a=b.getAttribute('data-oact');
      if(a==='view') openOrderView(o);
      else if(a==='ship') confirmAct('Отгрузить заказ '+(o.order_number||'')+'?','Товары спишутся со склада.','Отгрузить',false,function(){ return doShip(id); });
      else if(a==='complete') confirmAct('Завершить заказ '+(o.order_number||'')+'?','Заказ попадёт в доход казначейства.','Завершить',false,function(){ return doComplete(id); });
      else if(a==='cancel') confirmAct('Отменить заказ '+(o.order_number||'')+'?',(o.status==='shipped'?'Товары вернутся на склад.':'Заказ будет отменён.'),'Отменить заказ',true,function(){ return doCancel(id); });
    });});
  }

  /* ---------- диалог заказа (гибридные позиции) ---------- */
  function openOrderDialog(order){
    var isEdit=!!order;
    if(isEdit && order.status!=='draft'){ U.toast('Редактировать можно только черновик'); return; }
    dialog({ title:isEdit?'Заказ '+(order.order_number||''):'Новый заказ', wide:true, ok:isEdit?'Сохранить':'Создать черновик',
      body:'<div class="m3-loading"><div class="spin"></div>Подготовка…</div>',
      onMount:async function(ov){
        await ensurePickers();
        if(!data.customers.length){ var c=await sb.from('customers').select('id,name').order('name'); if(!c.error) data.customers=c.data||[]; }
        if(!alive()) return;
        var custOpts=data.customers.map(function(c){ return '<option value="'+c.id+'"'+(isEdit&&order.customer_id===c.id?' selected':'')+'>'+U.esc(c.name)+'</option>'; }).join('')||'<option value="">— нет клиентов —</option>';
        var body=''
          +'<div class="m3-row2"><div class="m3-field"><label>Клиент</label><select class="m3-select" id="o-cust">'+custOpts+'</select></div>'
          +'<div class="m3-field"><label>Отдел продаж</label>'+unitSelectHTML('o-unitid', isEdit?order.unit_id:null)+'</div></div>'
          +'<div class="m3-field"><label>Позиции</label><div class="m3-li-head"><span>Тип</span><span>Позиция</span><span>Кол-во</span><span>Цена</span><span></span></div><div id="o-lines"></div>'
          +'<button class="m3-btn ghost sm" id="o-addline" style="margin-top:8px;">+ позиция</button></div>'
          +'<div class="m3-total"><span>Итого</span><span id="o-total">'+U.formatMoney(0)+'</span></div>'
          +'<div class="m3-field"><label>Комментарий</label><textarea class="m3-textarea" id="o-comment">'+U.esc(isEdit?(order.comment||''):'')+'</textarea></div>';
        ov.querySelector('.m3-dbody').innerHTML=body;
        var lines=ov.querySelector('#o-lines');
        function recalc(){ var tot=0; ov.querySelectorAll('#o-lines .m3-li').forEach(function(r){ tot+=num(r.querySelector('.li-qty').value)*num(r.querySelector('.li-price').value); }); ov.querySelector('#o-total').textContent=U.formatMoney(tot); }
        function addLine(pre){
          var row=document.createElement('div'); row.className='m3-li';
          row.innerHTML='<select class="m3-select li-type"><option value="product">Товар</option><option value="recipe">Рецепт</option></select>'
            +'<select class="m3-select li-val"></select>'
            +'<input class="m3-input li-qty" type="number" step="any" placeholder="0">'
            +'<input class="m3-input li-price" type="number" step="any" placeholder="0">'
            +'<button class="m3-li-del" title="Удалить">✕</button>';
          row.querySelector('.m3-li-del').onclick=function(){ row.remove(); recalc(); };
          function fillVal(type, selId){
            var sel=row.querySelector('.li-val');
            if(type==='recipe'){ sel.innerHTML=data.recLite.map(function(r){ return '<option value="'+r.id+'">'+U.esc(r.name)+'</option>'; }).join('')||'<option value="">нет рецептов</option>'; }
            else { sel.innerHTML=data.whLite.filter(function(w){return w.type==='product';}).map(function(w){ return '<option value="'+w.id+'" data-price="'+(w.price||'')+'">'+U.esc(w.name)+'</option>'; }).join('')||'<option value="">нет готовой продукции</option>'; }
            if(selId) sel.value=selId;
            // автоцена для товара
            sel.onchange=function(){ if(type==='product'){ var opt=sel.options[sel.selectedIndex]; var p=opt&&opt.getAttribute('data-price'); if(p && !row.querySelector('.li-price').value){ row.querySelector('.li-price').value=p; recalc(); } } };
          }
          row.querySelector('.li-type').addEventListener('change', function(e){ fillVal(e.target.value); });
          var t=(pre&&pre.type)||'product'; row.querySelector('.li-type').value=t; fillVal(t, pre&&pre.val);
          if(pre){ if(pre.qty!=null) row.querySelector('.li-qty').value=pre.qty; if(pre.price!=null) row.querySelector('.li-price').value=pre.price; }
          row.querySelector('.li-qty').addEventListener('input',recalc); row.querySelector('.li-price').addEventListener('input',recalc);
          lines.appendChild(row);
        }
        ov.querySelector('#o-addline').onclick=function(){ addLine(null); };
        if(isEdit){ var items=order.sales_order_items||[]; items.forEach(function(i){ addLine({ type:i.recipe_id?'recipe':'product', val:i.recipe_id||i.warehouse_item_id, qty:num(i.quantity), price:num(i.price) }); }); if(!items.length) addLine(null); }
        else addLine(null);
        recalc();
      },
      onOk:async function(ov){
        var custId=val(ov,'#o-cust')||null;
        var unitId=(ov.querySelector('#o-unitid')||{}).value||resolveSalesUnit();
        var rows=Array.prototype.map.call(ov.querySelectorAll('#o-lines .m3-li'), function(r){
          var type=r.querySelector('.li-type').value, v=r.querySelector('.li-val').value, q=parseFloat(r.querySelector('.li-qty').value), p=parseFloat(r.querySelector('.li-price').value);
          if(!v||!(q>0)) return null;
          return { type:type, val:v, qty:q, price:isFinite(p)?p:0 };
        }).filter(Boolean);
        if(!rows.length){ U.toast('Добавьте хотя бы одну позицию'); return false; }
        var orderId;
        if(isEdit){ var up=await sb.from('sales_orders').update({ customer_id:custId, unit_id:unitId, comment:val(ov,'#o-comment')||null }).eq('id',order.id); if(up.error){ U.toast('Ошибка: '+up.error.message); return false; } orderId=order.id; await sb.from('sales_order_items').delete().eq('order_id',orderId); }
        else { var ins=await sb.from('sales_orders').insert({ group_id:groupId(), customer_id:custId, unit_id:unitId, status:'draft', comment:val(ov,'#o-comment')||null }).select().single(); if(ins.error){ U.toast('Ошибка: '+ins.error.message); return false; } orderId=ins.data.id; }
        var items=rows.map(function(x){ return x.type==='recipe'
          ? { order_id:orderId, recipe_id:x.val, warehouse_item_id:null, quantity:x.qty, price:x.price }
          : { order_id:orderId, warehouse_item_id:x.val, recipe_id:null, quantity:x.qty, price:x.price }; });
        var insI=await sb.from('sales_order_items').insert(items); if(insI.error){ U.toast('Позиции с ошибкой: '+insI.error.message); }
        U.toast(isEdit?'Заказ сохранён':'Черновик создан'); await loadTab('orders');
      }});
  }
  function openOrderView(o){
    var items=o.sales_order_items||[];
    var rows=items.length?('<div class="m3-tablewrap"><table class="m3-tbl"><thead><tr><th>Позиция</th><th>Тип</th><th class="num">Кол-во</th><th class="num">Цена</th><th class="num">Сумма</th></tr></thead><tbody>'
      +items.map(function(i){
        var nm = i.recipe_id ? ((data.recLite.find(function(r){return r.id===i.recipe_id;})||{}).name||'рецепт') : ((data.whLite.find(function(w){return w.id===i.warehouse_item_id;})||{}).name||'товар');
        return '<tr><td>'+U.esc(nm)+'</td><td>'+(i.recipe_id?'<span class="it-recipe">рецепт</span>':'<span class="it-prod">товар</span>')+'</td><td class="num">'+U.formatQuantity(i.quantity)+'</td><td class="num">'+U.formatMoney(i.price)+'</td><td class="num">'+U.formatMoney(num(i.quantity)*num(i.price))+'</td></tr>';
      }).join('')+'</tbody></table></div>'):'<div class="m3-hint">Без позиций.</div>';
    ensurePickers().then(function(){
      dialog({ title:'Заказ '+(o.order_number||''), wide:true, ok:false, cancel:'Закрыть',
        body:'<div class="m3-field"><div class="m3-hint">Клиент: <b style="color:var(--text)">'+U.esc((o.customers&&o.customers.name)||'—')+'</b> · '+orderStatus(o.status)+' · '+payChip(o.payment_status)+' · создан '+U.formatDate(o.created_at)+'</div></div>'+rows
          +'<div class="m3-total"><span>Итого</span><span>'+U.formatMoney(orderSum(o))+'</span></div>', onOk:function(){} });
    });
  }

  async function doConfirm(id){ var r=await sb.from('sales_orders').update({status:'confirmed', confirmed_at:new Date().toISOString()}).eq('id',id); if(r.error){ U.toast('Ошибка: '+r.error.message); return; } U.toast('Заказ подтверждён'); await loadTab(curTab); }
  async function doShip(id){ var r=await RIVA.rpc('ship_sales_order',{p_order_id:id}); if(!(r&&r.ok)){ U.toast('Ошибка: '+(deficitText(r)||(r&&r.error)||'')); return false; } U.toast('Заказ отгружен, склад списан'); await loadTab(curTab); }
  async function doComplete(id){ var r=await RIVA.rpc('complete_sales_order',{p_order_id:id}); if(!(r&&r.ok)){ U.toast('Ошибка: '+((r&&r.error)||'')); return false; } U.toast('Заказ завершён'); await loadTab(curTab); }
  async function doCancel(id){ var r=await RIVA.rpc('cancel_sales_order',{p_order_id:id}); if(!(r&&r.ok)){ U.toast('Ошибка: '+((r&&r.error)||'')); return false; } U.toast('Заказ отменён'); await loadTab(curTab); }
  async function delOrder(id){ var r=await sb.from('sales_orders').delete().eq('id',id); if(r.error){ U.toast('Ошибка: '+r.error.message); return false; } U.toast('Удалено'); await loadTab(curTab); }
  function deficitText(r){ if(r&&r.error==='INSUFFICIENT_STOCK'&&r.deficit&&r.deficit.length){ return 'не хватает: '+r.deficit.map(function(d){return d.name+' ('+U.formatQuantity(d.missing)+' '+(d.unit||'')+')';}).join(', '); } return null; }

  /* ---------- общие ---------- */
  function unitSelectHTML(selId, preset){
    var us=salesUnits(); var fixed=activeSalesUnit();
    if(fixed && !preset){ var u=us.find(function(x){return x.id===fixed;}); return '<input class="m3-input" value="'+U.esc(u?u.name:'отдел')+'" disabled><input type="hidden" id="'+selId+'" value="'+fixed+'">'; }
    var pre=preset||fixed||defaultSalesUnit();
    return '<select class="m3-select" id="'+selId+'">'+us.map(function(u){return '<option value="'+u.id+'"'+(u.id===pre?' selected':'')+'>'+U.esc(u.name)+(u.is_default?' (по умолч.)':'')+'</option>';}).join('')+'</select>';
  }
  function empty(t,d){ return '<div class="m3-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 3h2l2.4 12.3a2 2 0 0 0 2 1.7h7.7a2 2 0 0 0 2-1.6L22 8H6"/><circle cx="9" cy="20" r="1.6"/><circle cx="18" cy="20" r="1.6"/></svg><div class="t">'+t+'</div><div class="d">'+d+'</div></div>'; }
  function svgEdit(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>'; }
  function svgTrash(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>'; }
  function svgX(){ return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 6 6 18M6 6l12 12"/></svg>'; }
  function ic(act,title,id,svg,danger,attr,extra){ return '<button class="m3-ic'+(danger?' danger':'')+(extra?(' '+extra):'')+'" title="'+title+'" data-'+(attr||'act')+'="'+act+'" data-id="'+id+'">'+svg+'</button>'; }

  function dialog(opts){
    var ov=document.createElement('div'); ov.className='m3-overlay';
    ov.innerHTML='<div class="m3-dialog'+(opts.wide?' wide':'')+'"><div class="m3-dhead"><h3>'+U.esc(opts.title)+'</h3><button class="m3-dclose">✕</button></div><div class="m3-dbody">'+opts.body+'</div><div class="m3-dfoot"><button class="m3-btn ghost" data-x="cancel">'+(opts.cancel||'Отмена')+'</button>'+(opts.ok===false?'':'<button class="m3-btn" data-x="ok">'+(opts.ok||'Сохранить')+'</button>')+'</div></div>';
    document.body.appendChild(ov);
    function close(){ ov.remove(); }
    ov.querySelector('.m3-dclose').onclick=close; ov.querySelector('[data-x="cancel"]').onclick=close;
    ov.addEventListener('mousedown', function(e){ if(e.target===ov) close(); });
    var okb=ov.querySelector('[data-x="ok"]'); if(okb) okb.onclick=async function(){ okb.disabled=true; try{ var r=await opts.onOk(ov); if(r!==false) close(); } finally { if(okb) okb.disabled=false; } };
    if(opts.onMount) opts.onMount(ov);
    return ov;
  }
  function val(ov,s){ var e=ov.querySelector(s); return e?e.value.trim():''; }
  function confirmAct(title,text,okLabel,danger,fn){ var ov=dialog({ title:title, ok:okLabel, body:'<p style="color:var(--text-2);font-size:.92rem;line-height:1.5;">'+U.esc(text)+'</p>', onOk:async function(){ return await fn(); } }); if(danger){ var b=ov.querySelector('[data-x="ok"]'); if(b){ b.style.background='var(--st-cancelled)'; b.style.color='#fff'; b.style.boxShadow='none'; } } }

  /* ---------- события + старт ---------- */
  function onView(e){ if(!alive()){ document.removeEventListener('riva:view',onView); return; } var t=tabFromLabel(e.detail&&e.detail.tab); if(t!==curTab) showTab(t); }
  function onUnits(){ if(!alive()){ document.removeEventListener('riva:units-changed',onUnits); return; } renderTools(); loadTab(curTab); }
  document.addEventListener('riva:view',onView);
  document.addEventListener('riva:units-changed',onUnits);
  showTab(tabFromLabel(RIVA.state.view && RIVA.state.view.tab));
})();
</script>
